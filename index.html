<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Aquarium</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');
*{box-sizing:border-box;margin:0;padding:0;image-rendering:pixelated;}
:root{
  --deep:#0a1628;--mid:#0d2258;--light:#0a3580;
  --green:#1D9E75;--gold:#FFB300;--red:#E53935;--blue:#0288D1;
  --panel:#ffffff12;--border:#ffffff22;--text:#e8f4f8;--muted:#7ba8c4;
  --font:'VT323',monospace;--pfont:'Press Start 2P',monospace;
}
body{background:var(--deep);color:var(--text);font-family:var(--font);font-size:16px;min-height:100vh;}
#app{max-width:900px;margin:0 auto;padding:.5rem;}
.game-title{font-family:var(--pfont);font-size:11px;color:var(--gold);text-align:center;padding:8px 0 4px;letter-spacing:2px;text-shadow:0 0 10px #FFB30066;}
.game-title::after{content:'';display:block;width:60%;height:1px;background:linear-gradient(90deg,transparent,#FFB30044,transparent);margin:6px auto 0;}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:6px;flex-wrap:wrap;}
.top-bar-left{display:flex;align-items:center;gap:8px;}
.top-bar-right{display:flex;align-items:center;gap:6px;}
.tank-outer{border:3px solid #1a237e;border-radius:10px;overflow:hidden;margin-bottom:6px;position:relative;box-shadow:0 0 20px rgba(10,53,128,0.4);}
#TC{display:block;width:100%;image-rendering:pixelated;cursor:pointer;}
.hud{display:flex;gap:5px;margin-bottom:6px;flex-wrap:wrap;}
.hud-stat{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:14px;flex:1;min-width:70px;text-align:center;color:var(--muted);cursor:default;}
.hud-stat b{display:block;font-size:17px;color:var(--text);}
.hud-stat.warn b{color:#FFB300;}.hud-stat.bad b{color:#E53935;}.hud-stat.good b{color:#1D9E75;}
.hud-stat.clickable{cursor:pointer;transition:background .2s;}.hud-stat.clickable:hover{background:#ffffff22;}
.tabs{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap;}
.tab{padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--panel);color:var(--muted);cursor:pointer;font-size:12px;font-family:var(--font);transition:all .2s;position:relative;}
.tab:hover{background:#ffffff18;}.tab.on{background:var(--green);color:#fff;border-color:var(--green);}
.tab .notif{position:absolute;top:-4px;right:-4px;width:8px;height:8px;background:var(--red);border-radius:50%;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.sc{display:none;}.sc.v{display:block;animation:fadeIn .2s ease-out;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:7px;}
.item{background:#ffffff08;border:1px solid var(--border);border-radius:8px;padding:9px;text-align:center;transition:all .2s;}
.item:hover{border-color:#ffffff44;background:#ffffff10;}
.item canvas{display:block;margin:0 auto 4px;image-rendering:pixelated;}
.iname{font-size:13px;color:var(--text);margin-bottom:2px;}.idesc{font-size:10px;color:var(--muted);margin-bottom:4px;}
.iprice{font-size:12px;color:var(--gold);margin-bottom:5px;}
.item button{padding:5px 8px;font-size:11px;border:1px solid var(--border);border-radius:6px;background:#ffffff15;color:var(--text);cursor:pointer;font-family:var(--font);width:100%;transition:all .2s;}
.item button:hover{background:var(--green);border-color:var(--green);color:#fff;}
.item button:disabled{opacity:.35;cursor:not-allowed;}
.owned{font-size:10px;color:var(--green);background:#1D9E7522;padding:2px 7px;border-radius:20px;display:inline-block;margin-top:3px;}
.rare-tag{font-size:9px;color:#E040FB;background:#E040FB22;padding:1px 5px;border-radius:8px;display:inline-block;margin-bottom:2px;animation:shimmer 2s infinite;}
.super-rare-tag{font-size:9px;color:#FFD700;background:#FFD70022;padding:1px 5px;border-radius:8px;display:inline-block;margin-bottom:2px;animation:shimmer 1.5s infinite;}
@keyframes shimmer{0%,100%{opacity:1;}50%{opacity:0.5;}}
.bar{height:7px;background:#ffffff15;border-radius:20px;overflow:hidden;margin-top:3px;}
.fill{height:100%;border-radius:20px;transition:width .4s;}
.row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.lbl{font-size:13px;color:var(--muted);width:95px;flex-shrink:0;}.val{font-size:12px;font-weight:500;width:28px;text-align:right;}
.btn{padding:8px 16px;background:var(--green);color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:14px;font-family:var(--font);transition:all .2s;}
.btn:hover{background:#0F6E56;}.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-row{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap;}
.al{padding:7px 11px;border-radius:7px;font-size:13px;margin-bottom:7px;animation:slideIn .3s ease-out;}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px);}to{opacity:1;transform:translateX(0);}}
.ok{background:#1D9E7522;color:#4ade80;border:1px solid #1D9E7544;}
.warn{background:#FFB30022;color:#FFB300;border:1px solid #FFB30044;}
.bad{background:#E5393522;color:#ff6b6b;border:1px solid #E5393544;}
.stitle{font-family:var(--pfont);font-size:9px;letter-spacing:1px;color:var(--text);margin-bottom:8px;}
.fcard{display:flex;align-items:center;gap:9px;padding:8px;margin-bottom:6px;background:#ffffff08;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .2s;}
.fcard:hover{border-color:var(--green);background:#ffffff10;}
.finfo{flex:1;}.fname{font-size:14px;color:var(--text);}
.ftag{font-size:10px;padding:1px 6px;border-radius:10px;display:inline-block;margin-right:3px;margin-top:2px;}
.ftag-baby{background:#0288D122;color:#4FC3F7;}.ftag-adult{background:#1D9E7522;color:#4ade80;}
.ftag-sick{background:#E5393522;color:#ff6b6b;}.ftag-age{background:#FFB30022;color:#FFB300;}.ftag-mood{background:#CE93D822;color:#CE93D8;}
.fbtns{display:flex;flex-direction:column;gap:3px;}
.fbtns button{font-size:10px;padding:3px 8px;border:1px solid var(--border);border-radius:5px;background:#ffffff10;cursor:pointer;font-family:var(--font);color:var(--text);}
.fbtns button:hover{background:var(--green);color:#fff;}
.coins-display{font-family:var(--pfont);font-size:9px;color:var(--gold);background:#FFB30015;border:1px solid #FFB30033;padding:5px 10px;border-radius:7px;white-space:nowrap;}
.level-display{font-family:var(--pfont);font-size:9px;color:#CE93D8;background:#CE93D815;border:1px solid #CE93D833;padding:5px 10px;border-radius:7px;white-space:nowrap;}
.tank-size-badge{font-size:10px;color:var(--blue);background:#0288D122;border:1px solid #0288D133;padding:2px 8px;border-radius:10px;white-space:nowrap;}
.audio-btn{font-family:var(--pfont);font-size:8px;padding:5px 8px;border:1px solid var(--border);border-radius:7px;background:var(--panel);color:var(--muted);cursor:pointer;}
.audio-btn.on{color:#4ade80;border-color:#1D9E7544;}
.ach-card{display:flex;align-items:center;gap:10px;padding:8px 10px;margin-bottom:5px;background:#ffffff08;border:1px solid var(--border);border-radius:8px;}
.ach-card.done{border-color:#1D9E7544;background:#1D9E7511;}
.ach-icon{font-size:20px;width:32px;text-align:center;flex-shrink:0;}
.ach-info{flex:1;}.ach-name{font-size:13px;color:var(--text);}.ach-desc{font-size:11px;color:var(--muted);margin-top:1px;}
.ach-reward{font-size:10px;color:var(--gold);margin-top:2px;}.ach-check{color:#4ade80;font-size:16px;}
.ach-popup{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:#1a1a2e;border:2px solid var(--gold);border-radius:12px;padding:12px 20px;z-index:9999;display:flex;align-items:center;gap:10px;box-shadow:0 0 30px #FFB30044;transition:transform .5s cubic-bezier(.34,1.56,.64,1);font-family:var(--font);}
.ach-popup.show{transform:translateX(-50%) translateY(0);}
.ach-popup .ach-text{color:var(--gold);font-size:13px;}.ach-popup .ach-sub{color:var(--muted);font-size:11px;}
.stat-box{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.stat-item{background:#ffffff08;border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;}
.stat-val{font-size:12px;color:var(--gold);font-family:var(--pfont);}.stat-label{font-size:12px;color:var(--muted);margin-top:4px;}
.upgrade-card{background:#ffffff08;border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
.upgrade-card .up-icon{font-size:22px;width:36px;text-align:center;}.upgrade-card .up-info{flex:1;}
.upgrade-card .up-name{font-size:14px;color:var(--text);}.upgrade-card .up-desc{font-size:11px;color:var(--muted);margin-top:2px;}
.upgrade-card .up-price{font-size:12px;color:var(--gold);margin-top:3px;}
.feed-particle{position:absolute;pointer-events:none;font-size:10px;animation:feedDrop 1.2s ease-in forwards;}
@keyframes feedDrop{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(60px);}}
.coin-fly{position:fixed;pointer-events:none;font-family:var(--pfont);font-size:10px;color:var(--gold);z-index:9999;animation:coinUp 1s ease-out forwards;}
@keyframes coinUp{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-40px);}}
.tank-overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:10;}
.setup-panel{background:rgba(10,22,40,0.88);border:1px solid var(--border);border-radius:12px;padding:14px 18px;width:min(320px,88%);pointer-events:all;}
.setup-panel .sp-title{font-family:var(--pfont);font-size:9px;color:var(--gold);margin-bottom:10px;text-align:center;letter-spacing:1px;}
.setup-step{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid #ffffff11;font-size:14px;}
.setup-step:last-of-type{border-bottom:none;}
.setup-step .ss-label{color:var(--muted);}.setup-step.done .ss-label{color:#4ade80;}
.water-btn{width:100%;margin-top:10px;padding:9px;background:var(--blue);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:var(--font);font-size:15px;}
.water-btn:hover{background:#0277BD;}.water-btn:disabled{opacity:.4;cursor:not-allowed;}
.refresh-note{font-size:11px;color:var(--muted);margin-bottom:8px;text-align:center;}
</style>
</head>
<body>

<script>
/* ═══════════════════════════════════════════════════════════
   AUDIO ENGINE - Web Audio API procedural sounds + BGM
═══════════════════════════════════════════════════════════ */
let audioCtx=null,audioEnabled=true,bgmNode=null,bgmGain=null;

function getAudio(){
  if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}}
  if(audioCtx.state==='suspended')audioCtx.resume();
  return audioCtx;
}

function playBubble(){
  const ac=getAudio();if(!ac||!audioEnabled)return;
  const o=ac.createOscillator();const g=ac.createGain();
  o.connect(g);g.connect(ac.destination);
  o.type='sine';o.frequency.setValueAtTime(800+Math.random()*400,ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(200,ac.currentTime+0.15);
  g.gain.setValueAtTime(0.06,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.15);
  o.start();o.stop(ac.currentTime+0.15);
}

function playFeed(){
  const ac=getAudio();if(!ac||!audioEnabled)return;
  [0,0.05,0.1].forEach((d,i)=>{
    const o=ac.createOscillator();const g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type='sine';o.frequency.setValueAtTime(1200+i*200,ac.currentTime+d);
    o.frequency.exponentialRampToValueAtTime(400,ac.currentTime+d+0.12);
    g.gain.setValueAtTime(0.08,ac.currentTime+d);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+d+0.12);
    o.start(ac.currentTime+d);o.stop(ac.currentTime+d+0.12);
  });
}

function playWaterFlow(){
  const ac=getAudio();if(!ac||!audioEnabled)return;
  const buf=ac.createBuffer(1,ac.sampleRate*0.4,ac.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*0.15;
  const src=ac.createBufferSource();const g=ac.createGain();
  const f=ac.createBiquadFilter();f.type='bandpass';f.frequency.value=600;f.Q.value=0.5;
  src.buffer=buf;src.connect(f);f.connect(g);g.connect(ac.destination);
  g.gain.setValueAtTime(0,ac.currentTime);g.gain.linearRampToValueAtTime(0.12,ac.currentTime+0.1);
  g.gain.linearRampToValueAtTime(0,ac.currentTime+0.4);
  src.start();src.stop(ac.currentTime+0.4);
}

function startBGM(){
  const ac=getAudio();if(!ac)return;
  if(bgmNode){bgmNode.stop();bgmNode=null;}
  bgmGain=ac.createGain();bgmGain.gain.value=audioEnabled?0.18:0;bgmGain.connect(ac.destination);

  const tempo=0.48;
  const notes=[
    [261,0],[294,1],[329,2],[349,3],[392,4],[349,5],[329,6],[294,7],
    [261,8],[220,9],[246,10],[261,11],[294,12],[329,13],[349,14],[392,15],
    [440,16],[392,17],[349,18],[329,19],[294,20],[261,21],[246,22],[220,23],
    [196,24],[220,25],[246,26],[261,27],[294,28],[261,29],[220,30],[196,31],
  ];
  const bass=[
    [65,0],[65,4],[73,8],[65,12],[55,16],[55,20],[65,24],[55,28],
  ];
  const totalBeats=32;
  const loopDur=totalBeats*tempo;

  function scheduleLoop(startT){
    notes.forEach(([freq,beat])=>{
      const o=ac.createOscillator();const g=ac.createGain();
      o.connect(g);g.connect(bgmGain);
      o.type='triangle';o.frequency.value=freq;
      const t=startT+beat*tempo;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.35,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t+tempo*0.85);
      o.start(t);o.stop(t+tempo);
    });
    bass.forEach(([freq,beat])=>{
      const o=ac.createOscillator();const g=ac.createGain();
      o.connect(g);g.connect(bgmGain);
      o.type='square';o.frequency.value=freq;
      const t=startT+beat*tempo;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.08,t+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,t+tempo*3.8);
      o.start(t);o.stop(t+tempo*4);
    });
    for(let b=0;b<totalBeats;b+=2){
      const o=ac.createOscillator();const g=ac.createGain();
      o.connect(g);g.connect(bgmGain);
      o.type='sine';o.frequency.value=523+Math.sin(b)*80;
      const t=startT+b*tempo+tempo*0.5;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.06,t+0.03);
      g.gain.exponentialRampToValueAtTime(0.001,t+tempo*0.4);
      o.start(t);o.stop(t+tempo*0.5);
    }
    setTimeout(()=>scheduleLoop(ac.currentTime+0.1),loopDur*1000-200);
  }
  scheduleLoop(ac.currentTime+0.1);
}

function toggleAudio(){
  audioEnabled=!audioEnabled;
  const btn=document.getElementById('audio-btn');
  btn.textContent=audioEnabled?'♪ ON':'♪ OFF';
  btn.classList.toggle('on',audioEnabled);
  if(bgmGain)bgmGain.gain.value=audioEnabled?0.18:0;
  if(audioEnabled)startBGM();
}

const FISH_DEF=[

  {id:'seahorse', name:'Seahorse',      price:120, desc:'Upright slow mover',temp:'22-26°C',hardiness:2,breedable:true, personality:'shy',        poop:0.15,rarity:'rare'},
  {id:'manta',    name:'Manta Ray',     price:350, desc:'Gliding giant ray',  temp:'24-28°C',hardiness:2,breedable:false,personality:'majestic',   poop:0.3, rarity:'super_rare'},
  {id:'dragon',   name:'Dragon Goby',   price:280, desc:'Fierce eel-like',   temp:'25-29°C',hardiness:2,breedable:false,personality:'territorial', poop:0.35,rarity:'super_rare'},

function getBabySprite(id){
  const sp=getSprite(id);
  const seen=new Set();
  return {w:Math.ceil(sp.w*0.55),h:Math.ceil(sp.h*0.55),
    p:sp.p.map(([x,y,c])=>[Math.round(x*0.55),Math.round(y*0.55),c])
      .filter(([x,y])=>{const k=x+','+y;if(seen.has(k))return false;seen.add(k);return true;})
  };
}

function makeFishCanvas(id,size,stage){
  const sp=stage==='baby'?getBabySprite(id):getSprite(id);
  const sc=Math.max(1,Math.floor(size/Math.max(sp.w,sp.h)));
  const c=document.createElement('canvas');
  c.width=sp.w*sc;c.height=sp.h*sc;
  c.style.width=c.width+'px';c.style.height=c.height+'px';
  c.style.display='block';c.style.margin='0 auto 3px';c.style.imageRendering='pixelated';
  const ctx=c.getContext('2d');
  sp.p.forEach(([x,y,col])=>{ctx.fillStyle=col;ctx.fillRect(x*sc,y*sc,sc,sc);});
  return c;
}

function drawPlantCanvas(id,size){
  const c=document.createElement('canvas');c.width=size;c.height=size;
  c.style.width=size+'px';c.style.height=size+'px';c.style.imageRendering='pixelated';
  const ctx=c.getContext('2d');
  const pc=PLANT_COLORS[id]||PLANT_COLORS.vallis;
  const sc=2;
  if(pc.shape==='ball'){
    ctx.fillStyle=pc.leaf[1];ctx.fillRect(4*sc,2*sc,8*sc,8*sc);
    ctx.fillStyle=pc.leaf[0];ctx.fillRect(6*sc,1*sc,4*sc,10*sc);
    ctx.fillStyle=pc.leaf[2];ctx.fillRect(7*sc,3*sc,2*sc,4*sc);

  } else {
    ctx.fillStyle=pc.stem;ctx.fillRect(7*sc,3*sc,2*sc,9*sc);
    [2,5,8].forEach((y,i)=>{ctx.fillStyle=pc.leaf[i%3];ctx.fillRect((4+i)*sc,y*sc,5*sc,3*sc);});
    ctx.fillStyle=pc.leaf[0];ctx.fillRect(5*sc,1*sc,6*sc,3*sc);
  }
  return c;
}

let S={
  coins:500,owned:{},waterAdded:false,waterLevel:0,waterAnim:false,
  waterTested:true,waterScore:{},fish:[],uid:0,day:1,
  plantAge:0,plantSeeds:[],decos:[],gameTime:8*60,poopLevel:0,
  tankSize:0,xp:0,level:1,achievements:[],
  totalBred:0,totalCured:0,totalCleans:0,totalFeeds:0,
  totalEarned:0,totalSpent:0,totalFishBought:0,totalDeaths:0,
  daysWithoutDeath:0,maxDaysWithoutDeath:0,clickFeed:0,
  _marketRares:null,_marketRareDay:-1,
  _decoRares:null,_decoRareDay:-1,
  _plantRares:null,_plantRareDay:-1,
};

function sv(){try{localStorage.setItem('aq8',JSON.stringify(S));}catch(e){}}
function ld(){try{const x=localStorage.getItem('aq8');if(x){Object.assign(S,JSON.parse(x));S.waterTested=true;}}catch(e){}}
function coin(n){if(n>0)S.totalEarned=(S.totalEarned||0)+n;if(n<0)S.totalSpent=(S.totalSpent||0)+Math.abs(n);S.coins+=n;document.getElementById('CD').textContent='Coins: '+S.coins;if(n>0)coinFlyAnim('+'+n);sv();checkAch();}
function addXP(n){S.xp=(S.xp||0)+n;const need=S.level*100;if(S.xp>=need){S.xp-=need;S.level++;showAl('global','Level Up! Level '+S.level+'! +25 coins','ok');coin(25);}document.getElementById('LD').textContent='Lv. '+S.level;sv();}
function coinFlyAnim(text){const el=document.createElement('div');el.className='coin-fly';el.textContent=text;const cd=document.getElementById('CD');const r=cd.getBoundingClientRect();el.style.left=(r.left+r.width/2)+'px';el.style.top=(r.top-5)+'px';document.body.appendChild(el);setTimeout(()=>el.remove(),1000);}
function showAl(z,m,t){const el=document.getElementById('a-'+(z||'global'));if(!el)return;el.innerHTML='<div class="al '+t+'">'+m+'</div>';setTimeout(()=>{if(el)el.innerHTML='';},3000);}
function getTankCap(){return TANK_SIZES[S.tankSize||0].capacity;}
function avgW(){const v=Object.values(S.waterScore||{});if(!v.length)return 0;return Math.round(v.reduce((a,b)=>a+b,0)/v.length);}
function getWaterTemp(){return S.owned.heater2?27:S.owned.heater?25:18;}
function getFishMood(f){
  if(f.hunger<25)return'hungry';if(f.health<40)return'scared';if(f.diseased)return'scared';
  const hour=Math.floor((S.gameTime%1440)/60);if(hour>=21||hour<6)return'sleepy';
  if(S.fish.filter(x=>x.id===f.id).length===1&&FISH_DEF.find(d=>d.id===f.id)?.personality==='shy')return'lonely';
  if(f.hunger>80&&f.health>80)return'happy';
  if(FISH_DEF.find(d=>d.id===f.id)?.personality==='playful')return'playful';
  return'content';
}

function checkAch(){ACHIEVEMENTS.forEach(a=>{if((S.achievements||[]).includes(a.id))return;if(a.check(S)){if(!S.achievements)S.achievements=[];S.achievements.push(a.id);coin(a.reward);addXP(20);showAchPopup(a);sv();}});}
function showAchPopup(a){const p=document.getElementById('ach-popup');document.getElementById('ach-popup-icon').textContent=a.icon;document.getElementById('ach-popup-text').textContent='Achievement: '+a.name;document.getElementById('ach-popup-sub').textContent=a.desc+' (+'+a.reward+' coins)';p.classList.add('show');setTimeout(()=>p.classList.remove('show'),3500);}
function updateTankBadge(){document.getElementById('tank-badge').textContent='Tank: '+TANK_SIZES[S.tankSize||0].name;}

function recalcWater(){
  const pp=Math.round(S.poopLevel*0.4);
  const fb=(S.owned.filter2?35:S.owned.filter?25:0);
  const pb=Math.min(15,Math.floor((S.plantSeeds||[]).length*2));
  const uv=S.owned.uv?8:0;
  S.waterScore={
    ph:     Math.min(100,Math.max(0,65+(S.owned.dechlorinator?20:0)+(S.owned.filter||S.owned.filter2?5:0)+pb-pp+uv)),
    ammonia:Math.min(100,Math.max(0,55+fb+pb-Math.round(pp*1.2)+uv)),
    oxygen: Math.min(100,Math.max(0,45+(S.owned.airpump?30:0)+(S.owned.filter||S.owned.filter2?10:0)+pb)),
    temp:   Math.min(100,Math.max(0,55+(S.owned.heater2?40:S.owned.heater?32:0))),
    clarity:Math.min(100,Math.max(0,45+fb+(S.owned.gravel?18:0)-pp+uv)),
  };
  Object.keys(S.waterScore).forEach(k=>{S.waterScore[k]=Math.round(S.waterScore[k]);});
  renderWaterBar();
}

function renderWaterBar(){
  const el=document.getElementById('wq-bar');if(!el)return;
  if(!S.waterAdded){el.innerHTML='';return;}
  const ws=S.waterScore;if(!ws||!Object.keys(ws).length)return;
  const lbls={ph:'pH',ammonia:'NH₃',oxygen:'O₂',temp:'Temp',clarity:'Clear'};
  const col=v=>v>=80?'#4ade80':v>=55?'#FFB300':'#ff6b6b';
  const vals=Object.values(ws);
  const avg=Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
  const wq=avg>=80?'Excellent':avg>=60?'Good':avg>=40?'Poor':'Critical';
  const wc=avg>=80?'#4ade80':avg>=60?'#FFB300':'#ff6b6b';
  el.innerHTML='<div style="background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:6px;">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;">'
    +'<span style="font-family:var(--pfont);font-size:8px;color:var(--muted);letter-spacing:1px;">WATER QUALITY</span>'
    +'<span style="font-size:13px;color:'+wc+';font-weight:500;">'+wq+' — '+avg+'%</span></div>'
    +'<div style="display:flex;gap:6px;">'
    +Object.keys(ws).map(k=>'<div style="flex:1;text-align:center;">'
      +'<div style="font-size:10px;color:var(--muted);margin-bottom:3px;">'+lbls[k]+'</div>'
      +'<div style="height:6px;background:#ffffff15;border-radius:10px;overflow:hidden;"><div style="height:100%;width:'+ws[k]+'%;background:'+col(ws[k])+';border-radius:10px;transition:width .6s;"></div></div>'
      +'</div>').join('')
    +'</div></div>';
}

function renderHUD(){
  const avg=avgW();const wq=avg>=80?'Excellent':avg>=60?'Good':avg>=40?'Poor':'Critical';
  const wc=avg>=80?'good':avg>=60?'warn':'bad';const cap=getTankCap();
  document.getElementById('HUD').innerHTML=
    '<div class="hud-stat '+wc+'"><b>'+wq+'</b>Water</div>'+
    '<div class="hud-stat"><b>'+getWaterTemp()+'°C</b>Temp</div>'+
    '<div class="hud-stat"><b>'+(S.waterAdded?100:Math.round(S.waterLevel||0))+'%</b>Level</div>'+
    '<div class="hud-stat"><b>'+S.fish.length+'/'+cap+'</b>Fish</div>'+
    '<div class="hud-stat '+(S.poopLevel>50?'bad':S.poopLevel>25?'warn':'')+'"><b>'+Math.round(S.poopLevel)+'%</b>Waste</div>'+
    '<div class="hud-stat clickable" id="hud-feed-btn" style="background:'+(S.waterAdded&&S.fish.length?'#1D9E7522':'var(--panel)')+';">'+
    '<b style="font-size:15px;">🍞</b>Feed</div>';
  const fb=document.getElementById('hud-feed-btn');
  if(fb)fb.addEventListener('click',()=>{if(!S.waterAdded||!S.fish.length)return;dropFood();});
}

function renderSetup(){
  const ov=document.getElementById('tank-setup-overlay');if(!ov)return;
  if(S.waterAdded){ov.innerHTML='';return;}
  const ok=STEPS.every(s=>s.ids.some(id=>S.owned[id]));
  ov.innerHTML='<div class="setup-panel"><div class="sp-title">~ TANK SETUP ~</div>'
    +STEPS.map(s=>{const h=s.ids.some(id=>S.owned[id]);return'<div class="setup-step '+(h?'done':'')+'"><span class="ss-label">'+(h?'✓ ':'○ ')+s.label+'</span><span style="font-size:12px;color:'+(h?'#4ade80':'#ff6b6b')+'">'+(h?'Ready':'Missing')+'</span></div>';}).join('')
    +'<button class="water-btn" id="btn-w-ov" '+((!ok||S.waterAnim)?'disabled':'')+'>'+(S.waterAnim?'Filling...':'💧 Add Water')+'</button></div>';
  const b=document.getElementById('btn-w-ov');
  if(b)b.addEventListener('click',()=>{if(S.waterAdded||S.waterAnim)return;S.waterAnim=true;S.waterLevel=0;sv();renderSetup();playWaterFlow();});
}

document.getElementById('tab-bar').addEventListener('click',function(e){
  const btn=e.target.closest('.tab');if(!btn)return;
  const name=btn.dataset.tab;
  document.querySelectorAll('#app .sc').forEach(s=>s.classList.remove('v'));
  document.querySelectorAll('#app .tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('s-'+name).classList.add('v');btn.classList.add('on');
  if(name==='market')renderMarket();
  if(name==='plants')renderPlants();
  if(name==='myfish')renderFishList();
  if(name==='deco')renderDeco();
  if(name==='upgrades')renderUpgrades();
  if(name==='achievements')renderAchievements();
  if(name==='stats')renderStats();
});

document.getElementById('btn-clean').addEventListener('click',function(){
  if(S.coins<20){showAl('myfish','Not enough coins!','warn');return;}
  coin(-20);S.poopLevel=0;S.totalCleans=(S.totalCleans||0)+1;addXP(3);recalcWater();sv();showAl('myfish','Tank cleaned!','ok');renderFishList();
});

function initPlants(){

  const defaults=['vallis','moss','cabomba','vallis','crypt','hornwort','anubias'];
  S.plantSeeds=defaults.map((id,i)=>{

  });sv();
}
function getPlantH(p){return Math.min(p.maxH,4+(S.plantAge||0)*0.8);}

function drawPlant(ctx,p,t,W,H){
  const pc=PLANT_COLORS[p.id]||PLANT_COLORS.vallis;
  const h=getPlantH(p)*3;
  const base=Math.round(H*0.75);
  const sw=Math.sin(t*0.5+p.swayOff)*4;
  const sc=3;
  if(pc.shape==='ball'){
    const by=base-h*0.6;const bx=Math.round(p.x+sw*0.5);
    for(let r=0;r<h*0.6;r+=sc){ctx.fillStyle=pc.leaf[Math.floor(r/h*3)%3];ctx.fillRect(bx-Math.round(h*0.4),by+r,Math.round(h*0.8),sc);}
    ctx.fillStyle=pc.stem;ctx.fillRect(bx-sc,base-h*0.5,sc*2,h*0.5);
    return;
  }
  ctx.fillStyle=pc.stem;
  for(let i=0;i<h;i+=sc){ctx.fillRect(Math.round(p.x+sw*(i/h))-sc,base-i,sc*2,sc);}
  if(pc.shape==='feather'){
    for(let i=sc*2;i<h;i+=sc*5){
      const wx=sw*(i/h);
      ctx.fillStyle=pc.leaf[Math.floor(i/h*3)%3];
      ctx.fillRect(Math.round(p.x+wx)-sc*4,base-i,sc*3,sc);
      ctx.fillRect(Math.round(p.x+wx)+sc,base-i,sc*3,sc);
      if(i>h*0.3){ctx.fillRect(Math.round(p.x+wx)-sc*6,base-i+sc,sc*3,sc);ctx.fillRect(Math.round(p.x+wx)+sc*3,base-i+sc,sc*3,sc);}
    }
  } else if(pc.shape==='rosette'){
    for(let l=0;l<6;l++){
      const angle=(l/6)*Math.PI*2+sw*0.05;
      const lx=Math.round(p.x+Math.cos(angle)*h*0.4+sw*0.5);
      const ly=Math.round(base-Math.abs(Math.sin(angle))*h*0.5-h*0.2);
      ctx.fillStyle=pc.leaf[l%3];
      ctx.fillRect(lx-sc*3,ly,sc*6,sc*2);ctx.fillRect(lx-sc*4,ly+sc,sc*8,sc*2);ctx.fillRect(lx-sc*3,ly+sc*3,sc*6,sc*2);
    }
  } else {
    const leaves=[[0,h],[sc*2,h*0.7],[-sc*2,h*0.5],[sc*3,h*0.35],[-sc*2,h*0.2]];
    leaves.forEach(([lx,ly])=>{
      const wx=sw*(ly/h);ctx.fillStyle=pc.leaf[Math.floor(ly/h*3)%3];
      ctx.fillRect(Math.round(p.x+lx+wx)-sc*4,Math.round(base-ly)-sc,sc*8,sc*2);
      ctx.fillRect(Math.round(p.x+lx+wx)-sc*5,Math.round(base-ly)+sc,sc*10,sc*2);
      ctx.fillRect(Math.round(p.x+lx+wx)-sc*4,Math.round(base-ly)+sc*3,sc*8,sc*2);
    });
  }
}

function drawTank(){
  const canvas=document.getElementById('TC');if(!canvas)return;
  const W=canvas.parentElement.clientWidth||640;
  if(canvas.width!==W)canvas.width=W;
  const H=336;const ctx=canvas.getContext('2d');
  cancelAnimationFrame(raf);

  function frame(){
    const t=Date.now()/1000;
    ctx.clearRect(0,0,W,H);

    if(!S.waterAdded&&!S.waterAnim){
      ctx.fillStyle='#1a237e';ctx.fillRect(0,0,W,H);
      ctx.fillStyle='#3949AB';ctx.font='bold 13px monospace';ctx.textAlign='center';
      ctx.fillText('[ EMPTY TANK ]',W/2,H/2-12);
      ctx.fillStyle='#5C6BC0';ctx.font='11px monospace';
      ctx.fillText('buy equipment & add water',W/2,H/2+12);
      raf=requestAnimationFrame(frame);return;
    }

    if(S.waterAnim){
      S.waterLevel=Math.min(100,(S.waterLevel||0)+0.4);
      if(S.waterLevel>=100){S.waterAnim=false;S.waterAdded=true;recalcWater();if(!S.plantSeeds||!S.plantSeeds.length)initPlants();sv();renderSetup();renderHUD();}
      ctx.fillStyle='#0a1628';ctx.fillRect(0,0,W,H);
      const wh=Math.round(S.waterLevel/100*H);const wy=H-wh;
      ctx.fillStyle='#0a2d6e';ctx.fillRect(0,wy,W,wh);
      ctx.fillStyle='rgba(100,180,255,0.3)';
      for(let i=0;i<8;i++)ctx.fillRect(Math.round(W*0.07+i*(W*0.12)+Math.sin(t*4+i)*8),wy,Math.round(W*0.08),4);
      ctx.fillStyle='#90CAF9';ctx.font='bold 12px monospace';ctx.textAlign='center';
      ctx.fillText('filling... '+Math.round(S.waterLevel)+'%',W/2,Math.max(20,wy-10));
      if(Math.random()<0.3)playBubble();
      raf=requestAnimationFrame(frame);return;
    }

    const hour=Math.floor((S.gameTime%1440)/60);
    const isNight=hour<6||hour>=20;const isDawn=hour>=5&&hour<8;const isDusk=hour>=18&&hour<21;
    const nightAlpha=isNight?0.55:isDawn||isDusk?0.25:0;

    [[0,65,'#0d1b4b'],[65,125,'#0d2258'],[125,185,'#0a2d6e'],[185,245,'#0a3580'],[245,300,'#0d3d8f'],[300,336,'#0a4499']].forEach(([y1,y2,c])=>{ctx.fillStyle=c;ctx.fillRect(0,y1,W,y2-y1);});

    if(S.owned.light&&!isNight){
      ctx.save();ctx.globalAlpha=0.06;
      for(let i=0;i<5;i++){const rx=W*(0.1+i*0.2)+Math.sin(t*0.25+i)*15;ctx.fillStyle='#B3E5FC';ctx.beginPath();ctx.moveTo(rx-14,0);ctx.lineTo(rx+14,0);ctx.lineTo(rx+55,H);ctx.lineTo(rx-55,H);ctx.closePath();ctx.fill();}
      ctx.restore();
    }

    ctx.save();ctx.globalAlpha=0.12;
    for(let i=0;i<18;i++){const cx=W*(0.02+i*0.06)+Math.sin(t*0.5+i*1.1)*8;const cy=H*0.65+Math.cos(t*0.4+i)*8;ctx.fillStyle='#81D4FA';ctx.fillRect(Math.round(cx),Math.round(cy),4,2);}
    ctx.restore();

    const flY=Math.round(H*0.75);

    if(S.plantSeeds&&S.plantSeeds.length)S.plantSeeds.forEach(p=>drawPlant(ctx,p,t,W,H));

    if(S.decos&&S.decos.length)S.decos.forEach(d=>{ctx.save();drawDecoSprite(ctx,d.id,Math.round(d.x*W)-14,flY-28,4);ctx.restore();});

    if(S.owned.gravel){
      ctx.fillStyle='#D7CCC8';ctx.fillRect(0,flY,W,H-flY);
      ctx.fillStyle='#BCAAA4';ctx.fillRect(0,flY,W,5);
      [.04,.11,.19,.27,.35,.44,.53,.61,.69,.77,.85,.92].forEach((rx,i)=>{
        ctx.fillStyle=['#8D6E63','#795548','#A1887F','#8D6E63','#BCAAA4','#795548','#A1887F','#8D6E63','#795548','#A1887F','#8D6E63','#795548'][i];
        ctx.fillRect(Math.round(rx*W)-5,flY+6,10,6);ctx.fillRect(Math.round(rx*W)-7,flY+10,14,5);
      });
    } else {ctx.fillStyle='#546E7A';ctx.fillRect(0,flY,W,H-flY);ctx.fillStyle='#455A64';ctx.fillRect(0,flY,W,4);}

    if(S.owned.airpump){
      const bubbleT=t;
      for(let i=0;i<12;i++){
        const bx=W*0.04+(i%6)*14+Math.sin(bubbleT*0.5+i)*6;
        const by=flY-((bubbleT*18+i*22)%flY);
        const r=i%3===0?4:i%2===0?3:2;
        ctx.strokeStyle='rgba(179,229,252,0.55)';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);ctx.stroke();
        ctx.fillStyle='rgba(255,255,255,0.1)';ctx.beginPath();ctx.arc(bx-1,by-1,r*0.5,0,Math.PI*2);ctx.fill();
      }
    }

    if(S.decos&&S.decos.some(d=>d.id==='volcano')){
      const vd=S.decos.find(d=>d.id==='volcano');const vx=Math.round(vd.x*W);
      for(let i=0;i<5;i++){ctx.fillStyle='rgba(255,87,34,0.4)';ctx.beginPath();ctx.arc(vx+Math.sin(t*2+i*1.5)*10,flY-25-((t*28+i*18)%45),3,0,Math.PI*2);ctx.fill();}
    }
    if(S.decos&&S.decos.some(d=>d.id==='crystal')){
      const cd=S.decos.find(d=>d.id==='crystal');const cx=Math.round(cd.x*W);
      ctx.save();ctx.globalAlpha=0.3+Math.sin(t*2)*0.15;
      ctx.fillStyle='#E040FB';ctx.fillRect(cx-3,flY-35,6,6);
      ctx.fillStyle='#00BCD4';ctx.fillRect(cx+8,flY-28,4,4);
      ctx.restore();
    }

    poopParticles=poopParticles.filter(p=>{p.y+=p.vy;p.vy+=0.04;p.life--;if(p.life<=0||p.y>flY)return false;ctx.fillStyle='#5D4037';ctx.globalAlpha=p.life/80;ctx.fillRect(Math.round(p.x),Math.round(p.y),3,3);ctx.globalAlpha=1;return true;});
    tankRipples=tankRipples.filter(r=>{r.r+=1.8;r.alpha-=0.018;if(r.alpha<=0)return false;ctx.save();ctx.globalAlpha=r.alpha;ctx.strokeStyle='#B3E5FC';ctx.lineWidth=1;ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);ctx.stroke();ctx.restore();return true;});
    splashParticles=splashParticles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;if(p.life<=0)return false;ctx.fillStyle=p.color;ctx.globalAlpha=p.life/30;ctx.fillRect(Math.round(p.x),Math.round(p.y),3,3);ctx.globalAlpha=1;return true;});

    foodPellets=foodPellets.filter(fp=>{
      if(fp.eaten)return false;
      fp.y+=fp.vy;fp.x+=fp.vx;fp.vy+=0.006;fp.age++;
      if(fp.y>flY/100*100-4){fp.y=flY/100*100-4;fp.vy*=-0.2;fp.vx*=0.8;}
      if(fp.age>700)return false;
      const px=Math.round(fp.x/100*W);const py=Math.round(fp.y/100*H);
      ctx.fillStyle='#FFB300';ctx.globalAlpha=0.9;ctx.beginPath();ctx.arc(px,py,4,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
      return true;
    });

    deathParticles=deathParticles.filter(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vy-=0.05;p.vx*=0.97;p.life--;if(p.life<=0)return false;
      ctx.save();ctx.globalAlpha=p.life/p.maxLife;
      ctx.translate(Math.round(p.x/100*W),Math.round(p.y/100*H));
      if(p.flip){ctx.scale(-1,1);ctx.translate(-p.sp.w*p.sc,0);}
      p.sp.p.forEach(([x,y,c])=>{ctx.fillStyle=c;ctx.fillRect(x*p.sc,y*p.sc,p.sc,p.sc);});
      ctx.restore();return true;
    });

    syncAnim();
    fishAnim.forEach(a=>{
      a.wobble+=0.03;
      const fish=S.fish.find(f=>f.uid===a.uid);
      const cat=FISH_DEF.find(d=>d.id===a.id);
      const pb=PERSONALITY_BEHAVIOR[cat?.personality]||PERSONALITY_BEHAVIOR.curious;
      const ns=isNight?0.4:1;
      const hunger=fish?.hunger||50;

      let chasing=false;
      if(foodPellets.length>0){
        let nearest=null,nearestD=9999;
        foodPellets.forEach(fp=>{if(fp.eaten)return;const d=Math.hypot(a.x-fp.x,a.y-(fp.y/100*100));if(d<nearestD){nearestD=d;nearest=fp;}});
        if(nearest&&nearestD<65){
          const urgency=Math.max(0.4,(100-hunger)/60)*(pb.foodMult||1)*ns;
          const spd=0.28*urgency;
          const dx=nearest.x-a.x;const dy=(nearest.y/100*100)-a.y;
          const dist=Math.hypot(dx,dy)||1;
          a.dx=dx/dist*spd;a.dy=dy/dist*spd;chasing=true;
          if(nearestD<5){nearest.eaten=true;if(fish){fish.hunger=Math.min(100,fish.hunger+(hunger<30?35:20));sv();}for(let i=0;i<8;i++)splashParticles.push({x:a.x/100*W,y:a.y/100*H,vx:(Math.random()-0.5)*3,vy:-Math.random()*2.5,life:22,color:'#FFB300'});renderFishList();}
        }
      }

      if(!chasing){
        if(pb.aggro&&Math.random()<0.002*ns){
          const others=fishAnim.filter(o=>o.uid!==a.uid&&Math.hypot(o.x-a.x,o.y-a.y)<35);
          if(others.length){const tgt=others[0];a.dx=(tgt.x-a.x)/Math.hypot(tgt.x-a.x,tgt.y-a.y)*0.2*ns;a.dy=(tgt.y-a.y)/Math.hypot(tgt.x-a.x,tgt.y-a.y)*0.12*ns;const v=fishAnim.find(o=>o.uid===tgt.uid);if(v){const vc=FISH_DEF.find(d=>d.id===v.id);if(PERSONALITY_BEHAVIOR[vc?.personality]?.flees){v.dx=-(a.x-v.x)/Math.hypot(a.x-v.x,a.y-v.y)*0.22*ns;v.dy=-(a.y-v.y)/Math.hypot(a.x-v.x,a.y-v.y)*0.12*ns;}}}
        } else {
          if(Math.random()<pb.changeDir*ns){a.dx=(Math.random()-0.5)*0.24*pb.speedMult*ns;}
          if(Math.random()<pb.changeDir*0.5*ns){a.dy=(Math.random()-0.5)*0.12*ns;}
        }
      }

      a.x+=a.dx;a.y+=a.dy+Math.sin(a.wobble)*0.03;
      if(a.x<2){a.x=2;a.dx=Math.abs(a.dx);}if(a.x>93){a.x=93;a.dx=-Math.abs(a.dx);}
      if(a.y<3){a.y=3;a.dy=Math.abs(a.dy);}if(a.y>73){a.y=73;a.dy=-Math.abs(a.dy);}

      a.poopCooldown=(a.poopCooldown||0)-1;
      if(a.poopCooldown<=0&&cat&&Math.random()<cat.poop*0.01){
        poopParticles.push({x:Math.round(a.x/100*W),y:Math.round(a.y/100*H),vy:0.6+Math.random()*0.5,life:80});
        S.poopLevel=Math.min(100,(S.poopLevel||0)+0.5);a.poopCooldown=160+Math.random()*220;
      }

      if(a.clickAnim>0){
        a.clickAnim--;const px2=Math.round(a.x/100*W);const py2=Math.round(a.y/100*H);
        ctx.save();ctx.globalAlpha=a.clickAnim/20;ctx.strokeStyle='#FFD700';ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(px2,py2,a.clickAnim*1.3,0,Math.PI*2);ctx.stroke();ctx.restore();
      }

      const sp=a.stage==='baby'?getBabySprite(a.id):getSprite(a.id);
      const sc=a.stage==='baby'?3:5;
      const px=Math.round(a.x/100*W);const py=Math.round(a.y/100*H);
      ctx.save();ctx.translate(px,py-sp.h*sc/2);
      if(a.dx<0){ctx.scale(-1,1);ctx.translate(-sp.w*sc,0);}
      sp.p.forEach(([x,y,c])=>{ctx.fillStyle=c;ctx.fillRect(x*sc,y*sc,sc,sc);});
      ctx.restore();

      a.emoteTimer=(a.emoteTimer||0)+1;
      if(a.emoteTimer%180<50){
        const mood=fish?getFishMood(fish):'content';const em=MOOD_EMOTES[mood];
        if(em){ctx.save();ctx.globalAlpha=0.8;ctx.fillStyle=mood==='hungry'?'#FFB300':mood==='scared'?'#ff6b6b':mood==='happy'?'#ff6b9d':'#B3E5FC';ctx.font='9px monospace';ctx.textAlign='center';ctx.fillText(em,px+sp.w*sc/2,py-sp.h*sc/2-5);ctx.restore();}
      }
    });

    if(nightAlpha>0){
      ctx.save();ctx.globalAlpha=nightAlpha;ctx.fillStyle='#001030';ctx.fillRect(0,0,W,H);ctx.restore();
      if(isNight){ctx.save();ctx.globalAlpha=0.7;for(let i=0;i<14;i++){ctx.fillStyle='#E1F5FE';ctx.fillRect(Math.round(W*(0.03+((i*73)%94)*0.01)),Math.round(H*0.04+((i*37)%52)*H*0.005),2,2);}ctx.restore();}
    }
    ctx.save();ctx.globalAlpha=0.06;ctx.fillStyle='#fff';ctx.fillRect(0,0,12,H);ctx.fillRect(W-10,0,10,H);ctx.restore();

    if(S.owned.airpump&&Math.random()<0.02)playBubble();

    raf=requestAnimationFrame(frame);
  }
  frame();
}

/* ═══════════════════════════════════════════════════════════
   GAME LOOP
═══════════════════════════════════════════════════════════ */
let lastTickTime=Date.now();
function gameLoop(){
  const now=Date.now();const realMs=now-lastTickTime;
  const msPerGameDay=3600000;const msPerGameMin=msPerGameDay/1440;const gameMins=realMs/msPerGameMin;
  S.gameTime=(S.gameTime||480)+gameMins;S.day=1+Math.floor(S.gameTime/1440);
  if(Math.floor(S.gameTime/1440)>Math.floor((S.gameTime-gameMins)/1440))onNewDay();
  S.plantAge+=(gameMins/1440)*2;
  if(S.waterAdded){S.poopLevel=Math.max(0,S.poopLevel-(S.owned.filter2?0.04:S.owned.filter?0.02:0)*gameMins/60);recalcWater();}
  lastTickTime=now;
  const h=Math.floor((S.gameTime%1440)/60);const m=Math.floor(S.gameTime%60);
  document.getElementById('time-display').textContent='Day '+S.day+' — '+String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
  renderHUD();if(Math.random()<0.001*gameMins)sv();
  setTimeout(gameLoop,500);
}

function onNewDay(){
  coin(10);addXP(5);showAl('global','New day! +10 coins','ok');
  S._marketRares=null;S._decoRares=null;S._plantRares=null;
  let deathToday=false;
  if(S.owned.autofeeder){S.fish.forEach(f=>{f.hunger=Math.min(100,f.hunger+25);});}
  S.fish.forEach(f=>{
    f.hunger=Math.max(0,f.hunger-20);f.age+=1;if(f.age>=10&&f.stage==='baby')f.stage='adult';
    if(f.hunger<20)f.health=Math.max(0,f.health-15);
    if(avgW()<50&&!f.diseased&&Math.random()<(S.owned.uv?0.08:0.15)){
      const dis=DISEASES[Math.floor(Math.random()*DISEASES.length)];f.diseased=true;f.disease=dis.id;showAl('global',f.name+' caught '+dis.name+'!','bad');
    }
    if(f.diseased){const dis=DISEASES.find(d=>d.id===f.disease);if(dis)f.health=Math.max(0,f.health-dis.damage/2);}
    if(f.health<=0){
      const anim=fishAnim.find(a=>a.uid===f.uid);
      if(anim){const sp=f.stage==='baby'?getBabySprite(f.id):getSprite(f.id);for(let i=0;i<6;i++)deathParticles.push({x:anim.x,y:anim.y,vx:(Math.random()-0.5)*0.9,vy:-0.4-Math.random()*0.6,sp,sc:f.stage==='baby'?3:5,flip:Math.random()<0.5,life:60,maxLife:60});}
      S.fish=S.fish.filter(x=>x.uid!==f.uid);S.totalDeaths=(S.totalDeaths||0)+1;deathToday=true;showAl('global',f.name+' has died...','bad');
    }
  });
  if(!deathToday&&S.fish.length>0){S.daysWithoutDeath=(S.daysWithoutDeath||0)+1;if(S.daysWithoutDeath>(S.maxDaysWithoutDeath||0))S.maxDaysWithoutDeath=S.daysWithoutDeath;}else if(deathToday)S.daysWithoutDeath=0;
  const groups={};S.fish.forEach(f=>{groups[f.id]=groups[f.id]||[];groups[f.id].push(f);});
  Object.keys(groups).forEach(id=>{
    const cat=FISH_DEF.find(c=>c.id===id);if(!cat||!cat.breedable||groups[id].filter(f=>f.stage==='adult').length<2||avgW()<75)return;
    if(Math.random()<0.06&&S.fish.length<getTankCap()){const name=NAMES[Math.floor(Math.random()*NAMES.length)];S.fish.push({id,name,health:100,hunger:100,age:0,stage:'baby',diseased:false,disease:null,uid:++S.uid});S.totalBred=(S.totalBred||0)+1;showAl('global','Baby '+cat.name+' ('+name+') was born!','ok');addXP(10);}
  });
  sv();renderFishList();checkAch();
}

/* ═══════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════ */
ld();
lastTickTime=Date.now();
document.getElementById('CD').textContent='Coins: '+S.coins;
document.getElementById('LD').textContent='Lv. '+S.level;
updateTankBadge();
renderShop();renderHUD();recalcWater();renderWaterBar();renderSetup();
if(S.waterAdded&&(!S.plantSeeds||!S.plantSeeds.length))initPlants();
document.getElementById('audio-btn').classList.toggle('on',audioEnabled);
setTimeout(drawTank,80);
setTimeout(gameLoop,500);
setTimeout(()=>{getAudio();startBGM();},1500);
</script>
