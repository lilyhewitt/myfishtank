<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Zen Aquarium 🐟</title>
<style>
/* Clean sans-serif fonts — no pixel font */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg-deep:#1f2c33;--bg-mid:#2d4048;--bg-soft:#49636d;
  --water-top:#5f8fa1;--water-mid:#3f6775;--water-deep:#233740;
  --panel:rgba(18,28,34,0.58);--panel-strong:rgba(16,24,30,0.82);
  --line:rgba(255,255,255,0.08);
  --text:#edf4f3;--muted:#a7b9b8;--soft:#c8d8d6;
  --accent:#8fb7b3;--accent-2:#9fc7c2;--alert:#d8c7a1;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
}
html,body{height:100%;overflow:hidden;touch-action:manipulation;}
body{background:var(--bg-deep);color:var(--text);font-family:var(--font);font-size:15px;-webkit-font-smoothing:antialiased;}

/* ── FULLSCREEN TANK ── */
#app{position:relative;width:100%;height:100%;max-width:520px;margin:0 auto;overflow:hidden;}
#TC{position:absolute;top:0;left:0;width:100%;height:100%;image-rendering:pixelated;cursor:pointer;display:block;}
.tank-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}

/* ── FLOATING HUD: fades after 4s ── */
.float-hud{position:absolute;top:0;left:0;right:0;z-index:20;display:flex;justify-content:space-between;align-items:center;padding:12px 14px 8px;transition:opacity 0.8s ease;pointer-events:none;opacity:0.82;}
.float-hud>*{pointer-events:auto;}
.float-hud.dim{opacity:0.18;}
.hud-left,.hud-right{display:flex;align-items:center;gap:6px;}
.hud-txt{font-size:11px;color:rgba(255,255,255,0.35);font-weight:300;letter-spacing:0.5px;}
.mood-txt{font-size:11px;}
.hud-pill{font-size:11px;color:var(--muted);background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.05);padding:4px 9px;border-radius:999px;font-weight:400;}
.hud-pill.shell{color:var(--accent);}
.hud-btn{font-size:11px;width:30px;height:30px;border-radius:50%;border:none;background:rgba(255,255,255,0.04);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:rgba(255,255,255,0.35);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.hud-btn:active{opacity:0.5;}

/* ── BOTTOM FAB BUTTONS ── */
.float-btns{position:absolute;bottom:16px;left:0;right:0;z-index:20;display:flex;justify-content:center;gap:12px;padding:0 16px;transition:opacity 1s ease;}
.float-btns.dim{opacity:0.2;}
.fab{width:52px;height:52px;border-radius:26px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.10);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s ease;box-shadow:0 6px 18px rgba(0,0,0,0.18);}
.fab:active{transform:scale(0.94);}
.fab.active{background:rgba(143,183,179,0.18);border-color:rgba(143,183,179,0.26);}

/* ── SLIDE-UP PANEL ── */
.panel-overlay{position:absolute;top:0;left:0;right:0;bottom:0;z-index:25;background:rgba(0,0,0,0.25);opacity:0;pointer-events:none;transition:opacity .4s ease;}
.panel-overlay.show{opacity:1;pointer-events:auto;}
.slide-panel{position:absolute;bottom:0;left:0;right:0;z-index:30;background:rgba(14,22,27,0.82);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-top:1px solid rgba(255,255,255,0.06);border-radius:20px 20px 0 0;transform:translateY(100%);transition:transform .32s cubic-bezier(0.25,0.8,0.25,1);max-height:65vh;display:flex;flex-direction:column;}
.slide-panel.show{transform:translateY(0);}
.panel-handle{display:flex;justify-content:center;padding:8px 0 4px;cursor:grab;}
.handle-bar{width:32px;height:4px;background:rgba(255,255,255,0.12);border-radius:2px;}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:0 16px 8px;border-bottom:1px solid rgba(255,255,255,0.06);}
.panel-title{font-size:13px;color:rgba(255,255,255,0.65);font-weight:600;}
.panel-close{background:none;border:none;color:rgba(255,255,255,0.3);font-size:16px;cursor:pointer;padding:6px 10px;border-radius:10px;}
.panel-close:active{background:rgba(255,255,255,0.1);}
.panel-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 12px 20px;}
.panel-section{margin-bottom:10px;}
.section-label{font-size:11px;color:rgba(255,255,255,0.3);margin:16px 0 8px;font-weight:400;}

/* Tab content: all hidden by default in panel */
.sc{display:none;}.sc.v{display:block;}

/* ── GRID AND ITEMS (larger touch targets) ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px;}
.item{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.05);border-radius:14px;padding:10px;text-align:center;transition:all .25s ease;}
.item:active{background:rgba(255,255,255,0.06);}
.item canvas{display:block;margin:0 auto 4px;image-rendering:pixelated;}
.iname{font-size:12px;color:rgba(255,255,255,0.7);margin-bottom:2px;font-weight:400;}.idesc{font-size:9px;color:rgba(255,255,255,0.3);margin-bottom:5px;line-height:1.3;}
.iprice{font-size:11px;color:var(--accent-2);margin-bottom:5px;}
.item button{padding:8px 10px;font-size:12px;border:1px solid rgba(255,255,255,0.06);border-radius:10px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.6);cursor:pointer;font-family:var(--font);width:100%;transition:all .25s ease;}
.item button:active{background:rgba(143,183,179,0.2);}
.item button:disabled{opacity:.3;cursor:not-allowed;}

/* ── FISH CARDS ── */
.fcard{display:flex;align-items:center;gap:10px;padding:10px;margin-bottom:5px;background:rgba(255,255,255,0.02);border:none;border-radius:12px;cursor:pointer;transition:all .25s ease;}
.fcard:active{background:rgba(255,255,255,0.05);}
.finfo{flex:1;}.fname{font-size:13px;color:var(--text);}
.ftag{font-size:9px;padding:2px 6px;border-radius:6px;display:inline-block;margin-right:3px;margin-top:2px;font-weight:300;}
.ftag-happy{background:rgba(123,173,165,0.1);color:rgba(143,193,185,0.7);}.ftag-calm{background:rgba(106,154,176,0.1);color:rgba(126,174,196,0.6);}
.ftag-idle{background:rgba(200,184,144,0.1);color:rgba(200,184,144,0.6);}.ftag-age{background:rgba(180,160,200,0.1);color:rgba(180,160,200,0.5);}
.fbtns{display:flex;flex-direction:column;gap:3px;}
.fbtns button{font-size:10px;padding:4px 8px;border:1px solid rgba(255,255,255,0.08);border-radius:6px;background:rgba(255,255,255,0.04);cursor:pointer;font-family:var(--font);color:var(--text);}
.fbtns button:active{background:rgba(255,255,255,0.1);}

/* ── MISC ── */
.btn{padding:10px 16px;background:rgba(143,183,179,0.12);color:var(--soft);border:1px solid rgba(143,183,179,0.1);border-radius:10px;cursor:pointer;font-size:14px;font-family:var(--font);transition:all .25s ease;}
.btn:active{background:rgba(123,173,165,0.3);}.btn:disabled{opacity:.25;cursor:not-allowed;}
.al{padding:6px 10px;border-radius:8px;font-size:12px;margin-bottom:6px;animation:slideIn .3s ease-out;}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px);}to{opacity:1;transform:translateX(0);}}
.ok{background:rgba(123,173,165,0.1);color:rgba(143,193,185,0.7);border:1px solid rgba(123,173,165,0.1);}
.warn{background:rgba(200,184,144,0.1);color:rgba(200,184,144,0.6);border:1px solid rgba(200,184,144,0.1);}
.bad{background:rgba(192,112,112,0.1);color:rgba(192,112,112,0.6);border:1px solid rgba(192,112,112,0.1);}
.stitle{display:none;}
.refresh-note{font-size:10px;color:rgba(255,255,255,0.25);margin-bottom:8px;text-align:center;}
.owned{font-size:9px;color:rgba(143,183,179,0.5);background:rgba(143,183,179,0.08);padding:2px 6px;border-radius:6px;display:inline-block;margin-top:2px;}
.rare-tag{font-size:8px;color:rgba(180,160,200,0.6);background:rgba(180,160,200,0.08);padding:1px 5px;border-radius:4px;display:inline-block;margin-bottom:1px;}
.super-rare-tag{font-size:8px;color:rgba(200,184,144,0.6);background:rgba(200,184,144,0.08);padding:1px 5px;border-radius:4px;display:inline-block;margin-bottom:1px;}
/* animations: shimmer/pulse removed — zen mode */
/* bars/rows removed — zen mode uses mood labels */

.feed-particle{position:absolute;pointer-events:none;font-size:10px;animation:feedDrop 1.2s ease-in forwards;z-index:15;}
@keyframes feedDrop{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(60px);}}
/* coin animations removed */
/* setup panel removed — tank pre-filled */
.zen-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.98);background:var(--panel-strong);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,0.05);border-radius:16px;padding:16px 24px;z-index:9998;font-size:13px;color:var(--soft);text-align:center;opacity:0;transition:opacity .24s ease,transform .3s ease;pointer-events:none;max-width:240px;}
.zen-toast.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
.zen-toast .toast-title{color:var(--alert);font-size:10px;margin-bottom:5px;font-weight:500;}
.ach-popup{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-50px);background:var(--panel-strong);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,0.05);border-radius:14px;padding:10px 16px;z-index:9999;display:flex;align-items:center;gap:8px;box-shadow:0 6px 24px rgba(0,0,0,0.12);transition:transform .34s ease;font-family:var(--font);}
.ach-popup.show{transform:translateX(-50%) translateY(0);}
.ach-popup .ach-text{color:var(--alert);font-size:12px;}.ach-popup .ach-sub{color:var(--muted);font-size:10px;}
.ach-icon{font-size:18px;width:28px;text-align:center;flex-shrink:0;}
.ach-card{display:flex;align-items:center;gap:8px;padding:10px;margin-bottom:4px;background:rgba(255,255,255,0.02);border:none;border-radius:10px;}
.ach-card.done{background:rgba(123,173,165,0.06);}
.ach-info{flex:1;}.ach-name{font-size:12px;color:var(--text);}.ach-desc{font-size:10px;color:var(--muted);margin-top:1px;}
.ach-reward{font-size:9px;color:var(--alert);margin-top:1px;}.ach-check{color:#4ade80;font-size:14px;}
.stat-item{background:rgba(255,255,255,0.02);border:none;border-radius:10px;padding:10px;text-align:center;}
.stat-val{font-size:13px;color:var(--accent);font-weight:500;}.stat-label{font-size:10px;color:rgba(255,255,255,0.3);margin-top:3px;}
/* upgrade cards removed */
/* v3.0 — Calm Aquarium UI */
</style>
</head>
<body>
<!-- FULLSCREEN TANK -->
<div id="app">
  <canvas id="TC"></canvas>
  <div class="tank-overlay" id="tank-setup-overlay"></div>

  <!-- FLOATING TOP HUD: minimal -->
  <div class="float-hud" id="float-hud">
    <div class="hud-left">
      <span id="time-display" class="hud-txt">Day 1</span>
    </div>
    <div class="hud-right">
      <span id="col-badge" class="hud-pill">📖 0</span>
      <button class="hud-btn" id="audio-btn">♪</button>
    </div>
  </div>
  <!-- Shell count + mood: shown only in panels -->
  <span id="CD" style="display:none">🐚 5</span>
  <span id="water-mood" style="display:none">🌊</span>

  <!-- STATUS BAR (invisible, just for JS refs) -->
  <div id="status-bar" style="display:none"><span id="tank-badge"></span></div>
  <div id="wq-bar" style="display:none"></div>
  <div id="HUD" style="display:none"></div>

  <!-- BOTTOM FLOAT BUTTONS -->
  <div class="float-btns" id="float-btns">
    <button class="fab" data-panel="market" title="Add Life">🐟</button>
    <button class="fab" data-panel="deco" title="Decorate">🎨</button>
    <button class="fab" data-panel="codex" title="Collection">📖</button>
    <button class="fab" data-panel="manage" title="Settings">⚙</button>
  </div>

  <!-- SLIDE-UP PANEL -->
  <div class="panel-overlay" id="panel-overlay"></div>
  <div class="slide-panel" id="slide-panel">
    <div class="panel-handle" id="panel-handle"><div class="handle-bar"></div></div>
    <div class="panel-header">
      <span class="panel-title" id="panel-title">Panel</span>
      <button class="panel-close" id="panel-close">✕</button>
    </div>
    <div class="panel-body" id="panel-body">
      <!-- Tab content sections -->
      <div id="a-global"></div>
      <div class="sc" id="s-market"><div class="refresh-note" id="market-note"></div><div id="a-market"></div><div class="section-label">Fish</div><div class="grid" id="fish-g"></div><div class="section-label" id="creature-note">Creatures</div><div class="grid" id="creature-g"></div><div class="section-label" id="plant-note">Plants</div><div class="grid" id="plant-g"></div></div>
      <div class="sc" id="s-deco"><div class="refresh-note" id="deco-note"></div><div id="a-deco"></div><div class="grid" id="deco-g"></div><div class="section-label">Tank Backdrop</div><div id="a-backdrops"></div><div class="section-label" id="backdrop-current"></div><div class="grid" id="backdrop-g"></div></div>
      <div class="sc" id="s-manage">
        <div id="a-manage"></div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <span style="font-size:11px;color:var(--muted);" id="manage-shells"></span>
          <span style="font-size:11px;color:var(--muted);" id="manage-mood"></span>
        </div>
        <div class="panel-section" id="manage-actions">
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
            <button class="btn" id="btn-changewater" style="background:#0288D1;flex:1;">💧 Change Water</button>
            <button class="btn" id="btn-clean" style="background:#00897B;flex:1;">🧹 Clean</button>
          </div>
        </div>
        <div class="section-label">My Creatures</div>
        <div id="a-myfish"></div>
        <div id="fish-list"></div>
        <div class="section-label">Placed Decorations</div>
        <div id="deco-list"></div>
        <div class="section-label">Planted Flora</div>
        <div id="plant-list"></div>
        <div class="section-label" style="margin-top:12px;">Stats</div>
        <div id="a-stats"></div>
        <div id="stats-content"></div>
      </div>
      <div class="sc" id="s-codex"><div id="codex-progress" class="section-label"></div><div id="codex-grid" class="grid" style="grid-template-columns:repeat(auto-fill,minmax(80px,1fr));"></div><div class="section-label" style="margin-top:16px;">Journal</div><div id="journal-list"></div></div>
      <div class="sc" id="s-achievements"><div id="a-achievements"></div><div id="ach-list"></div></div>
    </div>
  </div>
</div>

<div class="ach-popup" id="ach-popup"><div class="ach-icon" id="ach-popup-icon"></div><div><div class="ach-text" id="ach-popup-text"></div><div class="ach-sub" id="ach-popup-sub"></div></div></div>
<div class="zen-toast" id="zen-toast"><div class="toast-title" id="toast-title"></div><div id="toast-msg"></div></div>

<script>

/* ═══════════════════════════════════════════════════════════
   AUDIO ENGINE - Web Audio API procedural sounds + BGM
═══════════════════════════════════════════════════════════ */
let audioCtx=null,audioEnabled=true,bgmNode=null,bgmGain=null;

function getAudio(){
  if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}}
  if(audioCtx.state==='suspended')audioCtx.resume();
  return audioCtx;
}

function playBubble(){
  const ac=getAudio();if(!ac||!audioEnabled)return;
  const o=ac.createOscillator();const g=ac.createGain();
  o.connect(g);g.connect(ac.destination);
  o.type='sine';o.frequency.setValueAtTime(800+Math.random()*400,ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(200,ac.currentTime+0.15);
  g.gain.setValueAtTime(0.06,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.15);
  o.start();o.stop(ac.currentTime+0.15);
}

function playFeed(){
  const ac=getAudio();if(!ac||!audioEnabled)return;
  [0,0.05,0.1].forEach((d,i)=>{
    const o=ac.createOscillator();const g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type='sine';o.frequency.setValueAtTime(1200+i*200,ac.currentTime+d);
    o.frequency.exponentialRampToValueAtTime(400,ac.currentTime+d+0.12);
    g.gain.setValueAtTime(0.08,ac.currentTime+d);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+d+0.12);
    o.start(ac.currentTime+d);o.stop(ac.currentTime+d+0.12);
  });
}

function playWaterFlow(){
  const ac=getAudio();if(!ac||!audioEnabled)return;
  const buf=ac.createBuffer(1,ac.sampleRate*0.4,ac.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*0.15;
  const src=ac.createBufferSource();const g=ac.createGain();
  const f=ac.createBiquadFilter();f.type='bandpass';f.frequency.value=600;f.Q.value=0.5;
  src.buffer=buf;src.connect(f);f.connect(g);g.connect(ac.destination);
  g.gain.setValueAtTime(0,ac.currentTime);g.gain.linearRampToValueAtTime(0.12,ac.currentTime+0.1);
  g.gain.linearRampToValueAtTime(0,ac.currentTime+0.4);
  src.start();src.stop(ac.currentTime+0.4);
}

function startBGM(){
  const ac=getAudio();if(!ac)return;
  if(bgmNode){bgmNode.stop();bgmNode=null;}
  bgmGain=ac.createGain();bgmGain.gain.value=audioEnabled?0.18:0;bgmGain.connect(ac.destination);

  const tempo=0.48;
  // Original style melody extended to 64 beats (double length)
  const notes=[
    // Original 32 beats
    [261,0],[294,1],[329,2],[349,3],[392,4],[349,5],[329,6],[294,7],
    [261,8],[220,9],[246,10],[261,11],[294,12],[329,13],[349,14],[392,15],
    [440,16],[392,17],[349,18],[329,19],[294,20],[261,21],[246,22],[220,23],
    [196,24],[220,25],[246,26],[261,27],[294,28],[261,29],[220,30],[196,31],
    // Extension: variation phrase (same style, new melody)
    [261,32],[329,33],[392,34],[440,35],[392,36],[349,37],[329,38],[294,39],
    [349,40],[329,41],[294,42],[261,43],[246,44],[261,45],[294,46],[329,47],
    [349,48],[392,49],[440,50],[494,51],[440,52],[392,53],[349,54],[329,55],
    [294,56],[329,57],[294,58],[261,59],[246,60],[220,61],[246,62],[261,63],
  ];
  const bass=[
    [65,0],[65,4],[73,8],[65,12],[55,16],[55,20],[65,24],[55,28],
    [65,32],[73,36],[65,40],[55,44],[49,48],[55,52],[65,56],[55,60],
  ];
  const totalBeats=64;
  const loopDur=totalBeats*tempo;

  function scheduleLoop(startT){
    notes.forEach(([freq,beat])=>{
      const o=ac.createOscillator();const g=ac.createGain();
      o.connect(g);g.connect(bgmGain);
      o.type='triangle';o.frequency.value=freq;
      const t=startT+beat*tempo;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.35,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t+tempo*0.85);
      o.start(t);o.stop(t+tempo);
    });
    bass.forEach(([freq,beat])=>{
      const o=ac.createOscillator();const g=ac.createGain();
      o.connect(g);g.connect(bgmGain);
      o.type='square';o.frequency.value=freq;
      const t=startT+beat*tempo;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.08,t+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,t+tempo*3.8);
      o.start(t);o.stop(t+tempo*4);
    });
    for(let b=0;b<totalBeats;b+=2){
      const o=ac.createOscillator();const g=ac.createGain();
      o.connect(g);g.connect(bgmGain);
      o.type='sine';o.frequency.value=523+Math.sin(b)*80;
      const t=startT+b*tempo+tempo*0.5;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.06,t+0.03);
      g.gain.exponentialRampToValueAtTime(0.001,t+tempo*0.4);
      o.start(t);o.stop(t+tempo*0.5);
    }
    setTimeout(()=>scheduleLoop(ac.currentTime+0.1),loopDur*1000-200);
  }
  scheduleLoop(ac.currentTime+0.1);
}

function toggleAudio(){
  audioEnabled=!audioEnabled;
  const btn=document.getElementById('audio-btn');
  btn.textContent=audioEnabled?'♪ ON':'♪ OFF';
  btn.classList.toggle('on',audioEnabled);
  if(bgmGain)bgmGain.gain.value=audioEnabled?0.18:0;
  if(audioEnabled)startBGM();
}

// Unified per-species config (works for both fish and creatures)
// sc = pixel scale in tank, speedX/speedY = base velocity, idleTime for idle_burst
function getSpeciesCfg(id,isCreature){
  const def=isCreature?CREATURES_DEF.find(d=>d.id===id):FISH_DEF.find(d=>d.id===id);
  if(!def)return{yMin:5,yMax:73,sc:isCreature?4:6,moveStyle:'normal',social:'normal',feedLayer:'mid'};
  const pb=PERSONALITY_BEHAVIOR[def.personality]||PERSONALITY_BEHAVIOR.peaceful;
  const baseSpd=(isCreature?0.03:0.045)*( pb.speedMult||1);// zen: slower, lazier
  return{
    yMin:def.yMin,yMax:def.yMax,
    sc:3,// unified pixel size
    moveStyle:def.moveStyle||'normal',
    social:def.social||'normal',
    feedLayer:def.feedLayer||'mid',
    speedX:baseSpd,speedY:baseSpd*0.5,
    changeDir:pb.changeDir||0.003,
    aggro:!!pb.aggro,flees:!!pb.flees,foodMult:pb.foodMult||1,
  };
}

function getBabySprite(id){
  const sp=getSprite(id);
  const seen=new Set();
  return {w:Math.ceil(sp.w*0.55),h:Math.ceil(sp.h*0.55),
    p:sp.p.map(([x,y,c])=>[Math.round(x*0.55),Math.round(y*0.55),c])
      .filter(([x,y])=>{const k=x+','+y;if(seen.has(k))return false;seen.add(k);return true;})
  };
}

function makeFishCanvas(id,size,stage){
  const sp=stage==='baby'?getBabySprite(id):getSprite(id);
  const sc=Math.max(1,Math.floor(size/Math.max(sp.w,sp.h)));
  const c=document.createElement('canvas');
  c.width=sp.w*sc;c.height=sp.h*sc;
  c.style.width=c.width+'px';c.style.height=c.height+'px';
  c.style.display='block';c.style.margin='0 auto 3px';c.style.imageRendering='pixelated';
  const ctx=c.getContext('2d');
  sp.p.forEach(([x,y,col])=>{ctx.fillStyle=col;ctx.fillRect(x*sc,y*sc,sc,sc);});
  return c;
}

function drawPlantCanvas(id,size){
  const c=document.createElement('canvas');c.width=size;c.height=size;
  c.style.width=size+'px';c.style.height=size+'px';c.style.imageRendering='pixelated';
  const ctx=c.getContext('2d');
  const pc=PLANT_COLORS[id]||PLANT_COLORS.vallis;
  const sc=2;
  if(pc.shape==='ball'){
    ctx.fillStyle=pc.leaf[1];ctx.fillRect(4*sc,2*sc,8*sc,8*sc);
    ctx.fillStyle=pc.leaf[0];ctx.fillRect(6*sc,1*sc,4*sc,10*sc);
    ctx.fillStyle=pc.leaf[2];ctx.fillRect(7*sc,3*sc,2*sc,4*sc);
    ctx.fillStyle=pc.stem;ctx.fillRect(7*sc,10*sc,2*sc,4*sc);
  } else {
    ctx.fillStyle=pc.stem;ctx.fillRect(7*sc,3*sc,2*sc,9*sc);
    [2,5,8].forEach((y,i)=>{ctx.fillStyle=pc.leaf[i%3];ctx.fillRect((4+i)*sc,y*sc,5*sc,3*sc);});
    ctx.fillStyle=pc.leaf[0];ctx.fillRect(5*sc,1*sc,6*sc,3*sc);
  }
  return c;
}

function sv(){S.lastLoginTime=Date.now();try{localStorage.setItem('aq8',JSON.stringify(S));}catch(e){}}

function coin(n){S.coins+=n;document.getElementById('CD').textContent='🐚 '+S.coins;sv();}

function coinFlyAnim(text){const el=document.createElement('div');el.className='coin-fly';el.textContent=text;const cd=document.getElementById('CD');if(!cd)return;const r=cd.getBoundingClientRect();el.style.left=(r.left+r.width/2)+'px';el.style.top=(r.top-5)+'px';document.body.appendChild(el);setTimeout(()=>el.remove(),1000);}
function showAl(z,m,t){const el=document.getElementById('a-'+(z||'global'));if(!el)return;el.innerHTML='<div class="al '+t+'">'+m+'</div>';setTimeout(()=>{if(el)el.innerHTML='';},3000);}
function getTankCap(){return TANK_SIZES[S.tankSize||0].capacity;}
function avgW(){const v=Object.values(S.waterScore||{});if(!v.length)return 0;return Math.round(v.reduce((a,b)=>a+b,0)/v.length);}
function getWaterTemp(){return S.owned.heater2?27:S.owned.heater?25:18;}
function getDef(f){return f.isCreature?CREATURES_DEF.find(d=>d.id===f.id):FISH_DEF.find(d=>d.id===f.id);}
function getFishMood(f){
  const hour=Math.floor((S.gameTime%1440)/60);
  if(hour>=21||hour<6)return'sleepy';
  const def=getDef(f);
  if(def?.social==='schooling'){
    const sameSpecies=S.fish.filter(x=>x.id===f.id&&x.uid!==f.uid).length;
    if(sameSpecies===0)return'lonely';
  }
  const ws=getWaterState();
  if(ws==='lazy')return'content';
  if(def?.personality==='playful')return'playful';
  if(def?.personality==='shy')return'content';
  if(Math.random()<0.3)return'happy';
  return'content';
}

function checkAch(){ACHIEVEMENTS.forEach(a=>{if((S.achievements||[]).includes(a.id))return;if(a.check(S)){if(!S.achievements)S.achievements=[];S.achievements.push(a.id);showAchPopup(a);sv();}});}
function showAchPopup(a){const p=document.getElementById('ach-popup');document.getElementById('ach-popup-icon').textContent=a.icon;document.getElementById('ach-popup-text').textContent='Achievement: '+a.name;document.getElementById('ach-popup-sub').textContent=a.desc;p.classList.add('show');setTimeout(()=>p.classList.remove('show'),3500);}
function updateTankBadge(){const el=document.getElementById('tank-badge');if(el)el.textContent='Tank: '+TANK_SIZES[S.tankSize||0].name;}

function recalcWater(){
  const pp=Math.round(S.poopLevel*0.4);
  const fb=(S.owned.filter2?35:S.owned.filter?25:0);
  const pb=Math.min(15,Math.floor((S.plantSeeds||[]).length*2));
  const co2=S.owned.co2?12:0;
  S.waterScore={
    ph:     Math.min(100,Math.max(0,80+(S.owned.filter||S.owned.filter2?5:0)+pb+co2-pp)),
    ammonia:Math.min(100,Math.max(0,65+fb+pb-Math.round(pp*1.2))),
    oxygen: Math.min(100,Math.max(0,45+(S.owned.airpump2?45:S.owned.airpump?30:0)+(S.owned.filter||S.owned.filter2?10:0)+pb)),
    temp:   Math.min(100,Math.max(0,55+(S.owned.heater2?40:S.owned.heater?32:0))),
    clarity:Math.min(100,Math.max(0,50+fb+(S.owned.gravel?18:0)-pp)),
  };
  Object.keys(S.waterScore).forEach(k=>{S.waterScore[k]=Math.round(S.waterScore[k]);});
  renderWaterBar();
}

const PANEL_NAMES={market:'Add Life',deco:'Decorate',codex:'Collection',manage:'Settings'};
function openPanel(name){
  if(currentPanel===name){closePanel();return;}
  currentPanel=name;
  if(panelTitleEl)panelTitleEl.textContent=PANEL_NAMES[name]||name;
  document.querySelectorAll('#panel-body .sc').forEach(s=>s.classList.remove('v'));
  const target=document.getElementById('s-'+name);
  if(target)target.classList.add('v');
  if(name==='market'){renderMarket();renderCreatures();renderPlants();}
  if(name==='deco'){renderDeco();renderBackdrops();}
  if(name==='codex'){renderCodex();renderJournal();}
  if(name==='manage'){renderFishList();renderPlacedItems();renderStats();
    const mse=document.getElementById('manage-shells');if(mse)mse.textContent='🐚 '+S.coins+' shells';
    const mmo=document.getElementById('manage-mood');if(mmo)mmo.textContent=document.getElementById('water-mood')?.textContent||'';}
  if(panelEl)panelEl.classList.add('show');
  if(panelOverlay)panelOverlay.classList.add('show');
  document.querySelectorAll('.fab').forEach(f=>f.classList.remove('active'));
  const fab=document.querySelector('.fab[data-panel="'+name+'"]');
  if(fab)fab.classList.add('active');
}
function closePanel(){
  currentPanel=null;
  if(panelEl)panelEl.classList.remove('show');
  if(panelOverlay)panelOverlay.classList.remove('show');
  document.querySelectorAll('.fab').forEach(f=>f.classList.remove('active'));
}

function renderShop(){
  const container=document.getElementById('shop-g');if(!container)return;
  const items=EQ.filter(e=>{
    if(e.requires)return S.owned[e.requires]&&!S.owned[e.id];
    return !S.owned[e.id];
  });
  const owned=EQ.filter(e=>S.owned[e.id]);
  let html='';

  // Equipment grid
  html+='<div class="grid" style="margin-bottom:8px;">';
  if(items.length){
    html+=items.map(e=>{
      const isUpgrade=!!e.requires;
      const prevName=isUpgrade?(EQ.find(x=>x.id===e.requires)||{}).name:'';
      return '<div class="item">'
        +(isUpgrade?'<div style="font-size:9px;color:#FFB300;margin-bottom:2px;">⬆ UPGRADE from '+prevName+'</div>':'')
        +'<div style="font-size:24px;margin-bottom:4px;color:var(--gold)">'+e.icon+'</div>'
        +'<div class="iname">'+e.name+'</div><div class="idesc">'+e.desc+'</div>'
        +((e.price>0)?'<div class="iprice">'+e.price+' 🐚</div>':'<div style="font-size:10px;color:var(--green);margin-bottom:3px">Free</div>')
        +'<button data-eq="'+e.id+'" '+(S.coins<e.price?'disabled':'')+'>'+(isUpgrade?'Upgrade':'Buy')+'</button>'
        +'</div>';
    }).join('');
  } else {
    html+='<div style="font-size:13px;color:var(--muted);padding:8px 0;">All equipment owned!</div>';
  }
  html+='</div>';

  // Owned equipment compact strip
  if(owned.length){
    html+='<div style="border-top:1px solid var(--border);padding-top:8px;margin-bottom:12px;">'
      +'<div style="font-size:11px;color:var(--muted);margin-bottom:5px;">✓ Owned</div>'
      +'<div style="display:flex;flex-wrap:wrap;gap:5px;">'
      +owned.map(e=>'<div style="font-size:12px;background:#ffffff08;border:1px solid var(--border);border-radius:6px;padding:3px 8px;">'+e.icon+' '+e.name+'</div>').join('')
      +'</div></div>';
  }

  // Tank Upgrades section — inline, no separate div needed
  html+='<div style="border-top:1px solid var(--border);padding-top:10px;">'
    +'<div class="stitle" style="margin-bottom:8px;font-size:8px;">Tank Upgrades</div>';
  TANK_SIZES.forEach(function(t,i){
    const cur=i===(S.tankSize||0);
    const bought=i<=(S.tankSize||0);
    const next=i===(S.tankSize||0)+1;
    const icon=['🏠','🏡','🏘','🏰'][i]||'🏰';
    html+='<div class="upgrade-card" style="'+(cur?'border-color:var(--green);border-width:2px;':'')+'margin-bottom:6px;">'
      +'<div class="up-icon">'+icon+'</div>'
      +'<div class="up-info">'
      +'<div class="up-name">'+t.name+' Tank <span style="font-size:10px;color:var(--muted);">('+t.capacity+' fish \u00b7 '+t.decoCap+' decos)</span></div>'
      +(cur
        ?'<div style="font-size:11px;color:var(--green);margin-top:2px;">\u2713 Current tank</div>'
        :(bought
          ?'<div style="font-size:11px;color:var(--green);margin-top:2px;">\u2713 Unlocked</div>'
          :((t.cost>0)?'<div class="up-price">'+t.cost+' 🐚</div>':'<div style="font-size:10px;color:var(--green)">Free</div>')))
      +'</div>'
      +(next&&!bought
        ?'<button class="btn" style="font-size:12px;padding:6px 12px;white-space:nowrap;" data-upgrade="'+i+'" '+(S.coins<t.cost?'disabled':'')+'>Upgrade</button>'
        :'')
      +'</div>';
  });
  html+='</div>';

  container.innerHTML=html;

  container.querySelectorAll('[data-eq]').forEach(function(btn){
    btn.addEventListener('click',function(){
      const id=this.dataset.eq;const e=EQ.find(function(x){return x.id===id;});
      if(!e||S.owned[id]||S.coins<e.price)return;
      coin(-e.price);S.owned[id]=true;addXP(10);sv();recalcWater();
      showAl('shop','Got '+e.name+'!','ok');renderShop();renderHUD();renderSetup();checkAch();
    });
  });

  container.querySelectorAll('[data-upgrade]').forEach(function(btn){
    btn.addEventListener('click',function(){
      const idx=parseInt(this.dataset.upgrade);const t=TANK_SIZES[idx];
      if(S.coins<t.cost)return;
      coin(-t.cost);S.tankSize=idx;addXP(30);sv();
      showAl('shop','Tank upgraded to '+t.name+'!','ok');renderShop();updateTankBadge();renderHUD();checkAch();
    });
  });
}

function getMarketRares(){
  const refreshDay=Math.floor(S.day/7)*7;
  if(S._marketRareDay!==refreshDay||!S._marketRares){
    S._marketRareDay=refreshDay;
    const rares=FISH_DEF.filter(f=>f.rarity==='rare'||f.rarity==='super_rare');
    S._marketRares=[];
    rares.forEach(r=>{if(Math.random()<(r.rarity==='super_rare'?0.25:0.5))S._marketRares.push(r.id);});
    if(!S._marketRares.length)S._marketRares=[rares[0].id];
    sv();
  }
  return S._marketRares;
}

function renderMarket(){
  if(!S.waterAdded){
    document.getElementById('fish-g').innerHTML='<div style="font-size:13px;color:var(--muted);padding:12px">Add water first.</div>';
    document.getElementById('market-note').textContent='';return;
  }
  const cap=getTankCap();const full=S.fish.length>=cap;
  const nextRefresh=Math.ceil(S.day/7)*7;
  document.getElementById('market-note').textContent=full?'Tank full! Upgrade for more room.':'Rare fish refresh on Day '+nextRefresh+'.';
  const rareIds=getMarketRares();
  let avail=[...FISH_DEF.filter(f=>f.rarity==='common'||f.rarity==='uncommon'),...FISH_DEF.filter(f=>rareIds.includes(f.id))];
  avail=avail.filter(f=>isSpeciesUnlocked(f));
  const grid=document.getElementById('fish-g');grid.innerHTML='';
  avail.forEach(f=>{
    const div=document.createElement('div');div.className='item';
    const fishThumb=makeFishCanvas(f.id,36);
    const thumbWrap=document.createElement('div');thumbWrap.style.cssText='width:56px;height:56px;display:flex;align-items:center;justify-content:center;margin:0 auto 4px;';thumbWrap.appendChild(fishThumb);
    div.appendChild(thumbWrap);
    const isR=f.rarity==='rare';const isSR=f.rarity==='super_rare';
    div.innerHTML+=(isSR?'<div class="super-rare-tag">★★ SUPER RARE</div>':isR?'<div class="rare-tag">★ RARE</div>':'')+
      '<div class="iname">'+f.name+'</div><div class="idesc">'+f.desc+'</div>'+
      '<div style="font-size:10px;color:var(--muted);margin-bottom:3px">'+f.temp+'</div>'+
      '<div class="iprice">'+f.price+' coins</div>'+
      '<button data-fish="'+f.id+'" '+(S.coins<f.price||full?'disabled':'')+'>Buy</button>';
    grid.appendChild(div);
  });
  grid.querySelectorAll('[data-fish]').forEach(btn=>{
    btn.addEventListener('click',function(){
      const id=this.dataset.fish;const cat=FISH_DEF.find(f=>f.id===id);
      if(!cat||S.coins<cat.price||S.fish.length>=cap)return;
      coin(-cat.price);const name=NAMES[Math.floor(Math.random()*NAMES.length)];
      S.fish.push({id,name,health:100,hunger:100,age:0,stage:'baby',diseased:false,disease:null,uid:++S.uid,variant:rollVariant()});
      S.totalFishBought=(S.totalFishBought||0)+1;addXP(5);discoverSpecies(id);discoverVariant(id,S.fish[S.fish.length-1].variant);sv();
      showZenToast('',name+' the '+cat.name+' settles into the water.');renderMarket();renderHUD();checkAch();
    });
  });
}

/* ═══════════════════════════════════════════════════════════
   PLANTS — refresh every 5 days
═══════════════════════════════════════════════════════════ */
function getPlantRares(){
  const refreshDay=Math.floor(S.day/5)*5;
  if(S._plantRareDay!==refreshDay||!S._plantRares){
    S._plantRareDay=refreshDay;
    const rares=PLANTS_DEF.filter(p=>p.rarity==='rare'||p.rarity==='super_rare');
    S._plantRares=[];
    rares.forEach(r=>{if(Math.random()<(r.rarity==='super_rare'?0.3:0.6))S._plantRares.push(r.id);});
    sv();
  }
  return S._plantRares||[];
}

  const sc=Math.floor(size/Math.max(sp.w,sp.h));
  const c=document.createElement('canvas');c.width=size;c.height=size;
  c.style.width=size+'px';c.style.height=size+'px';c.style.imageRendering='pixelated';
  const ctx=c.getContext('2d');
  sp.p.forEach(([x,y,col])=>{ctx.fillStyle=col;ctx.fillRect(x*sc,y*sc,sc,sc);});
  return c;
}

      coin(-pdef.price);addXP(5);
      if(!S.plantSeeds)S.plantSeeds=[];
      const W=document.getElementById('TC').width||600;
      // Smart placement: maximise distance from existing plants AND decos
      const occupied=[];
      (S.plantSeeds||[]).forEach(p=>occupied.push(p.x/W));
      (S.decos||[]).forEach(d=>occupied.push(d.x));
      const candidates=40;let bestX=0.05+Math.random()*0.88;let bestScore=-1;

function getDecoRares(){
  const refreshDay=Math.floor(S.day/10)*10;
  if(S._decoRareDay!==refreshDay||!S._decoRares){
    S._decoRareDay=refreshDay;
    const rares=DECO_DEF.filter(d=>d.rarity==='rare'||d.rarity==='super_rare');
    S._decoRares=[];
    rares.forEach(r=>{if(Math.random()<(r.rarity==='super_rare'?0.3:0.6))S._decoRares.push(r.id);});
    sv();
  }
  return S._decoRares||[];
}

function animateClean(){
  const canvas=document.getElementById('TC');if(!canvas)return;
  const overlay=document.getElementById('tank-setup-overlay');
  // Flash scrubbing bubbles over the tank briefly
  let frame=0;const total=40;
  const ctx=canvas.getContext('2d');
  const W=canvas.width;const H=canvas.height;
  function scrub(){
    if(frame>=total){overlay.innerHTML='';return;}
    frame++;
    // Overlay a semi-transparent wash sweep
    ctx.save();
    ctx.globalAlpha=0.18*Math.sin(frame/total*Math.PI);
    ctx.fillStyle='#B3E5FC';
    ctx.fillRect(0,0,W,H);
    ctx.restore();
    // Draw scrub bubbles
    ctx.save();
    ctx.globalAlpha=0.7*Math.sin(frame/total*Math.PI);
    for(let i=0;i<18;i++){
      const bx=Math.random()*W;const by=Math.random()*H;const r=3+Math.random()*6;
      ctx.strokeStyle='#ffffff';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);ctx.stroke();
    }
    ctx.restore();
    requestAnimationFrame(scrub);
  }
  scrub();
}

function animateWaterChange(){
  // Drain then refill animation
  const canvas=document.getElementById('TC');if(!canvas)return;
  const W=canvas.width;const H=canvas.height;const ctx=canvas.getContext('2d');
  let drainLevel=100;// percent full
  let phase='drain';
  // Boost water quality on change
  S.poopLevel=Math.max(0,S.poopLevel-60);
  S.fish.forEach(f=>{f.health=Math.min(100,f.health+10);});
  recalcWater();sv();showAl('manage','Water changed! Quality improved.','ok');
  function tick(){
    if(phase==='drain'){
      drainLevel-=2.5;
      if(drainLevel<=0){drainLevel=0;phase='fill';setTimeout(tick,200);return;}
    } else {
      drainLevel+=2.5;
      if(drainLevel>=100){drainLevel=100;phase='done';renderFishList();return;}
    }
    // Draw drain/fill level overlay
    const fillH=Math.round(drainLevel/100*H);
    const wy=H-fillH;
    ctx.save();
    ctx.globalAlpha=0.55;
    ctx.fillStyle='#0a1628';
    ctx.fillRect(0,0,W,wy);// empty part
    ctx.restore();
    // Ripple line
    ctx.save();ctx.globalAlpha=0.6;ctx.strokeStyle='#90CAF9';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,wy);ctx.lineTo(W,wy);ctx.stroke();
    ctx.restore();
    requestAnimationFrame(tick);
  }
  tick();
}

function animateClean(){
  const canvas=document.getElementById('TC');if(!canvas)return;
  const overlay=document.createElement('canvas');
  overlay.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;';
  overlay.width=canvas.width;overlay.height=canvas.height;
  canvas.parentElement.appendChild(overlay);
  const ctx2=overlay.getContext('2d');
  const W=canvas.width;const H=canvas.height;
  let frame=0;const totalFrames=90;
  // Scrubbing bubbles sweep L→R
  function tick(){
    ctx2.clearRect(0,0,W,H);
    const progress=frame/totalFrames;
    // Blue wash sweep
    ctx2.save();ctx2.globalAlpha=0.18*Math.sin(Math.PI*progress);
    ctx2.fillStyle='#B3E5FC';ctx2.fillRect(0,0,W*progress*1.1,H);ctx2.restore();
    // Scrub bubbles along the sweep line
    const sweepX=W*progress;
    for(let i=0;i<12;i++){
      const bx=sweepX-(Math.random()*40);
      const by=20+Math.random()*(H-40);
      const r=3+Math.random()*6;
      ctx2.save();ctx2.globalAlpha=0.5+Math.random()*0.4;
      ctx2.strokeStyle='#ffffff';ctx2.lineWidth=1.5;
      ctx2.beginPath();ctx2.arc(bx,by,r,0,Math.PI*2);ctx2.stroke();
      ctx2.restore();
    }
    // Sparkles trailing the sweep
    for(let i=0;i<8;i++){
      const sx=sweepX-Math.random()*80;const sy=Math.random()*H;
      ctx2.save();ctx2.globalAlpha=0.8;ctx2.fillStyle='#ffffff';
      ctx2.fillRect(sx,sy,2,2);ctx2.restore();
    }
    frame++;
    if(frame<=totalFrames)requestAnimationFrame(tick);
    else overlay.remove();
  }
  tick();
}

function animateWaterChange(){
  // Cost & cooldown
  if(S._waterChangeCooldown>0){showAl('manage','Wait '+(S._waterChangeCooldown)+' days before next water change.','warn');return;}
  const canvas=document.getElementById('TC');if(!canvas)return;
  const W=canvas.width;const H=canvas.height;
  const overlay=document.createElement('canvas');
  overlay.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;';
  overlay.width=W;overlay.height=H;
  canvas.parentElement.appendChild(overlay);
  const ctx2=overlay.getContext('2d');
  let frame=0;const totalFrames=140;
  function tick(){
    ctx2.clearRect(0,0,W,H);
    const p=frame/totalFrames;
    if(p<0.5){
      // Phase 1: water drains downward (dark blue receding)
      const drainH=H*(1-p*2);
      ctx2.save();ctx2.globalAlpha=0.55;
      ctx2.fillStyle='#0a2d6e';ctx2.fillRect(0,H-drainH,W,drainH);
      // drain ripples
      ctx2.strokeStyle='#4FC3F7';ctx2.lineWidth=1;ctx2.globalAlpha=0.3;
      for(let i=0;i<5;i++){
        ctx2.beginPath();ctx2.moveTo(0,H-drainH+(i*12));ctx2.lineTo(W,H-drainH+(i*12)+Math.sin(frame*0.3+i)*6);ctx2.stroke();
      }
      ctx2.restore();
    } else {
      // Phase 2: fresh water fills from bottom up
      const fillH=H*((p-0.5)*2);
      ctx2.save();ctx2.globalAlpha=0.5;
      ctx2.fillStyle='#29B6F6';ctx2.fillRect(0,H-fillH,W,fillH);
      // fill ripples & bubbles
      ctx2.strokeStyle='#E1F5FE';ctx2.lineWidth=1.5;ctx2.globalAlpha=0.35;
      for(let i=0;i<4;i++){
        ctx2.beginPath();ctx2.moveTo(0,H-fillH+(i*14));ctx2.lineTo(W,H-fillH+(i*14)+Math.sin(frame*0.4+i)*8);ctx2.stroke();
      }
      // rising bubbles
      ctx2.globalAlpha=0.6;ctx2.strokeStyle='#B3E5FC';ctx2.lineWidth=1;
      for(let i=0;i<10;i++){
        const bx=Math.random()*W;const by=H-fillH-((frame*3+i*35)%(fillH||1));
        ctx2.beginPath();ctx2.arc(bx,Math.max(0,by),2+Math.random()*3,0,Math.PI*2);ctx2.stroke();
      }
      ctx2.restore();
    }
    frame++;
    if(frame<=totalFrames)requestAnimationFrame(tick);
    else{
      overlay.remove();
      // Apply water change effects
      S.poopLevel=0;
      S.fish.forEach(f=>{f.health=Math.min(100,f.health+15);f.hunger=Math.min(100,f.hunger+10);});
      S._waterChangeCooldown=3;
      recalcWater();sv();renderFishList();renderHUD();
      showAl('manage','Fresh water! Fish feel great!','ok');
    }
  }
  tick();
}
function initPlants(){

  ];
  S.plantSeeds=defaults.map((entry,i)=>{
    return{id:entry.id,x:W*(0.04+i*0.14),maxH:(35+Math.random()*50)*0.8,swayOff:Math.random()*Math.PI*2,d:entry.d};
  });sv();

function getPlantH(p){return Math.min(p.maxH,4+(S.plantAge||0)*0.8);}

function drawPlant(ctx,p,t,W,H,baseY){
  const pc=PLANT_COLORS[p.id]||PLANT_COLORS.vallis;
  const depth=p.d||0.5;
  // sc=3 for all (unified), but height scaled by depth for perspective
  const sc=3;
  const depthHMult=0.7+depth*0.6;// back=0.82, mid=1.0, front=1.18
  const h=getPlantH(p)*sc*depthHMult;
  const base=baseY!==undefined?baseY:Math.round(H*0.75);
  const swayAmp=2+depth*3;// front sways more
  const sw=Math.sin(t*0.35+p.swayOff)*swayAmp+Math.sin(t*0.7+p.swayOff*2)*swayAmp*0.3;// dual-wave for organic feel
  if(pc.shape==='ball'){
    const by=base-h*0.6;const bx=Math.round(p.x+sw*0.5);
    for(let r=0;r<h*0.6;r+=sc){ctx.fillStyle=pc.leaf[Math.floor(r/h*3)%3];ctx.fillRect(bx-Math.round(h*0.4),by+r,Math.round(h*0.8),sc);}
    ctx.fillStyle=pc.stem;ctx.fillRect(bx-sc,base-h*0.5,sc*2,h*0.5);
    return;
  }
  ctx.fillStyle=pc.stem;
  for(let i=0;i<h;i+=sc){ctx.fillRect(Math.round(p.x+sw*(i/h))-sc-1,base-i,sc*3,sc);}
  if(pc.shape==='feather'){
    for(let i=sc*2;i<h;i+=sc*5){
      const wx=sw*(i/h);
      ctx.fillStyle=pc.leaf[Math.floor(i/h*3)%3];
      ctx.fillRect(Math.round(p.x+wx)-sc*4,base-i,sc*3,sc);
      ctx.fillRect(Math.round(p.x+wx)+sc,base-i,sc*3,sc);
      if(i>h*0.3){ctx.fillRect(Math.round(p.x+wx)-sc*6,base-i+sc,sc*3,sc);ctx.fillRect(Math.round(p.x+wx)+sc*3,base-i+sc,sc*3,sc);}
    }
  } else if(pc.shape==='rosette'){
    for(let l=0;l<6;l++){
      const angle=(l/6)*Math.PI*2+sw*0.05;
      const lx=Math.round(p.x+Math.cos(angle)*h*0.4+sw*0.5);
      const ly=Math.round(base-Math.abs(Math.sin(angle))*h*0.5-h*0.2);
      ctx.fillStyle=pc.leaf[l%3];
      ctx.fillRect(lx-sc*3,ly,sc*6,sc*2);ctx.fillRect(lx-sc*4,ly+sc,sc*8,sc*2);ctx.fillRect(lx-sc*3,ly+sc*3,sc*6,sc*2);
    }
  } else {
    const leaves=[[0,h],[sc*2,h*0.7],[-sc*2,h*0.5],[sc*3,h*0.35],[-sc*2,h*0.2]];
    leaves.forEach(([lx,ly])=>{
      const wx=sw*(ly/h);ctx.fillStyle=pc.leaf[Math.floor(ly/h*3)%3];
      ctx.fillRect(Math.round(p.x+lx+wx)-sc*4,Math.round(base-ly)-sc,sc*8,sc*2);
      ctx.fillRect(Math.round(p.x+lx+wx)-sc*5,Math.round(base-ly)+sc,sc*10,sc*2);
      ctx.fillRect(Math.round(p.x+lx+wx)-sc*4,Math.round(base-ly)+sc*3,sc*8,sc*2);
    });
  }
}

document.getElementById('TC').addEventListener('click',function(e){

function drawTank(){
  const canvas=document.getElementById('TC');if(!canvas)return;
  const W=canvas.width||390;
  const H=canvas.height||window.innerHeight||600;
  const ctx=canvas.getContext('2d');
  cancelAnimationFrame(raf);

  function frame(){
    const t=Date.now()/1000;
    ctx.clearRect(0,0,W,H);
    // Base fill — ensures no transparent areas anywhere
    ctx.fillStyle='#081830';ctx.fillRect(0,0,W,H);

    if(!S.waterAdded&&!S.waterAnim){
      ctx.fillStyle='#1a237e';ctx.fillRect(0,0,W,H);
      ctx.fillStyle='#3949AB';ctx.font='bold 13px monospace';ctx.textAlign='center';
      ctx.fillText('[ EMPTY TANK ]',W/2,H/2-12);
      ctx.fillStyle='#5C6BC0';ctx.font='11px monospace';
      ctx.fillText('buy equipment & add water',W/2,H/2+12);
      raf=requestAnimationFrame(frame);return;
    }

    if(S.waterAnim){
      S.waterLevel=Math.min(100,(S.waterLevel||0)+0.4);
      if(S.waterLevel>=100){S.waterAnim=false;S.waterAdded=true;recalcWater();sv();renderSetup();renderHUD();}
      ctx.fillStyle='#0a1628';ctx.fillRect(0,0,W,H);
      const wh=Math.round(S.waterLevel/100*H);const wy=H-wh;
      ctx.fillStyle='#0a2d6e';ctx.fillRect(0,wy,W,wh);
      ctx.fillStyle='rgba(100,180,255,0.3)';
      for(let i=0;i<8;i++)ctx.fillRect(Math.round(W*0.07+i*(W*0.12)+Math.sin(t*4+i)*8),wy,Math.round(W*0.08),4);
      ctx.fillStyle='#90CAF9';ctx.font='bold 12px monospace';ctx.textAlign='center';
      ctx.fillText('filling... '+Math.round(S.waterLevel)+'%',W/2,Math.max(20,wy-10));
      if(Math.random()<0.3)playBubble();
      raf=requestAnimationFrame(frame);return;
    }

    const hour=Math.floor((S.gameTime%1440)/60);
    const isNight=hour<6||hour>=20;const isDawn=hour>=5&&hour<8;const isDusk=hour>=18&&hour<21;
    const nightAlpha=isNight?0.55:isDawn||isDusk?0.25:0;

    // ── SMOOTH WATER GRADIENT — covers full canvas as base layer ──
    const waterGrad=ctx.createLinearGradient(0,0,0,H);
    waterGrad.addColorStop(0,'#081830');
    waterGrad.addColorStop(0.15,'#0c2248');
    waterGrad.addColorStop(0.35,'#0e2d60');
    waterGrad.addColorStop(0.55,'#103878');
    waterGrad.addColorStop(0.72,'#124090');
    waterGrad.addColorStop(1,'#0e3570');
    ctx.fillStyle=waterGrad;ctx.fillRect(0,0,W,H);
    // ── WATER SURFACE SHIMMER ──
    ctx.save();ctx.globalAlpha=0.15;
    ctx.strokeStyle='#a9d6e5';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,3);
    for(let i=0;i<W;i+=8){ctx.lineTo(i,3+Math.sin(t*1.2+i*0.02)*1.5);}
    ctx.stroke();ctx.restore();

    // ── BACKDROP THEME RENDERING — subtle naturalistic backgrounds ──
    const activeBackdrop=S.activeBackdrop||'none';
    if(activeBackdrop!=='none'){
      ctx.save();
      if(activeBackdrop==='lake'){
        // LAKE: olive-brown murky water, soft light from above, earthy
        const lg=ctx.createLinearGradient(0,0,0,H);
        lg.addColorStop(0,'#1a2818');lg.addColorStop(0.3,'#1e3020');lg.addColorStop(0.6,'#223828');lg.addColorStop(1,'#1a2818');
        ctx.globalAlpha=0.5;ctx.fillStyle=lg;ctx.fillRect(0,0,W,H);
        // Soft dappled light (not strong beams)
        ctx.globalAlpha=0.04;ctx.fillStyle='#a0c870';
        for(let i=0;i<5;i++){
          const sx=W*(0.1+i*0.18)+Math.sin(t*0.08+i*1.3)*15;
          ctx.beginPath();ctx.ellipse(sx,H*0.2+i*10,25,H*0.25,0,0,Math.PI*2);ctx.fill();
        }
        // Floating sediment
        ctx.globalAlpha=0.07;ctx.fillStyle='#c0b080';
        for(let i=0;i<8;i++){
          const px=(i*97+t*2.5)%W;const py=(i*61+t*4)%(H*0.68);
          ctx.fillRect(Math.round(px),Math.round(py),1,1);
        }
        ctx.restore();ctx.save();
      } else if(activeBackdrop==='ocean'){
        // OCEAN: deep navy with subtle light from above, sandy distant floor
        const og=ctx.createLinearGradient(0,0,0,H);
        og.addColorStop(0,'#06142a');og.addColorStop(0.4,'#0a2048');og.addColorStop(0.7,'#0c2855');og.addColorStop(1,'#081838');
        ctx.globalAlpha=0.45;ctx.fillStyle=og;ctx.fillRect(0,0,W,H);
        // Gentle light shafts (subtle)
        ctx.globalAlpha=0.03;ctx.fillStyle='#5080b0';
        for(let i=0;i<3;i++){
          const sx=W*(0.2+i*0.28)+Math.sin(t*0.06+i*2)*20;
          ctx.beginPath();ctx.moveTo(sx-10,0);ctx.lineTo(sx+10,0);ctx.lineTo(sx+45,H*0.8);ctx.lineTo(sx-45,H*0.8);ctx.closePath();ctx.fill();
        }
      } else if(activeBackdrop==='coral_reef'){
        // CORAL REEF: warm turquoise water, subtle warm glow from below
        const rg=ctx.createLinearGradient(0,0,0,H);
        rg.addColorStop(0,'#082830');rg.addColorStop(0.4,'#0e3a40');rg.addColorStop(0.7,'#124840');rg.addColorStop(1,'#0e3830');
        ctx.globalAlpha=0.4;ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);
        // Subtle warm undertone from reef
        const cPairs=[['#803040',0.15],['#806030',0.4],['#308060',0.65],['#604080',0.85]];
        cPairs.forEach(([col,xr])=>{
          ctx.globalAlpha=0.03;
          const g=ctx.createRadialGradient(W*xr,H*0.72,8,W*xr,H*0.72,50);
          g.addColorStop(0,col);g.addColorStop(1,'transparent');
          ctx.fillStyle=g;ctx.fillRect(W*xr-55,H*0.55,110,H*0.35);
        });
        // Warm surface light
        ctx.globalAlpha=0.03;ctx.fillStyle='#e0c080';ctx.fillRect(0,0,W,H*0.25);
      } else if(activeBackdrop==='deep_ocean'){
        // DEEP ABYSS: near-black with rare bioluminescence
        ctx.globalAlpha=0.6;ctx.fillStyle='#020408';ctx.fillRect(0,0,W,H);
        // Faint glow from far above
        ctx.globalAlpha=0.06;
        const dg=ctx.createLinearGradient(0,0,0,H*0.3);
        dg.addColorStop(0,'#0a1828');dg.addColorStop(1,'transparent');
        ctx.fillStyle=dg;ctx.fillRect(0,0,W,H*0.3);
        // Sparse bioluminescent dots (fewer, subtler)
        for(let i=0;i<10;i++){
          const bx=(i*79+Math.sin(t*0.04+i*1.3)*30)%W;
          const by=(i*53+t*1.5+Math.cos(t*0.03+i)*20)%(H*0.7);
          const br=1+Math.sin(t*0.3+i*0.7)*0.5;
          const bColor=['#2090a0','#209060','#8050a0','#a0a040'][i%4];
          ctx.globalAlpha=0.02;ctx.fillStyle=bColor;
          ctx.beginPath();ctx.arc(bx,by,br*8,0,Math.PI*2);ctx.fill();
          ctx.globalAlpha=0.25;
          ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.fill();
        }
      } else if(activeBackdrop==='enchanted'){
        // ENCHANTED: subtle aurora, not overpowering
        const phase=t*0.04;
        const eg=ctx.createLinearGradient(0,0,0,H);
        eg.addColorStop(0,'#080c1a');eg.addColorStop(0.5,'#0c1020');eg.addColorStop(1,'#060810');
        ctx.globalAlpha=0.45;ctx.fillStyle=eg;ctx.fillRect(0,0,W,H);
        // Subtle aurora bands (low opacity, fewer)
        for(let b=0;b<3;b++){
          const hue=200+b*50+Math.sin(phase+b)*25;
          const ay=H*(0.12+b*0.18)+Math.sin(t*0.03+b*1.5)*15;
          ctx.globalAlpha=0.04+Math.sin(t*0.05+b)*0.02;
          const ag=ctx.createLinearGradient(0,ay-20,0,ay+20);
          ag.addColorStop(0,'transparent');
          ag.addColorStop(0.4,'hsl('+hue+',40%,30%)');
          ag.addColorStop(0.6,'hsl('+((hue+25)%360)+',35%,28%)');
          ag.addColorStop(1,'transparent');
          ctx.fillStyle=ag;
          ctx.fillRect(0,ay-20,W,40);
        }
        // Rare sparkles
        ctx.globalAlpha=0.15;
        for(let i=0;i<8;i++){
          const sx=(i*83+Math.sin(t*0.05+i)*20)%W;
          const sy=(i*51+Math.cos(t*0.04+i*1.5)*15)%(H*0.65);
          ctx.fillStyle='hsl('+(200+i*20)%360+',50%,65%)';
          ctx.beginPath();ctx.arc(sx,sy,0.8,0,Math.PI*2);ctx.fill();
        }
      }
    }

    if(S.owned.light&&!isNight){
      ctx.save();ctx.globalAlpha=0.06;
      for(let i=0;i<5;i++){const rx=W*(0.1+i*0.2)+Math.sin(t*0.25+i)*15;ctx.fillStyle='#B3E5FC';ctx.beginPath();ctx.moveTo(rx-14,0);ctx.lineTo(rx+14,0);ctx.lineTo(rx+55,H);ctx.lineTo(rx-55,H);ctx.closePath();ctx.fill();}
      ctx.restore();
    }

    const flY=Math.round(H*0.75);

    // ── CAUSTIC LIGHT PATTERNS on sand ──
    ctx.save();ctx.globalAlpha=0.06;
    for(let i=0;i<12;i++){
      const cx=W*(0.05+i*0.08)+Math.sin(t*0.3+i*1.7)*12;
      const cy=flY+10+Math.cos(t*0.25+i*0.9)*8;
      ctx.fillStyle='#a9d6e5';
      ctx.beginPath();ctx.ellipse(Math.round(cx),Math.round(cy),8+Math.sin(t*0.4+i)*3,3,Math.sin(t*0.1+i)*0.3,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
    // ── WATER COLUMN PARTICLES (subtle floating specs) ──
    ctx.save();ctx.globalAlpha=0.08;
    for(let i=0;i<10;i++){
      const px=Math.round((i*97+Math.sin(t*0.2+i)*20)%W);
      const py=Math.round(20+((i*61+t*8)%(flY-40)));
      ctx.fillStyle='#e0f0ff';ctx.fillRect(px,py,2,2);
    }
    ctx.restore();

    if(S.owned.gravel){
      // 1. Sand with long gradient blend into water above
      const sandGrad=ctx.createLinearGradient(0,flY-15,0,H);
      sandGrad.addColorStop(0,'rgba(140,120,100,0)');// transparent at top — water shows through
      sandGrad.addColorStop(0.12,'rgba(140,120,100,0.4)');// soft blend zone
      sandGrad.addColorStop(0.25,'#a89080');// full sand
      sandGrad.addColorStop(0.6,'#8d7b6e');
      sandGrad.addColorStop(1,'#6d5d52');
      ctx.fillStyle=sandGrad;ctx.fillRect(0,flY-15,W,H-flY+15);
      // 3. Subtle pebble texture (fewer, more natural)
      const pebCols=['#7d6d62','#6d5d52','#9d8d80','#5d4d42','#8d7d70'];
      for(let i=0;i<16;i++){
        const px=Math.round((i*0.065+0.02)*W+Math.sin(i*3.7)*6);
        ctx.fillStyle=pebCols[i%pebCols.length];
        ctx.fillRect(px,flY+6+Math.floor(i%3)*6,6+i%3*2,4);
        // highlight on top of pebble
        ctx.fillStyle='#b0a090';ctx.globalAlpha=0.4;
        ctx.fillRect(px+1,flY+6+Math.floor(i%3)*6,3,2);ctx.globalAlpha=1;
      }
    } else {
      // Dark seafloor blending from water
      const floorGrad=ctx.createLinearGradient(0,flY-10,0,H);
      floorGrad.addColorStop(0,'rgba(30,40,50,0)');
      floorGrad.addColorStop(0.15,'rgba(30,40,50,0.5)');
      floorGrad.addColorStop(0.3,'#2a3a45');
      floorGrad.addColorStop(1,'#1a2a35');
      ctx.fillStyle=floorGrad;ctx.fillRect(0,flY-10,W,H-flY+10);
    }

    // Unified back-to-front render: plants + decos sorted by depth
    {
      const sandH=H-flY;
      const items=[];
      // collect plants
      (S.plantSeeds||[]).forEach(p=>items.push({type:'plant',depth:p.d||0.5,data:p}));
      // collect decos
      (S.decos||[]).forEach(d=>items.push({type:'deco',depth:d.d||0.5,data:d}));
      // sort back→front
      items.sort((a,b)=>a.depth-b.depth);

      items.forEach(item=>{
        const depth=item.depth;
        const embedY=Math.round(depth*sandH*0.55);
        const baseY=flY+embedY;

        if(item.type==='plant'){
          const p=item.data;
          // ── IMPROVED ROOT BURIAL: gradient fade into sand ──
          const px2=Math.round(p.x);
          const rootGrad=ctx.createRadialGradient(px2,baseY+2,1,px2,baseY+2,14);
          rootGrad.addColorStop(0,'rgba(109,93,82,0.7)');
          rootGrad.addColorStop(1,'rgba(109,93,82,0)');
          ctx.fillStyle=rootGrad;
          ctx.fillRect(px2-14,baseY-2,28,10);
          drawPlant(ctx,p,t,W,H,baseY);
        } else {
          const d=item.data;
          const sc=Math.max(2,Math.round(2+depth*1.5));// back=2, mid=3, front=3-4
          const cfg=DECO_SPRITE_CFG[d.id]||{halfW:6,yMin:0};
          const cx=Math.round(d.x*W);
          const ox=cx-cfg.halfW*sc;
          const visualBaseY=baseY-(cfg.yMin||0)*sc;
          ctx.save();
          // ── IMPROVED SHADOW: wider, softer, more natural ──
          const shadowR=cfg.halfW*sc*1.1;
          ctx.globalAlpha=0.35;
          const sg=ctx.createRadialGradient(cx,visualBaseY+2,2,cx,visualBaseY+2,shadowR);
          sg.addColorStop(0,'rgba(8,16,32,0.6)');sg.addColorStop(0.6,'rgba(8,16,32,0.2)');sg.addColorStop(1,'rgba(8,16,32,0)');
          ctx.fillStyle=sg;
          ctx.beginPath();ctx.ellipse(cx,visualBaseY+2,shadowR,6,0,0,Math.PI*2);ctx.fill();
          ctx.globalAlpha=1;
          // ── DRAW DECO with depth-based tint for unified look ──
          drawDecoSprite(ctx,d.id,ox,baseY,sc);
          // ── SOFT DEPTH TINT: radial fade, no hard edges ──
          const tintAlpha=0.06+depth*0.05;
          const decoW=cfg.w*sc;const decoH=(cfg.h||16)*sc;
          const tintG=ctx.createRadialGradient(cx,baseY-decoH/2,decoW*0.2,cx,baseY-decoH/2,decoW*1.2);
          tintG.addColorStop(0,'rgba(10,53,128,'+tintAlpha+')');
          tintG.addColorStop(1,'rgba(10,53,128,0)');
          ctx.fillStyle=tintG;
          ctx.fillRect(cx-decoW,baseY-decoH-sc,decoW*2,decoH+sc*2);
          // ── GROUND CONTACT: soft sand mound around base ──
          const moundW=cfg.halfW*2*sc;
          const moundG=ctx.createRadialGradient(cx,visualBaseY+1,2,cx,visualBaseY+1,moundW*0.6);
          moundG.addColorStop(0,'rgba(140,120,100,0.5)');
          moundG.addColorStop(0.6,'rgba(140,120,100,0.2)');
          moundG.addColorStop(1,'rgba(140,120,100,0)');
          ctx.fillStyle=moundG;
          ctx.beginPath();ctx.ellipse(cx,visualBaseY+2,moundW*0.6,5,0,0,Math.PI*2);ctx.fill();
          ctx.restore();
        }
      });
    }

    // ── AMBIENT BUBBLES: varied, organic, always present ──
    {
      const bubCount=S.owned.airpump?16:5;
      for(let i=0;i<bubCount;i++){
        const speed=8+i*3+(S.owned.airpump?i*2:0);
        const bx=W*(0.06+(i*0.067)%0.88)+Math.sin(t*0.3+i*1.7)*8;
        const by=H-((t*speed+i*47)%(H*0.85));
        const r=1+(i%4)*0.8+(S.owned.airpump?1:0);
        const wobble=Math.sin(t*0.8+i*2.1)*2;
        // Bubble body
        ctx.save();
        ctx.globalAlpha=0.15+Math.sin(t+i)*0.05;
        ctx.strokeStyle='rgba(169,214,229,0.6)';ctx.lineWidth=1;
        ctx.beginPath();ctx.arc(bx+wobble,by,r,0,Math.PI*2);ctx.stroke();
        // Highlight
        ctx.fillStyle='rgba(255,255,255,0.15)';
        ctx.beginPath();ctx.arc(bx+wobble-r*0.3,by-r*0.3,r*0.35,0,Math.PI*2);ctx.fill();
        ctx.restore();
      }
    }

    // Volcano lava particles — depth-aware position
    if(S.decos&&S.decos.some(d=>d.id==='volcano')){
      S.decos.filter(d=>d.id==='volcano').forEach(vd=>{
        const depth=vd.d||0.5;const sc=3;
        const vx=Math.round(vd.x*W);const vy=flY+Math.round(depth*(H-flY)*0.55);
        const spriteH=20*sc;
        for(let i=0;i<4;i++){ctx.fillStyle='rgba(255,87,34,0.5)';ctx.beginPath();ctx.arc(vx+Math.sin(t*2+i*1.5)*(4+sc),vy-spriteH-((t*22+i*14)%(spriteH*0.5)),2+depth,0,Math.PI*2);ctx.fill();}
      });
    }
    // Crystal shimmer
    if(S.decos&&S.decos.some(d=>d.id==='crystal')){
      S.decos.filter(d=>d.id==='crystal').forEach(cd=>{
        const depth=cd.d||0.5;const sc=3;
        const cx=Math.round(cd.x*W);const cy=flY+Math.round(depth*(H-flY)*0.55)-20*sc;
        ctx.save();ctx.globalAlpha=(0.25+Math.sin(t*2)*0.15)*depth;
        ctx.fillStyle='#E040FB';ctx.fillRect(cx-sc,cy,sc*2,sc*2);
        ctx.fillStyle='#00BCD4';ctx.fillRect(cx+sc*2,cy+sc*3,sc,sc);
        ctx.restore();
      });
    }

    poopParticles=poopParticles.filter(p=>{p.y+=p.vy;p.vy+=0.04;p.life--;if(p.life<=0||p.y>flY)return false;ctx.fillStyle='#5D4037';ctx.globalAlpha=p.life/80;ctx.fillRect(Math.round(p.x),Math.round(p.y),3,3);ctx.globalAlpha=1;return true;});
    tankRipples=tankRipples.filter(r=>{r.r+=1.8;r.alpha-=0.018;if(r.alpha<=0)return false;ctx.save();ctx.globalAlpha=r.alpha;ctx.strokeStyle='#B3E5FC';ctx.lineWidth=1;ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);ctx.stroke();ctx.restore();return true;});
    splashParticles=splashParticles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;if(p.life<=0)return false;ctx.fillStyle=p.color;ctx.globalAlpha=p.life/30;ctx.fillRect(Math.round(p.x),Math.round(p.y),3,3);ctx.globalAlpha=1;return true;});

    foodPellets=foodPellets.filter(fp=>{
      if(fp.eaten)return false;
      fp.y+=fp.vy;fp.x+=fp.vx;fp.vy+=0.0018;fp.age++;
      if(fp.y>flY/100*100-4){fp.y=flY/100*100-4;fp.vy*=-0.2;fp.vx*=0.8;}
      if(fp.age>700)return false;
      const px=Math.round(fp.x/100*W);const py=Math.round(fp.y/100*H);
      ctx.fillStyle='#FFB300';ctx.globalAlpha=0.9;ctx.beginPath();ctx.arc(px,py,2,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
      return true;
    });

    deathParticles=deathParticles.filter(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vy-=0.05;p.vx*=0.97;p.life--;if(p.life<=0)return false;
      ctx.save();ctx.globalAlpha=p.life/p.maxLife;
      ctx.translate(Math.round(p.x/100*W),Math.round(p.y/100*H));
      if(p.flip){ctx.scale(-1,1);ctx.translate(-p.sp.w*p.sc,0);}
      p.sp.p.forEach(([x,y,c])=>{ctx.fillStyle=c;ctx.fillRect(x*p.sc,y*p.sc,p.sc,p.sc);});
      ctx.restore();return true;
    });

    syncAnim();
    fishAnim.forEach(a=>{
      a.wobble+=0.018;// slower, gentler vertical bob
      const fish=S.fish.find(f=>f.uid===a.uid);
      const cfg=getSpeciesCfg(a.id,a.isCreature);
      const ns=isNight?0.35:1;
      const hunger=fish?.hunger||50;

      // ── Night: all drift toward their yMax (settle down) ──
      const nightYMax=isNight?Math.min(cfg.yMax,cfg.yMin+(cfg.yMax-cfg.yMin)*0.8):cfg.yMax;
      const nightYMin=isNight?Math.max(cfg.yMin,cfg.yMin+(cfg.yMax-cfg.yMin)*0.4):cfg.yMin;

      // ── FEEDING LAYER: filter food pellets by feedLayer ──
      let chasing=false;
      if(foodPellets.length>0&&cfg.feedLayer!=='none'){
        let nearest=null,nearestD=9999;
        foodPellets.forEach(fp=>{
          if(fp.eaten)return;
          const fpYpct=fp.y/100*100;
          // Layer gating
          if(cfg.feedLayer==='surface'&&fpYpct>30)return;
          if(cfg.feedLayer==='bottom'&&fpYpct<55)return;
          if(cfg.feedLayer==='mid'&&(fpYpct<10||fpYpct>65))return;
          const d=Math.hypot(a.x-fp.x,a.y-fpYpct);
          if(d<nearestD){nearestD=d;nearest=fp;}
        });
        if(nearest&&nearestD<70){
          const urgency=Math.max(0.4,(100-hunger)/60)*(cfg.foodMult)*ns;
          const spd=0.25*urgency;
          const ddx=nearest.x-a.x;const ddy=(nearest.y/100*100)-a.y;
          const dist=Math.hypot(ddx,ddy)||1;
          a.dx=ddx/dist*spd;a.dy=ddy/dist*spd;chasing=true;
          if(nearestD<6){
            nearest.eaten=true;
            if(fish){fish.hunger=Math.min(100,fish.hunger+(hunger<30?35:20));sv();}
            for(let i=0;i<8;i++)splashParticles.push({x:a.x/100*W,y:a.y/100*H,vx:(Math.random()-0.5)*3,vy:-Math.random()*2.5,life:22,color:'#FFB300'});
            renderFishList();
          }
        }
      }

      if(!chasing){
        // ── SCARED TIMER: shy fish flee after click ──
        if(a.scaredTimer>0){
          a.scaredTimer--;
          // keep fleeing toward corner
        } else if(a.followTimer>0&&a===followTarget&&followTarget.tx!==undefined){
          // Follow finger/touch
          a.followTimer--;
          const ftdx=followTarget.tx-a.x;const ftdy=followTarget.ty-a.y;
          const ftd=Math.hypot(ftdx,ftdy)||1;
          a.dx=ftdx/ftd*0.3;a.dy=ftdy/ftd*0.2;
        } else {

          // ── SOCIAL: SCHOOLING — move toward nearest same-species ──
          if(cfg.social==='schooling'&&Math.random()<0.008*ns){
            const same=fishAnim.filter(o=>o.uid!==a.uid&&o.id===a.id);
            if(same.length){
              const tgt=same[Math.floor(Math.random()*same.length)];
              const d=Math.hypot(tgt.x-a.x,tgt.y-a.y);
              if(d>12){// only pull if not already close
                a.dx+=(tgt.x-a.x)/d*0.04*ns;
                a.dy+=(tgt.y-a.y)/d*0.025*ns;
              }
            }
          }

          // ── SOCIAL: SOLITARY — betta attacks when others close ──
          if(cfg.social==='solitary'&&cfg.aggro&&Math.random()<0.002*ns){
            const others=fishAnim.filter(o=>o.uid!==a.uid&&Math.hypot(o.x-a.x,o.y-a.y)<30);
            if(others.length){
              const tgt=others[0];
              const d=Math.hypot(tgt.x-a.x,tgt.y-a.y)||1;
              a.dx=(tgt.x-a.x)/d*0.22*ns;a.dy=(tgt.y-a.y)/d*0.12*ns;
              const v=fishAnim.find(o=>o.uid===tgt.uid);
              if(v){const vc=getSpeciesCfg(v.id,v.isCreature);if(vc.flees){v.dx=-(a.x-v.x)/d*0.28*ns;v.dy=-(a.y-v.y)/d*0.14*ns;v.scaredTimer=60;}}
            }
          }

          // ── SOCIAL: ANEMONE — clownfish orbits nearest coral deco ──
          if(cfg.social==='anemone'&&S.decos&&S.decos.length){
            const coral=S.decos.find(d=>d.id==='brain_coral'||d.id==='fan_coral');
            if(coral){
              if(a.homeDecoX===null)a.homeDecoX=coral.x*100;
              const orbitR=8;const angle=t*0.8+a.wobble;
              const tx=a.homeDecoX+Math.cos(angle)*orbitR;
              const ty=cfg.yMin+(cfg.yMax-cfg.yMin)*0.6+Math.sin(angle)*4;
              a.dx+=(tx-a.x)*0.04*ns;a.dy+=(ty-a.y)*0.03*ns;
            }
          }

          // ── BOND: bonded fish stay close ──
          const bondFish=fish?.bondUid?fishAnim.find(o=>o.uid===fish.bondUid):null;
          if(bondFish&&Math.random()<0.01*ns){
            const bd=Math.hypot(bondFish.x-a.x,bondFish.y-a.y);
            if(bd>15){a.dx+=(bondFish.x-a.x)/bd*0.03;a.dy+=(bondFish.y-a.y)/bd*0.02;}
          }

          // ── MOVE STYLES ──
          if(cfg.moveStyle==='cruise'){
            // Large lazy arcs — change direction very rarely
            if(Math.random()<0.0008*ns){a.dx+=(Math.random()-0.5)*cfg.speedX*0.3;}
            if(Math.random()<0.0004*ns){a.dy+=(Math.random()-0.5)*cfg.speedY*0.2;}
          } else if(cfg.moveStyle==='idle_burst'){
            a.idleTimer=(a.idleTimer||0)+1;
            if(a.idleTimer<100){
              // Idle: drift to stop
              a.dx*=0.96;a.dy*=0.96;
            } else if(a.idleTimer<108){
              // Burst: sudden move
              a.dx=(Math.random()<0.5?1:-1)*cfg.speedX*2;
              a.dy=(Math.random()-0.5)*cfg.speedY*1.2;
            } else if(a.idleTimer>130){
              a.idleTimer=0;
            }
          } else if(cfg.moveStyle==='hover'){
            // Seahorse/jellyfish: mostly vertical drift, tiny horizontal
            a.dy=Math.sin(t*0.4+a.wobble)*0.025;
            if(Math.random()<0.002*ns)a.dx=(Math.random()-0.5)*cfg.speedX*0.3;
          } else if(cfg.moveStyle==='jump'){
            // Shrimp/frog: occasional sudden burst then stop
            a.idleTimer=(a.idleTimer||0)+1;
            if(a.idleTimer>80&&Math.random()<0.02*ns){
              a.dx=(Math.random()<0.5?1:-1)*cfg.speedX*3;
              a.dy=-cfg.speedY*2;
              a.idleTimer=0;
            } else {
              a.dx*=0.92;a.dy*=0.92;
            }
          } else {
            // ── NORMAL: smooth, lazy, with idle resting ──
            // Idle/rest behavior: fish periodically stop and "hover"
            if(!a.restTimer)a.restTimer=0;
            if(!a.resting)a.resting=false;

            if(a.resting){
              // Resting: barely move, gentle drift
              a.dx*=0.94;a.dy*=0.94;
              a.dy+=Math.sin(t*0.8+a.wobble)*0.003;// tiny vertical bob
              a.restTimer--;
              if(a.restTimer<=0){a.resting=false;}
              // Drift toward favorite spot if fish has one
              const favSpot=fish?.favoriteSpot;
              if(favSpot&&Math.random()<0.005){a.dx+=(favSpot==='left'?-0.01:0.01);}
            } else {
              // Swimming: smooth forward motion with GRADUAL turning
              // Only adjust velocity gently, never snap
              if(Math.random()<cfg.changeDir*0.3*ns){
                // Gradual turn: blend toward new direction
                const targetDx=(Math.random()-0.5)*cfg.speedX*1.5;
                a.dx+=(targetDx-a.dx)*0.08;// slow blend, not instant
              }
              if(Math.random()<cfg.changeDir*0.15*ns){
                const targetDy=(Math.random()-0.5)*cfg.speedY*1.0;
                a.dy+=(targetDy-a.dy)*0.06;
              }
              // Random chance to start resting
              if(Math.random()<0.0008*ns){
                a.resting=true;
                a.restTimer=80+Math.floor(Math.random()*160);// rest 80-240 frames (~1.5-4 sec)
              }
            }
          }
        }
      }

      // ── PLECO special: nibble animation at bottom (wobble more) ──
      const wobbleAdd=(a.id==='pleco'&&a.y>65)?Math.sin(a.wobble*2)*0.03:Math.sin(a.wobble)*0.015;

      // ── POSITION UPDATE with smooth boundary turning ──
      a.x+=a.dx;
      a.y+=a.dy+wobbleAdd;
      // Soft boundary: gradually push away from edges instead of instant flip
      if(a.x<5){a.dx+=(5-a.x)*0.02;if(a.dx<0)a.dx*=0.9;}
      if(a.x>90){a.dx-=(a.x-90)*0.02;if(a.dx>0)a.dx*=0.9;}
      // Hard clamp as safety net
      if(a.x<1){a.x=1;a.dx=Math.abs(a.dx)*0.5;}
      if(a.x>95){a.x=95;a.dx=-Math.abs(a.dx)*0.5;}
      if(a.y<nightYMin){a.dy+=(nightYMin-a.y)*0.03;if(a.y<nightYMin-2)a.y=nightYMin-2;}
      if(a.y>nightYMax){a.dy-=(a.y-nightYMax)*0.03;if(a.y>nightYMax+2)a.y=nightYMax+2;}
      // Speed damping — fish never go too fast
      const maxSpd=cfg.speedX*1.8;
      if(Math.abs(a.dx)>maxSpd)a.dx*=0.95;
      if(Math.abs(a.dy)>maxSpd*0.6)a.dy*=0.95;

      // ── POOP ──
      a.poopCooldown=(a.poopCooldown||0)-1;
      const def2=getDef(fish||{id:a.id,isCreature:a.isCreature});
      if(a.poopCooldown<=0&&def2&&Math.random()<(def2.poop||0.1)*0.01){
        poopParticles.push({x:Math.round(a.x/100*W),y:Math.round(a.y/100*H),vy:0.6+Math.random()*0.5,life:80});
        S.poopLevel=Math.min(100,(S.poopLevel||0)+0.5);a.poopCooldown=160+Math.random()*220;
      }

      // ── CLICK ANIM ──
      if(a.clickAnim>0){
        a.clickAnim--;const px2=Math.round(a.x/100*W);const py2=Math.round(a.y/100*H);
        ctx.save();ctx.globalAlpha=a.clickAnim/20;ctx.strokeStyle='#FFD700';ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(px2,py2,a.clickAnim*1.3,0,Math.PI*2);ctx.stroke();ctx.restore();
      }

      // ── DRAW SPRITE ──
      const sp=a.isCreature?getCreatureSprite(a.id):(a.stage==='baby'?getBabySprite(a.id):getSprite(a.id));
      const sc=a.isBenthic?(a.depth>0.6?3:2):(a.isCreature?getCreatureScale(a.id):(a.stage==='baby'?2:3));
      let px,py;
      if(a.isBenthic){
        // benthic: fixed to sand surface, depth controls y position in sand area
        const sandH=H-flY;
        const embedY=Math.round((a.depth||0.5)*sandH*0.4);
        px=Math.round(a.x/100*W);
        py=flY+embedY-sp.h*sc;// sit ON sand surface
        // override y movement — only x matters
        a.y=75;// keep logic bounds happy
      } else {
        px=Math.round(a.x/100*W);py=Math.round(a.y/100*H);
      }
      // Spawn fade-in + scale animation
      if(a.spawnTimer>0){a.spawnTimer--;a.spawnAlpha=Math.min(1,1-a.spawnTimer/30);}
      // Depth-based dimming: fish lower in tank appear slightly darker
      const fishDepthDim=1-Math.max(0,Math.min(1,(a.y-10)/70))*0.15;
      const spawnSc=a.spawnAlpha<1?0.8+a.spawnAlpha*0.2:1;
      ctx.save();ctx.globalAlpha=(a.spawnAlpha!==undefined?a.spawnAlpha:1)*fishDepthDim;
      ctx.translate(px,py);
      if(spawnSc<1){ctx.translate(sp.w*sc/2,sp.h*sc/2);ctx.scale(spawnSc,spawnSc);ctx.translate(-sp.w*sc/2,-sp.h*sc/2);}
      if(a.dx<0){ctx.scale(-1,1);ctx.translate(-sp.w*sc,0);}
      // Color variant tinting
      const vari=S.fish.find(ff=>ff.uid===a.uid);
      const vt=vari?.variant||'normal';
      sp.p.forEach(([x,y,col])=>{
        let fc=col;
        if(vt==='pale'){fc=lightenColor(col,40);}
        else if(vt==='dark'){fc=darkenColor(col,40);}
        else if(vt==='golden'){fc=tintColor(col,'#FFD700',0.3);}
        else if(vt==='glow'){fc=tintColor(col,'#00E5FF',0.25);}
        ctx.fillStyle=fc;ctx.fillRect(x*sc,y*sc,sc,sc);
      });
      // Glow effect for glow variants
      if(vt==='glow'){ctx.globalAlpha=0.15+Math.sin(Date.now()/400)*0.1;ctx.fillStyle='#00E5FF';sp.p.forEach(([x,y])=>{ctx.fillRect(x*sc-1,y*sc-1,sc+2,sc+2);});}
      ctx.restore();

      // ── MOOD EMOTE ──
      a.emoteTimer=(a.emoteTimer||0)+1;
      if(a.emoteTimer%200<60){
        const mood=fish?getFishMood(fish):'content';
        const em=MOOD_EMOTES[mood]||'';
        if(em){
          const ec=mood==='hungry'?'#FFB300':mood==='scared'||mood==='warning'?'#ff6b6b':mood==='happy'||mood==='home'?'#ff6b9d':mood==='lonely'?'#B3E5FC':'#B3E5FC';
          const emoteY=a.isBenthic?py-6:py-sp.h*sc/2-6;
          ctx.save();ctx.globalAlpha=0.85;ctx.fillStyle=ec;ctx.font='10px monospace';ctx.textAlign='center';
          ctx.fillText(em,px+sp.w*sc/2,emoteY);ctx.restore();
        }
      }
    });

    // ── FOREGROUND LAYER: blurred plant silhouettes ──
    if((S.plantSeeds||[]).length>2){
      ctx.save();ctx.globalAlpha=0.06;
      // Front-left leaf cluster
      ctx.fillStyle='#1b4332';
      const fgSway1=Math.sin(t*0.4)*4;
      ctx.beginPath();ctx.moveTo(-5,H);ctx.quadraticCurveTo(15+fgSway1,H*0.55,8+fgSway1,H*0.4);ctx.quadraticCurveTo(25+fgSway1,H*0.5,35,H);ctx.closePath();ctx.fill();
      // Front-right leaf
      const fgSway2=Math.sin(t*0.35+1)*3;
      ctx.beginPath();ctx.moveTo(W+5,H);ctx.quadraticCurveTo(W-20+fgSway2,H*0.5,W-12+fgSway2,H*0.35);ctx.quadraticCurveTo(W-30+fgSway2,H*0.45,W-40,H);ctx.closePath();ctx.fill();
      ctx.restore();
    }

    // ── WEATHER EFFECTS (#8) ──
    const weather=getWeatherEffect();
    if(weather==='rain'){
      ctx.save();ctx.globalAlpha=0.15;ctx.fillStyle='#90CAF9';
      for(let i=0;i<20;i++){
        const rx=(i*47+Date.now()/50)%W;const ry=(i*31+Date.now()/30)%(H*0.75);
        ctx.fillRect(rx,ry,1,6);
      }
      ctx.restore();
    }else if(weather==='specialLight'){
      ctx.save();ctx.globalAlpha=0.06+Math.sin(t*0.2)*0.03;
      ctx.fillStyle='#FFD54F';ctx.fillRect(0,0,W,H);ctx.restore();
    }

    // ── ZEN VISUAL EVENTS ──
    if(zenVisualEvent){
      zenVisualEvent.timer--;
      if(zenVisualEvent.timer<=0){zenVisualEvent=null;}
      else{
        const zp=zenVisualEvent.timer;
        ctx.save();
        if(zenVisualEvent.type==='schoolSync'){
          // Make all fish briefly align
          ctx.globalAlpha=0.08*Math.sin(zp/90*Math.PI);
          ctx.fillStyle='#B3E5FC';ctx.fillRect(0,0,W,H);
        }else if(zenVisualEvent.type==='lightShift'){
          ctx.globalAlpha=0.1*Math.sin(zp/120*Math.PI);
          const lx=W*(0.3+Math.sin(zp*0.05)*0.4);
          ctx.fillStyle='#FFF9C4';ctx.beginPath();ctx.moveTo(lx-30,0);ctx.lineTo(lx+30,0);ctx.lineTo(lx+60,H);ctx.lineTo(lx-60,H);ctx.closePath();ctx.fill();
        }else if(zenVisualEvent.type==='bubbleBurst'){
          ctx.globalAlpha=0.5;ctx.fillStyle='#B3E5FC';
          for(let i=0;i<12;i++){const bx=W*0.3+Math.random()*W*0.4;const by=H-zp*2-Math.random()*40;ctx.beginPath();ctx.arc(bx,by,2+Math.random()*3,0,Math.PI*2);ctx.fill();}
        }else if(zenVisualEvent.type==='glow'){
          ctx.globalAlpha=0.08*Math.sin(zp/150*Math.PI);
          ctx.fillStyle='#80DEEA';ctx.fillRect(0,0,W,H);
        }
        ctx.restore();
      }
    }

    // ── VISITOR FISH rendering ──
    if(visitorFish){
      visitorFish.timer--;
      if(visitorFish.timer<=0){visitorFish=null;}
      else{
        const vfT=visitorFish.timer;
        const vfAlpha=vfT>540?((600-vfT)/60):vfT<60?(vfT/60):1;
        const vfX=15+Math.sin(Date.now()/3000)*35+25;
        const vfY=20+Math.sin(Date.now()/4000)*15;
        const vsp=visitorFish.isCreature?getCreatureSprite(visitorFish.id):getSprite(visitorFish.id);
        const vsc=4;
        ctx.save();ctx.globalAlpha=vfAlpha*0.85;
        ctx.translate(Math.round(vfX/100*W),Math.round(vfY/100*H));
        if(Math.sin(Date.now()/2000)<0){ctx.scale(-1,1);ctx.translate(-vsp.w*vsc,0);}
        vsp.p.forEach(([x,y,col])=>{
          ctx.fillStyle=tintColor(col,'#FFD700',0.3);ctx.fillRect(x*vsc,y*vsc,vsc,vsc);
        });
        // Glow aura
        ctx.globalAlpha=0.12+Math.sin(Date.now()/500)*0.06;
        ctx.fillStyle='#FFD700';
        vsp.p.forEach(([x,y])=>{ctx.fillRect(x*vsc-1,y*vsc-1,vsc+2,vsc+2);});
        ctx.restore();
      }
    }

    // ── TANK PHASE visual enhancements (#4) ──
    const phase=getTankPhase();
    if(phase>=3){
      // Stable+: extra particle sparkles
      ctx.save();ctx.globalAlpha=0.04*phase;
      for(let i=0;i<phase;i++){
        ctx.fillStyle='#E1F5FE';
        ctx.fillRect(Math.round(W*(0.1+Math.sin(t*0.3+i*2)*0.4)),Math.round(H*(0.1+Math.cos(t*0.2+i)*0.6)),2,2);
      }
      ctx.restore();
    }
    if(phase>=4){
      // Mature+: subtle color overlay
      ctx.save();ctx.globalAlpha=0.03;ctx.fillStyle='#CE93D8';ctx.fillRect(0,0,W,H);ctx.restore();
    }
    if(phase>=5){
      // Dreamlike: gentle aurora
      ctx.save();ctx.globalAlpha=0.04+Math.sin(t*0.1)*0.02;
      const ag=ctx.createLinearGradient(0,0,W,H);
      ag.addColorStop(0,'#00BCD4');ag.addColorStop(0.5,'#CE93D8');ag.addColorStop(1,'#FFD54F');
      ctx.fillStyle=ag;ctx.fillRect(0,0,W,H);ctx.restore();
    }

    // ── UNDERWATER VIGNETTE ──
    ctx.save();
    const vig=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.25,W/2,H/2,Math.max(W,H)*0.7);
    vig.addColorStop(0,'rgba(0,0,0,0)');
    vig.addColorStop(1,'rgba(4,8,20,0.35)');
    ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);
    ctx.restore();

    // ── SUBTLE BLUE COLOR GRADE (everything "underwater") ──
    ctx.save();ctx.globalAlpha=0.04;
    ctx.fillStyle='#1f4e79';ctx.fillRect(0,0,W,H);
    ctx.restore();

    // ── LIGHT FROM TOP: gradient that fades bottom darker ──
    ctx.save();ctx.globalAlpha=0.08;
    const topLight=ctx.createLinearGradient(0,0,0,H);
    topLight.addColorStop(0,'rgba(160,200,230,0.3)');
    topLight.addColorStop(0.3,'rgba(160,200,230,0)');
    topLight.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=topLight;ctx.fillRect(0,0,W,H);
    ctx.restore();

    if(nightAlpha>0){
      ctx.save();ctx.globalAlpha=nightAlpha;ctx.fillStyle='#001030';ctx.fillRect(0,0,W,H);ctx.restore();
      if(isNight){ctx.save();ctx.globalAlpha=0.7;for(let i=0;i<14;i++){ctx.fillStyle='#E1F5FE';ctx.fillRect(Math.round(W*(0.03+((i*73)%94)*0.01)),Math.round(H*0.04+((i*37)%52)*H*0.005),2,2);}ctx.restore();}
    }
    // Tank glass edge highlight
    ctx.save();ctx.globalAlpha=0.04;ctx.fillStyle='#a0c8e0';ctx.fillRect(0,0,3,H);ctx.fillRect(W-3,0,3,H);ctx.restore();

    if(S.owned.airpump&&Math.random()<0.02)playBubble();

    raf=requestAnimationFrame(frame);
  }
  frame();
}
