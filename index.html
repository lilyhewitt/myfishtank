let lastTickTime=Date.now();
function gameLoop(){
  const now=Date.now();const realMs=now-lastTickTime;
  const msPerGameDay=3600000;const msPerGameMin=msPerGameDay/1440;const gameMins=realMs/msPerGameMin;
  S.gameTime=(S.gameTime||480)+gameMins;S.day=1+Math.floor(S.gameTime/1440);
  if(Math.floor(S.gameTime/1440)>Math.floor((S.gameTime-gameMins)/1440))onNewDay();
  const ledMult=S.owned.light?1:0.15;const co2Mult=S.owned.co2?1.5:1;S.plantAge+=(gameMins/1440)*2*ledMult*co2Mult;
  if(S.waterAdded){S.poopLevel=Math.max(0,S.poopLevel-(S.owned.filter2?0.04:S.owned.filter?0.02:0)*gameMins/60);recalcWater();}
  lastTickTime=now;
  const h=Math.floor((S.gameTime%1440)/60);const m=Math.floor(S.gameTime%60);
  document.getElementById('time-display').textContent='day '+S.day;
  renderHUD();if(Math.random()<0.001*gameMins)sv();
  setTimeout(gameLoop,500);
}

function onNewDay(){
  if(S._waterChangeCooldown>0)S._waterChangeCooldown=Math.max(0,(S._waterChangeCooldown||0)-1);
  // Daily observation note
  generateDailyObservation();
  S._marketRares=null;S._decoRares=null;S._plantRares=null;
  // Zen: no death, no disease, no hunger penalty
  S.fish.forEach(f=>{
    f.age+=1;if(f.age>=10&&f.stage==='baby')f.stage='adult';
    // Mood recovers naturally
    f.health=Math.min(100,(f.health||80)+5);
    f.hunger=Math.min(100,(f.hunger||80)+3);
  });
  S.daysWithoutDeath=(S.daysWithoutDeath||0)+1;
  if(S.daysWithoutDeath>(S.maxDaysWithoutDeath||0))S.maxDaysWithoutDeath=S.daysWithoutDeath;
  // Zen breeding (gentler)
  const groups={};S.fish.forEach(f=>{groups[f.id]=groups[f.id]||[];groups[f.id].push(f);});
  Object.keys(groups).forEach(id=>{
    const cat=FISH_DEF.find(c=>c.id===id);if(!cat||!cat.breedable||groups[id].filter(f=>f.stage==='adult').length<2)return;
    if(Math.random()<0.08&&S.fish.length<getTankCap()){
      const name=NAMES[Math.floor(Math.random()*NAMES.length)];
      const bv=rollBreedVariant();S.fish.push({id,name,health:100,hunger:100,age:0,stage:'baby',diseased:false,disease:null,uid:++S.uid,variant:bv});
      S.totalBred=(S.totalBred||0)+1;discoverVariant(id,bv);
      addMoment('A tiny '+cat.name+' appeared among the others. It was named '+name+'.','birth');
      showZenToast('','A small '+cat.name+' appeared quietly.');
      addXP(10);
      discoverSpecies(id);
    }
  });
  // Zen daily event
  triggerZenEvent();
  // Water auto-recovers
  S.poopLevel=Math.max(0,S.poopLevel-5);recalcWater();
  sv();renderFishList();checkAch();updateWaterMood();updateCollectionBadge();
}

function showZenToast(title,msg){

  t.classList.add('show');

// Color variant utilities
function lightenColor(hex,amt){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}
function darkenColor(hex,amt){return lightenColor(hex,-amt);}
function tintColor(hex,tint,strength){
  if(!hex||hex.length<7)return hex;
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  let tr=parseInt(tint.slice(1,3),16),tg=parseInt(tint.slice(3,5),16),tb=parseInt(tint.slice(5,7),16);
  r=Math.round(r*(1-strength)+tr*strength);g=Math.round(g*(1-strength)+tg*strength);b=Math.round(b*(1-strength)+tb*strength);
  return '#'+[r,g,b].map(v=>Math.min(255,Math.max(0,v)).toString(16).padStart(2,'0')).join('');
}

// Variant system: assign random variant on creation
const VARIANT_POOL=['normal','normal','normal','normal','normal','normal','normal','pale','pale','dark','dark','golden','glow'];
function rollVariant(){
  const r=Math.random();
  if(r<0.70)return'normal';
  if(r<0.90)return'pale';
  if(r<0.97)return'dark';
  if(r<0.995)return'golden';
  return'glow';
}
function rollBreedVariant(){
  const r=Math.random();
  if(r<0.60)return'normal';
  if(r<0.80)return'pale';
  if(r<0.92)return'dark';
  if(r<0.98)return'golden';
  return'glow';
}

function getWaterState(){
  const w=avgW();
  if(w>75)return'clear';
  if(w>45)return'natural';
  return'lazy';
}

function updateWaterMood(){
  const el=document.getElementById('water-mood');if(!el)return;
  // Use today's observation if we have one, otherwise generate ambient text
  if(S.todayObservation){el.textContent=S.todayObservation;return;}
  const fishCount=S.fish.length;
  const hour=Math.floor((S.gameTime%1440)/60);
  const isNight=hour>=21||hour<6;
  const isDawn=hour>=5&&hour<8;
  const isDusk=hour>=17&&hour<20;
  let msg='';
  if(fishCount===0){msg='Still water.';
  }else if(isNight){msg='The tank is resting.';
  }else if(isDawn){msg='Morning light touches the water.';
  }else if(isDusk){msg='The day is ending quietly.';
  }else{
    const pool=['quiet water','everything is calm','the fish are drifting','a peaceful afternoon','nothing to do but watch'];
    msg=pool[Math.floor(S.gameTime/200)%pool.length];
  }
  el.textContent=msg;
}

// ── MOMENTS SYSTEM: record memorable events ──
function generateDailyObservation(){
  const hour=Math.floor((S.gameTime%1440)/60);
  const fc=S.fish.length;
  const pc=(S.plantSeeds||[]).length;
  const phase=getTankPhase();
  const bonded=S.fish.filter(f=>f.bondUid);
  const babies=S.fish.filter(f=>f.stage==='baby');

  // Build today's observation from what's actually in the tank
  const pool=[];
  pool.push('The water is calm today.');
  pool.push('Everything is quiet this morning.');
  if(fc>=3)pool.push('The fish seem content together.');
  if(fc===1)pool.push(S.fish[0].name+' has the whole tank to explore.');
  if(bonded.length>=2)pool.push(bonded[0].name+' stayed close to its companion.');
  if(babies.length)pool.push(babies[0].name+' is still small, but growing.');
  if(pc>=3)pool.push('The plants are filling in nicely.');
  if(phase>=3)pool.push('The tank feels like a real ecosystem now.');
  if(phase>=4)pool.push('There is a sense of calm maturity in the water.');
  if(S.day%7===0)pool.push('Another week has passed. The tank remembers.');
  if(S.day%10===0)pool.push('The water holds more stories now than when it started.');

  const pick=pool[Math.floor(Math.random()*pool.length)];
  S.todayObservation=pick;
  addMoment(pick,'daily');
}

function addMoment(text,type){
  if(!S.moments)S.moments=[];
  // Don't add duplicate
  if(S.moments.length>0&&S.moments[S.moments.length-1].text===text)return;
  S.moments.push({text,type:type||'event',day:S.day,time:Date.now()});
  if(S.moments.length>50)S.moments=S.moments.slice(-50);// keep last 50
  sv();
}

function discoverSpecies(id){
  if(!S.discoveredSpecies)S.discoveredSpecies=[];
  if(!S.discoveredSpecies.includes(id)){
    S.discoveredSpecies.push(id);
    const sName=(FISH_DEF.find(f=>f.id===id)||CREATURES_DEF.find(f=>f.id===id)||{}).name||id;
    addMoment('A '+sName+' was noticed in the tank for the first time.','discovery');
    sv();updateCollectionBadge();
  }
}
function discoverVariant(speciesId,variant){
  if(!S.discoveredVariants)S.discoveredVariants=[];
  const key=speciesId+'_'+variant;
  if(!S.discoveredVariants.includes(key)){
    S.discoveredVariants.push(key);
    addMoment('An unusual '+variant+' coloring was spotted on a '+speciesId+'.','discovery');
    sv();updateCollectionBadge();
    if(variant!=='normal')showZenToast('','Something about this '+speciesId+' looks different.');
  }
}

function updateCollectionBadge(){
  const el=document.getElementById('col-badge');if(!el)return;
  const species=(S.discoveredSpecies||[]).length;
  const variants=(S.discoveredVariants||[]).length;
  el.textContent='📖 '+species+'sp '+variants+'v';
}

// ── TANK EVOLUTION SYSTEM (#4) ──
function getTankPhase(){
  const d=S.day||1;const fc=S.fish.length;
  if(d>=60||fc>=20)return 5;// dreamlike
  if(d>=30||fc>=15)return 4;// mature
  if(d>=14||fc>=10)return 3;// stable
  if(d>=7||fc>=5)return 2;// enriched
  return 1;// initial
}
function getTankPhaseLabel(){
  const p=getTankPhase();
  return['','🌱 Starting','🌿 Enriched','🌊 Stable','✨ Mature','💫 Dreamlike'][p];
}

// ── VISITOR FISH SYSTEM (#1) ──
let visitorFish=null;let visitorTimer=0;
function maybeSpawnVisitor(){
  if(visitorFish||!S.fish.length)return;
  let chance=0.03;
  if((S.daysWithoutVisitor||0)>5)chance=0.10;
  if(Math.random()<chance){
    const allDefs=[...FISH_DEF,...CREATURES_DEF];
    const pick=allDefs[Math.floor(Math.random()*allDefs.length)];
    visitorFish={id:pick.id,name:'Visitor',variant:Math.random()<0.5?'golden':'glow',isCreature:!!pick.benthic,timer:600+Math.floor(Math.random()*600)};
    visitorTimer=visitorFish.timer;
    S.daysWithoutVisitor=0;
    showZenToast('🌟 Rare Visitor!','A mysterious '+pick.name+' is passing through...');
    addMoment('A strange '+pick.name+' drifted in from somewhere. It didn\'t stay long.','visitor');
  }else{
    S.daysWithoutVisitor=(S.daysWithoutVisitor||0)+1;
  }
}

// ── FISH MEMORY SYSTEM (#7) ──
function getFishMemory(){
  if(!S.fish.length)return null;
  const oldest=S.fish.reduce((a,b)=>a.age>b.age?a:b);
  const mostBred=S.fish.reduce((a,b)=>{const ab=S.fish.filter(f=>f.id===a.id).length;const bb=S.fish.filter(f=>f.id===b.id).length;return ab>bb?a:b;});
  return{oldest,mostBred};
}

// ── PITY / GUARANTEED RARE (#11) ──
function getRareChance(){
  const pity=S.rarePityCounter||0;
  if(pity>=5)return 0.15;
  return 0.05;
}

// ── TRIGGER ZEN EVENTS (with visual effects #12,#13) ──
let zenVisualEvent=null;
function triggerZenEvent(){
  if(!S.fish.length)return;
  const r=Math.random();
  const hour=Math.floor((S.gameTime%1440)/60);
  const isNight=hour>=21||hour<6;

  if(r<0.40){
    // ── NATURAL MOMENT: visual + observation note ──
    const fish1=S.fish[Math.floor(Math.random()*S.fish.length)];
    const def1=getDef(fish1);
    const type=Math.floor(Math.random()*7);
    if(type===0){
      zenVisualEvent={type:'schoolSync',timer:90};
      addMoment('The fish drifted together for a while, moving as one.','observation');
    }else if(type===1){
      zenVisualEvent={type:'lightShift',timer:120};
      addMoment('The light shifted slowly across the water.','observation');
    }else if(type===2){
      addMoment(fish1.name+' lingered near the '+((S.plantSeeds||[]).length?'plants':'bottom')+' for a long time.','observation');
    }else if(type===3&&isNight){
      addMoment('The tank grew very still after dark.','observation');
    }else if(type===4){
      addMoment('A gentle current passed through. The plants swayed.','observation');
    }else if(type===5){
      // Fish claims a spot
      if(!fish1.favoriteSpot){
        fish1.favoriteSpot=Math.random()<0.5?'left':'right';
        addMoment(fish1.name+' seems to prefer the '+fish1.favoriteSpot+' side of the tank.','observation');
      }
    }else{
      addMoment('Everything was quiet for a while.','observation');
    }
  }else if(r<0.70){
    // ── RELATIONSHIP EVENT: bonds, habits, proximity ──
    if(S.fish.length>=2){
      const a=S.fish[Math.floor(Math.random()*S.fish.length)];
      const b=S.fish.find(f=>f.uid!==a.uid);
      if(b){
        const eType=Math.floor(Math.random()*4);
        if(eType===0&&!a.bondUid){
          // Form a new bond
          a.bondUid=b.uid;b.bondUid=a.uid;
          addMoment(a.name+' and '+b.name+' have been swimming close together.','relationship');
          sv();
        }else if(eType===1&&a.bondUid===b.uid){
          // Existing bond deepens
          addMoment(a.name+' and '+b.name+' spent most of the day side by side.','relationship');
        }else if(eType===2){
          addMoment(a.name+' followed '+b.name+' around for a while.','relationship');
        }else{
          addMoment(b.name+' drifted near '+a.name+', then swam away.','relationship');
        }
      }
    }else{
      const loner=S.fish[0];
      addMoment(loner.name+' explored the whole tank alone today.','observation');
    }
  }else if(r<0.88){
    // ── GROWTH EVENT: plants, environment, subtle changes ──
    S.plantAge+=(Math.random()*2);
    const gType=Math.floor(Math.random()*5);
    if(gType===0){
      addMoment('A plant seems a little taller than yesterday.','growth');
    }else if(gType===1){
      addMoment('The water looks slightly different today.','growth');
    }else if(gType===2&&(S.decos||[]).length){
      const deco=S.decos[Math.floor(Math.random()*S.decos.length)];
      const dd=DECO_DEF.find(x=>x.id===deco.id);
      addMoment('Something small settled near the '+(dd?.name||'decoration')+'.','growth');
    }else if(gType===3){
      const grower=S.fish.find(f=>f.stage==='baby');
      if(grower){grower.age=Math.max(grower.age,9);addMoment(grower.name+' looks a little bigger today.','growth');}
      else addMoment('The tank feels a bit more settled.','growth');
    }else{
      addMoment('Tiny bubbles clung to the glass this morning.','growth');
    }
  }else{
    // ── RARE / MYSTERIOUS EVENT: no rewards, just wonder ──
    const rType=Math.floor(Math.random()*5);
    if(rType===0){
      maybeSpawnVisitor();
      if(!visitorFish)addMoment('Something passed through the water, too quick to see clearly.','mystery');
    }else if(rType===1&&S.fish.length<getTankCap()){
      // A new fish appears naturally (no "reward" framing)
      const base=FISH_DEF[Math.floor(Math.random()*FISH_DEF.length)];
      const name=NAMES[Math.floor(Math.random()*NAMES.length)];
      const mv=rollVariant();
      S.fish.push({id:base.id,name,health:100,hunger:100,age:0,stage:'adult',diseased:false,disease:null,uid:++S.uid,variant:mv});
      discoverSpecies(base.id);discoverVariant(base.id,mv);
      addMoment('A new '+base.name+' appeared in the tank this morning. It seems calm.','mystery');
    }else if(rType===2){
      zenVisualEvent={type:'glow',timer:150};
      addMoment('The water shimmered with an unusual light for a moment.','mystery');
    }else if(rType===3){
      addMoment('A faint shadow moved through the deep water and vanished.','mystery');
    }else{
      addMoment('The tank felt different today, though nothing obvious changed.','mystery');
    }
  }
}

// ── FISH FOLLOW FINGER (#5) ──
let followTarget=null;
document.addEventListener('touchmove',function(e){
  if(!followTarget)return;
  const canvas=document.getElementById('TC');if(!canvas)return;
  const rect=canvas.getBoundingClientRect();
  const touch=e.touches[0];
  followTarget.tx=(touch.clientX-rect.left)/rect.width*100;
  followTarget.ty=(touch.clientY-rect.top)/rect.height*100;
},{passive:true});
document.addEventListener('touchend',function(){followTarget=null;});
document.addEventListener('mouseup',function(){followTarget=null;});

function processOffline(){
  if(!S.lastLoginTime)return;
  const now=Date.now();
  const hours=(now-S.lastLoginTime)/3600000;
  if(hours<0.05)return; // less than 3 minutes
  
  // Water auto-recovers
  S.poopLevel=Math.max(0,S.poopLevel-Math.floor(hours*3));
  recalcWater();
  
  // Fish grow
  const daysOffline=hours/24;
  S.fish.forEach(f=>{
    f.age+=Math.floor(daysOffline);
    if(f.age>=10&&f.stage==='baby')f.stage='adult';
    f.health=Math.min(100,(f.health||80)+Math.floor(hours));
    f.hunger=Math.min(100,(f.hunger||80)+Math.floor(hours*0.5));
  });
  
  // Plants grow
  S.plantAge+=(hours*0.1);
  
  // Offline events
  const eventCount=Math.min(3,Math.floor(hours/2)+Math.floor(Math.random()*2));
  if(eventCount>0&&S.fish.length>0){
    let summary=[];
    for(let i=0;i<eventCount;i++){
      const r=Math.random();
      if(r<0.4){summary.push('The tank stayed peaceful');}
      else if(r<0.7){
        S.plantAge+=1;
        summary.push('Plants grew a little');
      }else if(r<0.9){
        summary.push('The water stayed calm');
      }else{
        // Try breed
        if(S.fish.length>=2&&S.fish.length<getTankCap()){
          const breedable=S.fish.filter(f=>{const d=getDef(f);return d?.breedable&&f.stage==='adult';});
          if(breedable.length>=2){
            const parent=breedable[Math.floor(Math.random()*breedable.length)];
            const name=NAMES[Math.floor(Math.random()*NAMES.length)];
            const obv=rollBreedVariant();S.fish.push({id:parent.id,name,health:100,hunger:100,age:0,stage:'baby',diseased:false,disease:null,uid:++S.uid,variant:obv});
            S.totalBred=(S.totalBred||0)+1;discoverVariant(parent.id,obv);
            summary.push('A new baby appeared: '+name);
            discoverSpecies(parent.id);
          }
        }
      }
    }
    if(hours>0.5&&summary.length>0){
      const h=Math.floor(hours);const m=Math.floor((hours%1)*60);
      const timeStr=h>0?(h+'h '+m+'m'):(m+' min');
      showZenToast('','While you were away... '+summary[Math.floor(Math.random()*summary.length)]);
    }
  }
  
  S.lastLoginTime=now;
  sv();syncAnim();renderFishList();updateWaterMood();updateCollectionBadge();
}

// ── BACKDROP SHOP ──
function renderBackdrops(){
  const grid=document.getElementById('backdrop-g');if(!grid)return;
  const cur=S.activeBackdrop||'none';
  const owned=S.ownedBackdrops||[];
  document.getElementById('backdrop-current').textContent=cur==='none'?'No backdrop active':'Active: '+BACKDROP_DEF.find(b=>b.id===cur)?.name;
  grid.innerHTML='';
  
  // "None" option
  const noneDiv=document.createElement('div');noneDiv.className='item';
  noneDiv.style.cssText=cur==='none'?'border-color:var(--green);':'';
  noneDiv.innerHTML='<div style="font-size:24px;margin:8px 0;">🌊</div>'
    +'<div class="iname">Default</div><div class="idesc">Original water</div>'
    +'<button data-bd="none" '+(cur==='none'?'disabled':'')+'>'+( cur==='none'?'Active':'Use')+'</button>';
  grid.appendChild(noneDiv);
  
  BACKDROP_DEF.forEach(bd=>{
    const has=owned.includes(bd.id);
    const active=cur===bd.id;
    const div=document.createElement('div');div.className='item';
    if(active)div.style.borderColor='var(--green)';
    const isR=bd.rarity==='rare';const isSR=bd.rarity==='super_rare';const isU=bd.rarity==='uncommon';
    // Preview canvas
    const pvs=document.createElement('canvas');pvs.width=80;pvs.height=45;
    pvs.style.cssText='width:80px;height:45px;border-radius:4px;margin:0 auto 4px;display:block;';
    const pctx=pvs.getContext('2d');
    drawBackdropPreview(pctx,bd.id,80,45);
    div.appendChild(pvs);
    
    div.innerHTML+=(isSR?'<div class="super-rare-tag">★★ LEGENDARY</div>':isR?'<div class="rare-tag">★ RARE</div>':isU?'<div class="rare-tag" style="color:#4FC3F7;background:#4FC3F722;">UNCOMMON</div>':'')
      +'<div class="iname">'+bd.name+'</div>'
      +'<div class="idesc">'+bd.desc+'</div>';
    if(has){
      div.innerHTML+='<button data-bd="'+bd.id+'" '+(active?'disabled':'')+'>'+( active?'✓ Active':'Use')+'</button>';
    }else{
      div.innerHTML+='<div class="iprice">'+bd.price+' coins</div>'
        +'<button data-bdbuy="'+bd.id+'" '+(S.coins<bd.price?'disabled':'')+'>Buy</button>';
    }
    grid.appendChild(div);
  });
  
  // Event: switch backdrop
  grid.querySelectorAll('[data-bd]').forEach(btn=>{
    btn.addEventListener('click',function(){
      S.activeBackdrop=this.dataset.bd==='none'?'none':this.dataset.bd;
      sv();renderBackdrops();
      showZenToast('','The light in the water changed.');
    });
  });
  // Event: buy backdrop
  grid.querySelectorAll('[data-bdbuy]').forEach(btn=>{
    btn.addEventListener('click',function(){
      const id=this.dataset.bdbuy;
      const bd=BACKDROP_DEF.find(b=>b.id===id);
      if(!bd||S.coins<bd.price)return;
      coin(-bd.price);
      if(!S.ownedBackdrops)S.ownedBackdrops=[];
      S.ownedBackdrops.push(id);
      S.activeBackdrop=id;
      addXP(15);sv();
      showZenToast('','A new view of the water.');
      renderBackdrops();checkAch();
    });
  });
}

function drawBackdropPreview(ctx,id,w,h){
  ctx.clearRect(0,0,w,h);
  if(id==='lake'){
    const g=ctx.createLinearGradient(0,0,0,h);
    g.addColorStop(0,'#1a3020');g.addColorStop(0.6,'#305838');g.addColorStop(1,'#283820');
    ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
    ctx.globalAlpha=0.15;ctx.fillStyle='#c0e890';
    for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(w*0.15+i*w*0.25,0);ctx.lineTo(w*0.2+i*w*0.25+15,h);ctx.lineTo(w*0.1+i*w*0.25-15,h);ctx.closePath();ctx.fill();}
    ctx.globalAlpha=0.25;ctx.fillStyle='#8d7b6e';ctx.fillRect(0,h*0.8,w,h*0.2);ctx.globalAlpha=1;
  }else if(id==='ocean'){
    const g=ctx.createLinearGradient(0,0,0,h);
    g.addColorStop(0,'#041028');g.addColorStop(0.6,'#0a2868');g.addColorStop(1,'#061840');
    ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
    ctx.globalAlpha=0.1;ctx.fillStyle='#6090d0';
    for(let i=0;i<2;i++){ctx.beginPath();ctx.moveTo(w*0.2+i*w*0.3,0);ctx.lineTo(w*0.3+i*w*0.3+20,h);ctx.lineTo(w*0.1+i*w*0.3-20,h);ctx.closePath();ctx.fill();}
    ctx.globalAlpha=1;ctx.fillStyle='#4a3a30';ctx.fillRect(0,h*0.82,w,h*0.18);
  }else if(id==='coral_reef'){
    const g=ctx.createLinearGradient(0,0,0,h);
    g.addColorStop(0,'#0a2830');g.addColorStop(1,'#104838');
    ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
    ctx.fillStyle='#5a4a40';ctx.fillRect(0,h*0.78,w,h*0.22);
    const cs=['#ff5070','#ff9030','#50e0a0','#d060ff'];
    cs.forEach((col,i)=>{ctx.globalAlpha=0.2;ctx.fillStyle=col;ctx.beginPath();ctx.arc(w*0.15+i*w*0.23,h*0.73,5+i,0,Math.PI*2);ctx.fill();});
    ctx.globalAlpha=1;
  }else if(id==='deep_ocean'){
    ctx.fillStyle='#020508';ctx.fillRect(0,0,w,h);
    const dots=[['#40e0ff',0.2,0.3],['#30ff90',0.5,0.4],['#d070ff',0.7,0.25],['#ffff50',0.4,0.55],['#ff70a0',0.8,0.5]];
    dots.forEach(([col,xr,yr])=>{ctx.globalAlpha=0.6;ctx.fillStyle=col;ctx.beginPath();ctx.arc(w*xr,h*yr,1.5,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=0.06;ctx.beginPath();ctx.arc(w*xr,h*yr,10,0,Math.PI*2);ctx.fill();});
    ctx.globalAlpha=1;ctx.fillStyle='#0a0a10';ctx.fillRect(0,h*0.82,w,h*0.18);
  }else if(id==='enchanted'){
    ctx.fillStyle='#0a1030';ctx.fillRect(0,0,w,h);
    const hues=[180,230,300,340];
    hues.forEach((hue,i)=>{ctx.globalAlpha=0.12;
      const ag=ctx.createLinearGradient(0,h*0.1+i*h*0.16,0,h*0.2+i*h*0.16+12);
      ag.addColorStop(0,'transparent');ag.addColorStop(0.5,'hsl('+hue+',65%,45%)');ag.addColorStop(1,'transparent');
      ctx.fillStyle=ag;ctx.fillRect(0,h*0.1+i*h*0.16,w,18);});
    ctx.globalAlpha=0.4;
    for(let i=0;i<8;i++){ctx.fillStyle='hsl('+(200+i*20)+',80%,80%)';ctx.fillRect(w*(i*0.12+0.04),h*(0.1+i*0.08),1,1);}
    ctx.globalAlpha=1;ctx.fillStyle='#15102a';ctx.fillRect(0,h*0.82,w,h*0.18);
  }
}

// ── JOURNAL: Memory Growth ──
function renderJournal(){
  const el=document.getElementById('journal-list');if(!el)return;
  const moments=(S.moments||[]).slice().reverse();
  if(!moments.length){el.innerHTML='<div style="font-size:12px;color:rgba(255,255,255,0.25);padding:20px;text-align:center;font-style:italic;">Nothing recorded yet.</div>';return;}
  el.innerHTML=moments.map(m=>{
    return '<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03);">'+
      '<div style="font-size:12px;color:rgba(255,255,255,0.55);line-height:1.5;font-style:italic;">'+m.text+'</div>'+
      '<div style="font-size:9px;color:rgba(255,255,255,0.2);margin-top:3px;">day '+m.day+'</div></div>';
  }).join('');
}

// ── CODEX / COLLECTION UI (#3) ──
function renderCodex(){
  const grid=document.getElementById('codex-grid');if(!grid)return;
  const allDefs=[...FISH_DEF,...CREATURES_DEF];
  const disc=S.discoveredSpecies||[];
  const discV=S.discoveredVariants||[];
  const variants=['normal','pale','dark','golden','glow'];
  const totalPossible=allDefs.length*variants.length;
  document.getElementById('codex-progress').textContent='Discovered: '+disc.length+'/'+allDefs.length+' species · '+discV.length+'/'+totalPossible+' variants';
  grid.innerHTML='';
  allDefs.forEach(def=>{
    const found=disc.includes(def.id);
    const div=document.createElement('div');
    div.className='item';
    div.style.cssText='padding:6px;cursor:pointer;'+(found?'':'opacity:0.5;filter:grayscale(1);');
    if(found){
      const cvs=def.benthic?makeCreatureCanvas(def.id,28):makeFishCanvas(def.id,28,'adult');
      div.appendChild(cvs);
    }else{
      const placeholder=document.createElement('div');
      placeholder.style.cssText='width:28px;height:28px;margin:0 auto 3px;background:#ffffff08;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#ffffff22;';
      placeholder.textContent='?';
      div.appendChild(placeholder);
    }
    const name=document.createElement('div');
    name.className='iname';name.style.fontSize='10px';
    name.textContent=found?def.name:'???';
    if(found){const moment=(S.moments||[]).find(m=>m.type==='discovery'&&m.text.includes(def.name));if(moment){const dayLabel=document.createElement('div');dayLabel.style.cssText='font-size:8px;color:var(--muted);';dayLabel.textContent='Found day '+moment.day;div.appendChild(dayLabel);}}
    div.appendChild(name);
    // Variant dots
    const dots=document.createElement('div');dots.style.cssText='display:flex;gap:2px;justify-content:center;margin-top:2px;';
    variants.forEach(v=>{
      const dot=document.createElement('span');
      const key=def.id+'_'+v;
      const has=discV.includes(key);
      dot.style.cssText='width:6px;height:6px;border-radius:50%;'+(has?'background:'+{normal:'#4ade80',pale:'#B3E5FC',dark:'#5C6BC0',golden:'#FFD700',glow:'#00E5FF'}[v]+';':'background:#ffffff15;');
      dot.title=v;
      dots.appendChild(dot);
    });
    div.appendChild(dots);
    grid.appendChild(div);
  });
}

// ── WEATHER / SCENE VARIATION (#8) ──
function getWeatherEffect(){
  const day=S.day||1;
  if(day%17===0)return'rain';
  if(day%23===0)return'specialLight';
  return'none';
}

// ── INDIVIDUAL PERSONALITY TAG (#6) ──
const PERSONALITY_TAGS=['timid','curious','lazy','active','loner','social'];
function getIndividualPersonality(f){
  if(f.personalityTag)return f.personalityTag;
  f.personalityTag=PERSONALITY_TAGS[f.uid%PERSONALITY_TAGS.length];
  return f.personalityTag;
}

// ── HIDDEN CONDITIONS FOR VARIANTS (#9) ──
function checkHiddenConditions(){
  const hour=Math.floor((S.gameTime%1440)/60);
  const isNight=hour>=21||hour<6;
  // Night: dark variants more likely (handled in rollVariant context)
  // Many fish: schooling variants
  return{isNight,crowded:S.fish.length>=10};
}

// ── CONTENT RELEASE SCHEDULE (#17) ──
function isSpeciesUnlocked(def){
  const day=S.day||1;
  if(def.rarity==='common')return true;
  if(def.rarity==='uncommon')return day>=3;
  if(def.rarity==='rare')return day>=10;
  if(def.rarity==='super_rare')return day>=20;
  return true;
}

// ── PERIODIC ZEN TICK (every ~30 sec in-game = ~75 real seconds) ──
let zenTickCounter=0;
function zenTick(){
  zenTickCounter++;
  // Every 5 ticks (~6 min), chance of micro-event
  if(zenTickCounter%5===0&&S.fish.length>0&&Math.random()<0.3){
    const micro=['A fish glances your way','Tiny bubbles drift past','The light flickers gently','A plant sways in the current'];
    updateWaterMood();// refresh mood text
  }
  // Check visitor
  if(zenTickCounter%20===0)maybeSpawnVisitor();
}
function scheduleZenTick(){zenTick();setTimeout(scheduleZenTick,45000+Math.random()*60000);}setTimeout(scheduleZenTick,30000);// randomized interval

// Auto-start: give starter fish if empty
if(S.fish.length===0&&S.waterAdded){
  const starters=['guppy','neon','goldfish'];
  const pick=starters[Math.floor(Math.random()*starters.length)];
  const name=NAMES[Math.floor(Math.random()*NAMES.length)];

  S.moments=S.moments||[];
  S.moments.push({type:'first',text:name+' the '+pick+' arrived in an empty tank. The water felt less lonely.',day:S.day});

}
