<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Aquarium</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');
*{box-sizing:border-box;margin:0;padding:0;image-rendering:pixelated;}
:root{
  --deep:#0a1628;--mid:#0d2258;--light:#0a3580;
  --sand:#D7CCC8;--gravel:#BCAAA4;--green:#1D9E75;
  --gold:#FFB300;--red:#E53935;--blue:#0288D1;
  --panel:#ffffff12;--border:#ffffff22;
  --text:#e8f4f8;--muted:#7ba8c4;
  --font:'VT323',monospace;--pfont:'Press Start 2P',monospace;
}
body{background:var(--deep);color:var(--text);font-family:var(--font);font-size:16px;min-height:100vh;overflow-x:hidden;}
#app{max-width:860px;margin:0 auto;padding:.5rem;}
.game-title{font-family:var(--pfont);font-size:11px;color:var(--gold);text-align:center;padding:8px 0 4px;letter-spacing:2px;text-shadow:0 0 10px #FFB30066;}
.game-title::after{content:'';display:block;width:60%;height:1px;background:linear-gradient(90deg,transparent,#FFB30044,transparent);margin:6px auto 0;}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:6px;flex-wrap:wrap;}
.top-bar-left{display:flex;align-items:center;gap:8px;}
.top-bar-right{display:flex;align-items:center;gap:6px;}
.tank-outer{border:3px solid #1a237e;border-radius:10px;overflow:hidden;margin-bottom:6px;position:relative;box-shadow:0 0 20px rgba(10,53,128,0.4),inset 0 0 30px rgba(0,0,0,0.3);}
#TC{display:block;width:100%;image-rendering:pixelated;cursor:pointer;}
.hud{display:flex;gap:5px;margin-bottom:6px;flex-wrap:wrap;}
.hud-stat{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:14px;flex:1;min-width:75px;text-align:center;color:var(--muted);transition:all .3s;}
.hud-stat b{display:block;font-size:18px;color:var(--text);}
.hud-stat.warn b{color:#FFB300;}.hud-stat.bad b{color:#E53935;}.hud-stat.good b{color:#1D9E75;}
.tabs{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap;}
.tab{padding:6px 11px;border:1px solid var(--border);border-radius:6px;background:var(--panel);color:var(--muted);cursor:pointer;font-size:13px;font-family:var(--font);transition:all .2s;position:relative;}
.tab:hover{background:#ffffff18;}.tab.on{background:var(--green);color:#fff;border-color:var(--green);box-shadow:0 0 8px #1D9E7544;}
.tab .notif{position:absolute;top:-4px;right:-4px;width:8px;height:8px;background:var(--red);border-radius:50%;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.sc{display:none;}.sc.v{display:block;animation:fadeIn .25s ease-out;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:7px;}
.item{background:#ffffff08;border:1px solid var(--border);border-radius:8px;padding:9px;text-align:center;cursor:default;transition:all .2s;}
.item:hover{border-color:#ffffff44;background:#ffffff10;}
.item canvas{display:block;margin:0 auto 4px;image-rendering:pixelated;}
.iname{font-size:13px;color:var(--text);margin-bottom:2px;}.idesc{font-size:11px;color:var(--muted);margin-bottom:4px;}
.iprice{font-size:12px;color:var(--gold);margin-bottom:5px;}
.item button,.gbtn{padding:5px 8px;font-size:12px;border:1px solid var(--border);border-radius:6px;background:#ffffff15;color:var(--text);cursor:pointer;font-family:var(--font);width:100%;transition:all .2s;}
.item button:hover,.gbtn:hover{background:var(--green);border-color:var(--green);color:#fff;}
.item button:disabled{opacity:.35;cursor:not-allowed;}
.owned{font-size:11px;color:var(--green);background:#1D9E7522;padding:2px 7px;border-radius:20px;display:inline-block;margin-top:3px;}
.rare-tag{font-size:9px;color:#E040FB;background:#E040FB22;padding:1px 6px;border-radius:10px;display:inline-block;margin-bottom:3px;animation:shimmer 2s infinite;}
@keyframes shimmer{0%,100%{opacity:1;}50%{opacity:0.6;}}
.bar{height:7px;background:#ffffff15;border-radius:20px;overflow:hidden;margin-top:3px;}
.fill{height:100%;border-radius:20px;transition:width .4s;}
.row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.lbl{font-size:13px;color:var(--muted);width:95px;flex-shrink:0;}.val{font-size:12px;font-weight:500;width:28px;text-align:right;}
.btn{padding:8px 16px;background:var(--green);color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:14px;font-family:var(--font);transition:all .2s;}
.btn:hover{background:#0F6E56;transform:translateY(-1px);}.btn:active{transform:translateY(0);}.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-row{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap;}
.al{padding:7px 11px;border-radius:7px;font-size:13px;margin-bottom:7px;animation:slideIn .3s ease-out;}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);}}
.ok{background:#1D9E7522;color:#4ade80;border:1px solid #1D9E7544;}
.warn{background:#FFB30022;color:#FFB300;border:1px solid #FFB30044;}
.bad{background:#E5393522;color:#ff6b6b;border:1px solid #E5393544;}
.stitle{font-family:var(--pfont);font-size:9px;letter-spacing:1px;color:var(--text);margin-bottom:8px;}
.fcard{display:flex;align-items:center;gap:9px;padding:8px;margin-bottom:6px;background:#ffffff08;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .2s;}
.fcard:hover{border-color:var(--green);background:#ffffff10;}
.finfo{flex:1;}.fname{font-size:14px;color:var(--text);}
.ftag{font-size:10px;padding:1px 6px;border-radius:10px;display:inline-block;margin-right:3px;margin-top:2px;}
.ftag-baby{background:#0288D122;color:#4FC3F7;}.ftag-adult{background:#1D9E7522;color:#4ade80;}
.ftag-sick{background:#E5393522;color:#ff6b6b;}.ftag-age{background:#FFB30022;color:#FFB300;}
.ftag-mood{background:#CE93D822;color:#CE93D8;}
.fbtns{display:flex;flex-direction:column;gap:3px;}
.fbtns button{font-size:10px;padding:3px 8px;border:1px solid var(--border);border-radius:5px;background:#ffffff10;cursor:pointer;font-family:var(--font);color:var(--text);transition:all .2s;}
.fbtns button:hover{background:var(--green);color:#fff;}
.coins-display{font-family:var(--pfont);font-size:9px;color:var(--gold);background:#FFB30015;border:1px solid #FFB30033;padding:5px 10px;border-radius:7px;white-space:nowrap;}
.level-display{font-family:var(--pfont);font-size:9px;color:#CE93D8;background:#CE93D815;border:1px solid #CE93D833;padding:5px 10px;border-radius:7px;white-space:nowrap;}
.tank-size-badge{font-size:10px;color:var(--blue);background:#0288D122;border:1px solid #0288D133;padding:2px 8px;border-radius:10px;white-space:nowrap;}
.ach-card{display:flex;align-items:center;gap:10px;padding:8px 10px;margin-bottom:5px;background:#ffffff08;border:1px solid var(--border);border-radius:8px;transition:all .2s;}
.ach-card.done{border-color:#1D9E7544;background:#1D9E7511;}
.ach-icon{font-size:22px;width:36px;text-align:center;flex-shrink:0;}
.ach-info{flex:1;}.ach-name{font-size:13px;color:var(--text);}.ach-desc{font-size:11px;color:var(--muted);margin-top:1px;}
.ach-reward{font-size:10px;color:var(--gold);margin-top:2px;}.ach-check{color:#4ade80;font-size:16px;}
.ach-popup{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:#1a1a2e;border:2px solid var(--gold);border-radius:12px;padding:12px 20px;z-index:9999;display:flex;align-items:center;gap:10px;box-shadow:0 0 30px #FFB30044;transition:transform .5s cubic-bezier(.34,1.56,.64,1);font-family:var(--font);}
.ach-popup.show{transform:translateX(-50%) translateY(0);}
.ach-popup .ach-icon{font-size:26px;}.ach-popup .ach-text{color:var(--gold);font-size:14px;}.ach-popup .ach-sub{color:var(--muted);font-size:12px;}
.stat-box{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.stat-item{background:#ffffff08;border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;}
.stat-val{font-size:12px;color:var(--gold);font-family:var(--pfont);}.stat-label{font-size:12px;color:var(--muted);margin-top:4px;}
.upgrade-card{background:#ffffff08;border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
.upgrade-card .up-icon{font-size:24px;width:40px;text-align:center;}.upgrade-card .up-info{flex:1;}
.upgrade-card .up-name{font-size:14px;color:var(--text);}.upgrade-card .up-desc{font-size:11px;color:var(--muted);margin-top:2px;}
.upgrade-card .up-price{font-size:12px;color:var(--gold);margin-top:3px;}
.feed-particle{position:absolute;pointer-events:none;font-size:10px;animation:feedDrop 1.2s ease-in forwards;}
@keyframes feedDrop{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(60px);}}
.coin-fly{position:fixed;pointer-events:none;font-family:var(--pfont);font-size:10px;color:var(--gold);z-index:9999;animation:coinUp 1s ease-out forwards;}
@keyframes coinUp{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-40px);}}
</style>
</head>
<body>
<div id="app">
  <div class="game-title">~ MY AQUARIUM ~</div>
  <div class="top-bar">
    <div class="top-bar-left">
      <div style="font-size:12px;color:var(--muted)" id="time-display">Day 1 — 08:00</div>
      <div class="tank-size-badge" id="tank-badge">Tank: Small (5 fish)</div>
    </div>
    <div class="top-bar-right">
      <div class="level-display" id="LD">Lv. 1 (0 XP)</div>
      <div class="coins-display" id="CD">Coins: 500</div>
    </div>
  </div>
  <div class="tank-outer"><canvas id="TC" height="280"></canvas></div>
  <div class="hud" id="HUD"></div>
  <div class="tabs" id="tab-bar">
    <button class="tab on" data-tab="shop">Shop</button>
    <button class="tab" data-tab="setup">Setup</button>
    <button class="tab" data-tab="water">Water</button>
    <button class="tab" data-tab="market">Fish Market</button>
    <button class="tab" data-tab="myfish">My Fish</button>
    <button class="tab" data-tab="deco">Decorations</button>
    <button class="tab" data-tab="upgrades">Upgrades</button>
    <button class="tab" data-tab="achievements">Quests</button>
    <button class="tab" data-tab="stats">Stats</button>
  </div>
  <div id="a-global"></div>
  <div class="sc v" id="s-shop"><div class="stitle">Equipment Shop</div><div id="a-shop"></div><div class="grid" id="shop-g"></div></div>
  <div class="sc" id="s-setup"><div class="stitle">Tank Setup</div><div id="a-setup"></div><div class="panel"><div style="font-size:13px;color:var(--muted);margin-bottom:10px;">Buy essentials then fill your tank with water.</div><div id="steps"></div><div class="btn-row"><button class="btn" id="btn-w">Add Water</button></div></div></div>
  <div class="sc" id="s-water"><div class="stitle">Water Quality</div><div id="a-water"></div><div class="panel" id="wstats"></div><div class="btn-row"><button class="btn" id="btn-t">Run Water Test</button></div></div>
  <div class="sc" id="s-market"><div class="stitle">Fish Market</div><div style="font-size:11px;color:var(--muted);margin-bottom:8px;" id="market-note"></div><div id="a-market"></div><div class="grid" id="fish-g"></div></div>
  <div class="sc" id="s-myfish"><div class="stitle">My Fish</div><div id="a-myfish"></div><div id="fish-list"></div><div class="btn-row"><button class="btn" id="btn-feed">Feed All</button><button class="btn" style="background:#0288D1" id="btn-clean">Clean Tank (20 coins)</button></div></div>
  <div class="sc" id="s-deco"><div class="stitle">Decorations</div><div id="a-deco"></div><div class="grid" id="deco-g"></div></div>
  <div class="sc" id="s-upgrades"><div class="stitle">Tank Upgrades</div><div id="a-upgrades"></div><div id="upgrade-list"></div></div>
  <div class="sc" id="s-achievements"><div class="stitle">Quests & Achievements</div><div id="a-achievements"></div><div id="ach-list"></div></div>
  <div class="sc" id="s-stats"><div class="stitle">Aquarium Stats</div><div id="a-stats"></div><div id="stats-content"></div></div>
</div>
<div class="ach-popup" id="ach-popup"><div class="ach-icon" id="ach-popup-icon"></div><div><div class="ach-text" id="ach-popup-text"></div><div class="ach-sub" id="ach-popup-sub"></div></div></div>

<script>
const PLANTS=[{id:'vallis',name:'Vallisneria',colors:['#1B5E20','#2E7D32','#43A047','#66BB6A'],shape:'tall',maxH:95},{id:'amazon',name:'Amazon Sword',colors:['#1A237E','#283593','#3949AB','#7986CB'],shape:'broad',maxH:65},{id:'moss',name:'Java Moss',colors:['#33691E','#558B2F','#7CB342','#AED581'],shape:'bush',maxH:35},{id:'crypt',name:'Cryptocoryne',colors:['#4E342E','#6D4C41','#8D6E63','#D7CCC8'],shape:'rosette',maxH:50},{id:'cabomba',name:'Cabomba',colors:['#004D40','#00695C','#00897B','#4DB6AC'],shape:'feather',maxH:80},{id:'lotus',name:'Red Lotus',colors:['#880E4F','#AD1457','#C2185B','#F48FB1'],shape:'broad',maxH:60},{id:'hornwort',name:'Hornwort',colors:['#1B5E20','#2E7D32','#388E3C','#81C784'],shape:'feather',maxH:88},{id:'anubias',name:'Anubias',colors:['#1A237E','#1B5E20','#2E7D32','#4CAF50'],shape:'broad',maxH:42}];
const FISH_DEF=[
  {id:'guppy',name:'Guppy',price:15,desc:'Hardy & colorful',temp:'24-28°C',hardiness:5,breedable:true,personality:'curious',poop:0.3,rarity:'common'},
  {id:'betta',name:'Betta',price:30,desc:'Stunning fins',temp:'26-30°C',hardiness:3,breedable:false,personality:'territorial',poop:0.25,rarity:'common'},
  {id:'neon',name:'Neon Tetra',price:12,desc:'Schooling fish',temp:'22-26°C',hardiness:4,breedable:true,personality:'shy',poop:0.2,rarity:'common'},
  {id:'goldfish',name:'Goldfish',price:20,desc:'Classic cold water',temp:'18-22°C',hardiness:5,breedable:true,personality:'greedy',poop:0.5,rarity:'common'},
  {id:'angel',name:'Angelfish',price:45,desc:'Elegant & tall',temp:'25-29°C',hardiness:3,breedable:true,personality:'proud',poop:0.3,rarity:'uncommon'},
  {id:'pleco',name:'Pleco',price:35,desc:'Algae cleaner',temp:'23-27°C',hardiness:5,breedable:false,personality:'peaceful',poop:0.2,rarity:'common'},
  {id:'discus',name:'Discus',price:80,desc:'King of freshwater',temp:'28-32°C',hardiness:2,breedable:true,personality:'sensitive',poop:0.35,rarity:'uncommon'},
  {id:'zebra',name:'Zebra Danio',price:10,desc:'Fast & playful',temp:'18-24°C',hardiness:5,breedable:true,personality:'playful',poop:0.2,rarity:'common'},
  {id:'arowana',name:'Arowana',price:200,desc:'Dragon fish, legendary',temp:'26-30°C',hardiness:2,breedable:false,personality:'majestic',poop:0.4,rarity:'rare'},
  {id:'axolotl',name:'Axolotl',price:150,desc:'Cute & regenerative',temp:'16-20°C',hardiness:3,breedable:true,personality:'curious',poop:0.3,rarity:'rare'},
  {id:'seahorse',name:'Seahorse',price:120,desc:'Graceful dancer',temp:'22-26°C',hardiness:2,breedable:true,personality:'shy',poop:0.15,rarity:'rare'},
];
const EQ=[
  {id:'filter',name:'Filter',icon:'⚙',price:60,desc:'Cleans water over time'},
  {id:'heater',name:'Heater',icon:'🌡',price:50,desc:'Stable temperature'},
  {id:'gravel',name:'Gravel & Sand',icon:'◼',price:30,desc:'Natural substrate'},
  {id:'airpump',name:'Air Pump',icon:'〇',price:35,desc:'Oxygen bubbles'},
  {id:'light',name:'LED Light',icon:'✦',price:45,desc:'Day/night cycle'},
  {id:'dechlorinator',name:'Dechlorinator',icon:'❋',price:20,desc:'Safe tap water'},
  {id:'testkit',name:'Test Kit',icon:'⬡',price:25,desc:'Measure quality'},
  {id:'heater2',name:'Pro Heater',icon:'🔥',price:90,desc:'Perfect temp control'},
  {id:'filter2',name:'Pro Filter',icon:'⚙',price:120,desc:'Superior filtration'},
  {id:'autofeeder',name:'Auto Feeder',icon:'⊛',price:100,desc:'Feeds fish every day'},
  {id:'uv',name:'UV Sterilizer',icon:'☀',price:80,desc:'Reduces disease chance'},
];
const DECO_DEF=[
  {id:'rock1',name:'Smooth Rock',price:25,desc:'Natural stone'},{id:'rock2',name:'Dragon Stone',price:40,desc:'Dramatic peaks'},
  {id:'driftwood',name:'Driftwood',price:35,desc:'Aged sunken wood'},{id:'coral1',name:'Brain Coral',price:50,desc:'Colorful coral'},
  {id:'coral2',name:'Fan Coral',price:45,desc:'Delicate branches'},{id:'treasure',name:'Treasure Chest',price:30,desc:'Classic ornament'},
  {id:'castle',name:'Mini Castle',price:55,desc:'Fairy tale vibes'},{id:'shell',name:'Giant Shell',price:20,desc:'Ocean keepsake'},
  {id:'anchor',name:'Old Anchor',price:60,desc:'Rustic shipwreck piece'},{id:'volcano',name:'Mini Volcano',price:70,desc:'Bubble eruptions!'},
];
const DISEASES=[{id:'ich',name:'White Spot (Ich)',cure:'Ich Medicine',cureCost:40,damage:12},{id:'fin_rot',name:'Fin Rot',cure:'Antibiotics',cureCost:35,damage:8},{id:'bloat',name:'Bloat',cure:'Medicated Food',cureCost:30,damage:10},{id:'fungal',name:'Fungal Infection',cure:'Antifungal',cureCost:45,damage:15}];
const NAMES=['Bubbles','Nemo','Dory','Flash','Goldie','Zigzag','Pixel','Splash','Finn','Pearl','Luna','Comet','Mochi','Pebble','Ripple','Tide','Coral','Shimmer','Dart','Echo','Neptune','Poseidon','Whiskers','Biscuit','Noodle','Tofu','Mango','Poppy','Storm','Azure'];
const STEPS=[{label:'Filter',ids:['filter','filter2']},{label:'Heater',ids:['heater','heater2']},{label:'Gravel/Sand',ids:['gravel']},{label:'Dechlorinator',ids:['dechlorinator']}];
const TANK_SIZES=[{id:'small',name:'Small',capacity:5,cost:0},{id:'medium',name:'Medium',capacity:10,cost:200},{id:'large',name:'Large',capacity:18,cost:500},{id:'mega',name:'Mega',capacity:30,cost:1200}];
const ACHIEVEMENTS=[
  {id:'first_fish',name:'First Splash',icon:'🐟',desc:'Buy your first fish',reward:25,check:s=>s.fish.length>=1},
  {id:'five_fish',name:'School\'s In',icon:'🐠',desc:'Own 5 fish at once',reward:50,check:s=>s.fish.length>=5},
  {id:'ten_fish',name:'Crowd Control',icon:'🎏',desc:'Own 10 fish at once',reward:100,check:s=>s.fish.length>=10},
  {id:'first_breed',name:'Proud Parent',icon:'🥚',desc:'Breed your first baby fish',reward:40,check:s=>(s.totalBred||0)>=1},
  {id:'water_perfect',name:'Crystal Clear',icon:'💧',desc:'Reach 90+ water quality',reward:30,check:s=>avgW()>=90},
  {id:'buy_all_eq',name:'Fully Equipped',icon:'⚙',desc:'Buy all equipment',reward:80,check:s=>EQ.every(e=>s.owned[e.id])},
  {id:'survive_10',name:'Veteran Keeper',icon:'📅',desc:'Reach Day 10',reward:60,check:s=>s.day>=10},
  {id:'survive_30',name:'Master Keeper',icon:'🏆',desc:'Reach Day 30',reward:200,check:s=>s.day>=30},
  {id:'rich',name:'Deep Pockets',icon:'💰',desc:'Have 1000+ coins at once',reward:50,check:s=>s.coins>=1000},
  {id:'collector',name:'Fish Collector',icon:'📚',desc:'Own 6 different species',reward:100,check:s=>new Set(s.fish.map(f=>f.id)).size>=6},
  {id:'decorator',name:'Interior Designer',icon:'🏰',desc:'Place 5 decorations',reward:60,check:s=>(s.decos||[]).length>=5},
  {id:'rare_catch',name:'Rare Catch!',icon:'⭐',desc:'Buy a rare fish',reward:75,check:s=>s.fish.some(f=>FISH_DEF.find(d=>d.id===f.id)?.rarity==='rare')},
  {id:'upgrade_tank',name:'Moving Up',icon:'📦',desc:'Upgrade your tank',reward:50,check:s=>(s.tankSize||0)>=1},
  {id:'cure_disease',name:'Doctor Fish',icon:'💊',desc:'Cure a disease',reward:30,check:s=>(s.totalCured||0)>=1},
  {id:'feed_100',name:'Generous Soul',icon:'🍞',desc:'Feed fish 100 times',reward:50,check:s=>(s.totalFeeds||0)>=100},
  {id:'earn_5000',name:'Tycoon',icon:'👑',desc:'Earn 5000 total coins',reward:150,check:s=>(s.totalEarned||0)>=5000},
  {id:'no_death_10',name:'Perfect Record',icon:'🌟',desc:'10 days no deaths',reward:100,check:s=>(s.daysWithoutDeath||0)>=10},
];
const MOOD_EMOTES={happy:'♥',hungry:'…',sleepy:'zzZ',excited:'!!',lonely:'...',scared:'!?',playful:'~♪',content:'♪'};

function getFishMood(f){
  if(f.hunger<25)return'hungry';if(f.health<40)return'scared';if(f.diseased)return'scared';
  const hour=Math.floor((S.gameTime%1440)/60);if(hour>=21||hour<6)return'sleepy';
  if(S.fish.filter(x=>x.id===f.id).length===1&&FISH_DEF.find(d=>d.id===f.id)?.personality==='shy')return'lonely';
  if(f.hunger>80&&f.health>80)return'happy';if(avgW()>85&&f.health>70)return'content';
  if(FISH_DEF.find(d=>d.id===f.id)?.personality==='playful')return'playful';return'content';
}

let S={coins:500,owned:{},waterAdded:false,waterLevel:0,waterAnim:false,waterTested:false,testAnim:false,waterScore:{},fish:[],uid:0,day:1,plantAge:0,plantSeeds:[],decos:[],gameTime:8*60,poopLevel:0,lastRealTime:Date.now(),tankSize:0,xp:0,level:1,achievements:[],totalBred:0,totalCured:0,totalCleans:0,totalFeeds:0,totalEarned:0,totalSpent:0,totalFishBought:0,totalDeaths:0,daysWithoutDeath:0,maxDaysWithoutDeath:0,clickFeed:0};

function sv(){try{localStorage.setItem('aq7',JSON.stringify(S));}catch(e){}}
function ld(){try{const x=localStorage.getItem('aq7');if(x){Object.assign(S,JSON.parse(x));}}catch(e){}}
function coin(n){if(n>0)S.totalEarned=(S.totalEarned||0)+n;if(n<0)S.totalSpent=(S.totalSpent||0)+Math.abs(n);S.coins+=n;document.getElementById('CD').textContent='Coins: '+S.coins;if(n>0)coinFlyAnim('+'+n);sv();checkAch();}
function addXP(n){S.xp=(S.xp||0)+n;const need=S.level*100;if(S.xp>=need){S.xp-=need;S.level++;showAl('global','Level Up! Level '+S.level+'! +25 coins','ok');coin(25);}document.getElementById('LD').textContent='Lv. '+S.level+' ('+S.xp+' XP)';sv();}
function coinFlyAnim(text){const el=document.createElement('div');el.className='coin-fly';el.textContent=text;const cd=document.getElementById('CD');const r=cd.getBoundingClientRect();el.style.left=(r.left+r.width/2)+'px';el.style.top=(r.top-5)+'px';document.body.appendChild(el);setTimeout(()=>el.remove(),1000);}
function showAl(z,m,t){const el=document.getElementById('a-'+(z||'global'));if(!el)return;el.innerHTML='<div class="al '+t+'">'+m+'</div>';setTimeout(()=>{if(el)el.innerHTML='';},3000);}
function getTankCap(){return TANK_SIZES[S.tankSize||0].capacity;}
function avgW(){if(!S.waterTested)return 0;const v=Object.values(S.waterScore);return Math.round(v.reduce((a,b)=>a+b,0)/v.length);}
function getWaterTemp(){return S.owned.heater2?27:S.owned.heater?25:18;}

function checkAch(){ACHIEVEMENTS.forEach(a=>{if((S.achievements||[]).includes(a.id))return;if(a.check(S)){if(!S.achievements)S.achievements=[];S.achievements.push(a.id);coin(a.reward);addXP(20);showAchPopup(a);sv();}});}
function showAchPopup(a){const p=document.getElementById('ach-popup');document.getElementById('ach-popup-icon').textContent=a.icon;document.getElementById('ach-popup-text').textContent='Achievement: '+a.name;document.getElementById('ach-popup-sub').textContent=a.desc+' (+'+a.reward+' coins)';p.classList.add('show');setTimeout(()=>p.classList.remove('show'),3500);}

function updateTankBadge(){const t=TANK_SIZES[S.tankSize||0];document.getElementById('tank-badge').textContent='Tank: '+t.name+' ('+t.capacity+' fish)';}

document.getElementById('tab-bar').addEventListener('click',function(e){const btn=e.target.closest('.tab');if(!btn)return;const name=btn.dataset.tab;document.querySelectorAll('#app .sc').forEach(s=>s.classList.remove('v'));document.querySelectorAll('#app .tab').forEach(t=>t.classList.remove('on'));document.getElementById('s-'+name).classList.add('v');btn.classList.add('on');
if(name==='setup')renderSetup();if(name==='water')renderWater();if(name==='market')renderMarket();if(name==='myfish')renderFishList();if(name==='deco')renderDeco();if(name==='upgrades')renderUpgrades();if(name==='achievements')renderAchievements();if(name==='stats')renderStats();});

document.getElementById('btn-w').addEventListener('click',function(){if(S.waterAdded)return;S.waterAnim=true;S.waterLevel=0;sv();showAl('setup','Filling tank with water...','ok');renderSetup();});
document.getElementById('btn-t').addEventListener('click',function(){if(!S.owned.testkit){showAl('water','Buy a test kit first!','warn');return;}if(!S.waterAdded){showAl('water','Add water first!','warn');return;}S.testAnim=true;sv();showAl('water','Analyzing water quality...','ok');setTimeout(()=>{S.waterTested=true;S.testAnim=false;recalcWater();sv();renderWater();if(!S.plantSeeds||!S.plantSeeds.length)initPlants();checkAch();},2500);});
document.getElementById('btn-feed').addEventListener('click',function(){S.fish.forEach(f=>{f.hunger=Math.min(100,f.hunger+35);});S.totalFeeds=(S.totalFeeds||0)+S.fish.length;addXP(2);showAl('myfish','All fish fed!','ok');showFeedParticles();renderFishList();sv();checkAch();});
document.getElementById('btn-clean').addEventListener('click',function(){if(S.coins<20){showAl('myfish','Not enough coins!','warn');return;}coin(-20);S.poopLevel=0;S.totalCleans=(S.totalCleans||0)+1;addXP(3);recalcWater();sv();showAl('myfish','Tank cleaned!','ok');renderFishList();checkAch();});

let tankRipples=[];
document.getElementById('TC').addEventListener('click',function(e){if(!S.fish.length)return;S.clickFeed=(S.clickFeed||0)+1;if(S.clickFeed%3===0){S.fish.forEach(f=>{f.hunger=Math.min(100,f.hunger+5);});showAl('global','Tapped tank! Fish nibbled crumbs.','ok');addXP(1);}const rect=this.getBoundingClientRect();tankRipples.push({x:e.clientX-rect.left,y:e.clientY-rect.top,r:0,alpha:0.5});});

function showFeedParticles(){const tank=document.querySelector('.tank-outer');for(let i=0;i<8;i++){const p=document.createElement('div');p.className='feed-particle';p.textContent='•';p.style.color='#FFB300';p.style.left=(15+Math.random()*70)+'%';p.style.top='5px';p.style.animationDelay=(Math.random()*0.5)+'s';tank.appendChild(p);setTimeout(()=>p.remove(),1700);}}

function recalcWater(){const pp=Math.round(S.poopLevel*0.4);const fb=(S.owned.filter2?35:S.owned.filter?25:0);const pb=Math.min(15,Math.floor((S.plantSeeds||[]).length*2));const uv=S.owned.uv?8:0;
S.waterScore={ph:Math.min(100,Math.max(0,70+(S.owned.dechlorinator?15:0)+(S.owned.filter||S.owned.filter2?5:0)+pb-pp+uv)),ammonia:Math.min(100,Math.max(0,60+fb+pb-pp*1.5+uv)),oxygen:Math.min(100,Math.max(0,55+(S.owned.airpump?20:0)+pb)),temp:Math.min(100,Math.max(0,60+(S.owned.heater2?38:S.owned.heater?30:0))),clarity:Math.min(100,Math.max(0,50+fb+(S.owned.gravel?15:0)-pp+uv))};
Object.keys(S.waterScore).forEach(k=>{S.waterScore[k]=Math.round(S.waterScore[k]);});}

function renderHUD(){const avg=avgW();const wq=S.waterTested?(avg>=80?'Excellent':avg>=60?'OK':'Poor'):'Unknown';const wc=!S.waterTested?'':avg>=80?'good':avg>=60?'warn':'bad';const cap=getTankCap();
document.getElementById('HUD').innerHTML='<div class="hud-stat '+wc+'"><b>'+wq+'</b>Water</div><div class="hud-stat"><b>'+getWaterTemp()+'°C</b>Temp</div><div class="hud-stat"><b>'+(S.waterAdded?100:Math.round(S.waterLevel||0))+'%</b>Level</div><div class="hud-stat"><b>'+S.fish.length+'/'+cap+'</b>Fish</div><div class="hud-stat '+(S.poopLevel>50?'bad':S.poopLevel>25?'warn':'')+'"><b>'+Math.round(S.poopLevel)+'%</b>Waste</div>';}

function renderSetup(){document.getElementById('steps').innerHTML=STEPS.map(s=>{const have=s.ids.some(id=>S.owned[id]);return'<div class="row"><div class="lbl" style="color:'+(have?'#4ade80':'var(--muted)')+';">'+(have?'✓ ':'○ ')+s.label+'</div><div style="font-size:12px;color:'+(have?'#4ade80':'#ff6b6b')+'">'+(have?'Ready':'Missing')+'</div></div>';}).join('');const ok=STEPS.every(s=>s.ids.some(id=>S.owned[id]));const btn=document.getElementById('btn-w');btn.disabled=!ok||S.waterAdded;btn.textContent=S.waterAdded?'Water Added!':'Add Water';}

function renderWater(){const btn=document.getElementById('btn-t');if(!S.waterAdded){document.getElementById('wstats').innerHTML='<div style="font-size:13px;color:var(--muted)">Set up tank and add water first.</div>';btn.disabled=true;return;}btn.disabled=false;if(!S.waterTested){document.getElementById('wstats').innerHTML='<div style="font-size:13px;color:var(--muted)">Press Run Water Test to check quality.</div>';return;}const ws=S.waterScore;const lbls={ph:'pH level',ammonia:'Ammonia',oxygen:'Oxygen',temp:'Temperature',clarity:'Clarity'};const col=v=>v>=80?'#4ade80':v>=55?'#FFB300':'#ff6b6b';document.getElementById('wstats').innerHTML=Object.keys(ws).map(k=>'<div class="row"><div class="lbl">'+lbls[k]+'</div><div style="flex:1"><div class="bar"><div class="fill" style="width:'+ws[k]+'%;background:'+col(ws[k])+'"></div></div></div><div class="val" style="color:'+col(ws[k])+'">'+ws[k]+'</div></div>').join('');const avg=avgW();showAl('water',avg>=80?'Excellent!':avg>=60?'Acceptable. Monitor closely.':'Poor water!',avg>=80?'ok':avg>=60?'warn':'bad');}

function renderShop(){document.getElementById('shop-g').innerHTML=EQ.map(e=>{const o=S.owned[e.id];return'<div class="item"><div style="font-size:26px;margin-bottom:4px;color:var(--gold)">'+e.icon+'</div><div class="iname">'+e.name+'</div><div class="idesc">'+e.desc+'</div><div class="iprice">'+e.price+' coins</div>'+(o?'<div class="owned">✓ Owned</div>':'<button data-eq="'+e.id+'" '+(S.coins<e.price?'disabled':'')+'>Buy</button>')+'</div>';}).join('');document.getElementById('shop-g').querySelectorAll('[data-eq]').forEach(btn=>{btn.addEventListener('click',function(){const id=this.dataset.eq;const e=EQ.find(x=>x.id===id);if(!e||S.owned[id]||S.coins<e.price)return;coin(-e.price);S.owned[id]=true;addXP(10);sv();if(S.waterTested)recalcWater();showAl('shop','Got '+e.name+'!','ok');renderShop();renderHUD();checkAch();});});}

function renderDeco(){const grid=document.getElementById('deco-g');grid.innerHTML='';DECO_DEF.forEach(d=>{const placed=(S.decos||[]).some(x=>x.id===d.id);const div=document.createElement('div');div.className='item';div.innerHTML='<div style="height:36px;display:flex;align-items:center;justify-content:center;margin-bottom:4px;">'+drawDecoPreview(d.id)+'</div><div class="iname">'+d.name+'</div><div class="idesc">'+d.desc+'</div><div class="iprice">'+d.price+' coins</div>'+(placed?'<div class="owned">✓ Placed</div>':'<button data-deco="'+d.id+'" '+(S.coins<d.price?'disabled':'')+'>Buy & Place</button>');grid.appendChild(div);});grid.querySelectorAll('[data-deco]').forEach(btn=>{btn.addEventListener('click',function(){const id=this.dataset.deco;const d=DECO_DEF.find(x=>x.id===id);if(!d||S.coins<d.price)return;coin(-d.price);addXP(5);if(!S.decos)S.decos=[];S.decos.push({id,x:Math.random()*0.8+0.05});sv();showAl('deco',d.name+' placed!','ok');renderDeco();checkAch();});});}

function drawDecoPreview(id){const c=document.createElement('canvas');c.width=32;c.height=32;c.style.width='32px';c.style.height='32px';c.style.imageRendering='pixelated';drawDecoSprite(c.getContext('2d'),id,0,0,2);return c.outerHTML;}

function renderMarket(){if(!S.waterTested||avgW()<60){document.getElementById('fish-g').innerHTML='<div style="font-size:13px;color:var(--muted);padding:12px">Pass water quality test (60+).</div>';document.getElementById('market-note').textContent='';return;}const cap=getTankCap();const full=S.fish.length>=cap;document.getElementById('market-note').textContent=full?'Tank full! Upgrade for more room.':'Tank: '+S.fish.length+'/'+cap+'. Rare fish appear randomly!';
let avail=FISH_DEF.filter(f=>f.rarity!=='rare');const rares=FISH_DEF.filter(f=>f.rarity==='rare');if(!S._marketRares){S._marketRares=[];rares.forEach(r=>{if(Math.random()<0.3)S._marketRares.push(r.id);});}avail=[...avail,...rares.filter(r=>S._marketRares.includes(r.id))];
const grid=document.getElementById('fish-g');grid.innerHTML='';avail.forEach(f=>{const div=document.createElement('div');div.className='item';const c=makeFishCanvas(f.id,34);div.appendChild(c);const isR=f.rarity==='rare';div.innerHTML+=(isR?'<div class="rare-tag">★ RARE</div>':'')+'<div class="iname">'+f.name+'</div><div class="idesc">'+f.desc+'</div><div style="font-size:10px;color:var(--muted);margin-bottom:3px">'+f.temp+'</div><div style="font-size:10px;color:#7986CB;margin-bottom:4px">'+f.personality+'</div><div class="iprice">'+f.price+' coins</div><button data-fish="'+f.id+'" '+(S.coins<f.price||full?'disabled':'')+'>Buy</button>';grid.appendChild(div);});
grid.querySelectorAll('[data-fish]').forEach(btn=>{btn.addEventListener('click',function(){const id=this.dataset.fish;const cat=FISH_DEF.find(f=>f.id===id);if(!cat||S.coins<cat.price||S.fish.length>=cap)return;coin(-cat.price);const name=NAMES[Math.floor(Math.random()*NAMES.length)];S.fish.push({id,name,health:100,hunger:100,age:0,stage:'baby',diseased:false,disease:null,uid:++S.uid});S.totalFishBought=(S.totalFishBought||0)+1;addXP(5);sv();showAl('market',name+' the '+cat.name+' added!','ok');renderMarket();renderHUD();checkAch();});});}

function renderFishList(){const list=document.getElementById('fish-list');if(!S.fish.length){list.innerHTML='<div style="font-size:13px;color:var(--muted);padding:12px">No fish yet. Visit Fish Market!</div>';return;}const col=v=>v>70?'#4ade80':v>40?'#FFB300':'#ff6b6b';list.innerHTML='';
S.fish.forEach(f=>{const div=document.createElement('div');div.className='fcard';div.appendChild(makeFishCanvas(f.id,28));const info=document.createElement('div');info.className='finfo';const dis=f.disease?DISEASES.find(d=>d.id===f.disease):null;const mood=getFishMood(f);
info.innerHTML='<div class="fname">'+f.name+' <span style="font-size:10px;color:var(--muted)">'+f.id+'</span> <span style="font-size:10px;">'+(MOOD_EMOTES[mood]||'')+'</span></div><div><span class="ftag ftag-'+(f.stage==='baby'?'baby':'adult')+'">'+f.stage+'</span>'+(f.diseased&&dis?'<span class="ftag ftag-sick">'+dis.name+'</span>':'')+'<span class="ftag ftag-age">day '+f.age+'</span><span class="ftag ftag-mood">'+mood+'</span></div><div class="row" style="margin-top:5px;margin-bottom:0"><div class="lbl" style="width:50px;font-size:11px">HP</div><div style="flex:1"><div class="bar"><div class="fill" style="width:'+f.health+'%;background:'+col(f.health)+'"></div></div></div><div class="val" style="color:'+col(f.health)+';font-size:10px">'+f.health+'</div></div><div class="row" style="margin-bottom:0"><div class="lbl" style="width:50px;font-size:11px">Hunger</div><div style="flex:1"><div class="bar"><div class="fill" style="width:'+f.hunger+'%;background:'+col(f.hunger)+'"></div></div></div><div class="val" style="color:'+col(f.hunger)+';font-size:10px">'+f.hunger+'</div></div>';

function makeFishCanvas(id,size,stage){const sp=stage==='baby'?getBabySprite(id):getSprite(id);const sc=Math.max(1,Math.floor(size/Math.max(sp.w,sp.h)));const c=document.createElement('canvas');c.width=sp.w*sc;c.height=sp.h*sc;c.style.width=c.width+'px';c.style.height=c.height+'px';c.style.display='block';c.style.margin='0 auto 3px';c.style.imageRendering='pixelated';const ctx=c.getContext('2d');sp.p.forEach(([x,y,col])=>{ctx.fillStyle=col;ctx.fillRect(x*sc,y*sc,sc,sc);});return c;}
function initPlants(){const W=document.getElementById('TC').width||600;const types=['vallis','moss','cabomba','vallis','crypt','lotus','hornwort','anubias','moss','vallis'];S.plantSeeds=types.map((id,i)=>{const pdef=PLANTS.find(p=>p.id===id);return{id,x:W*(0.03+i*0.105),maxH:pdef.maxH,swayOff:Math.random()*Math.PI*2};});sv();}
function getPlantH(p){return Math.min(p.maxH,4+S.plantAge*0.8);}

function drawPlant(ctx,p,t){const pdef=PLANTS.find(d=>d.id===p.id)||PLANTS[0];const h=getPlantH(p);const base=210;const sw=Math.sin(t*0.5+p.swayOff)*3;
if(pdef.shape==='bush'){for(let i=0;i<h;i+=3){const seg=i/h;ctx.fillStyle=pdef.colors[Math.floor(seg*3)%4];ctx.fillRect(Math.round(p.x+sw*seg*0.4)-3,base-i,6,3);if(i%9===0){ctx.fillRect(Math.round(p.x+sw*seg*0.4)-7,base-i,3,3);ctx.fillRect(Math.round(p.x+sw*seg*0.4)+4,base-i,3,3);}}const bw=Math.max(10,h*0.55);ctx.fillStyle=pdef.colors[2];ctx.fillRect(Math.round(p.x+sw*0.7)-bw/2,base-h,bw,4);ctx.fillRect(Math.round(p.x+sw*0.7)-bw/2-4,base-h+4,bw/2,4);ctx.fillRect(Math.round(p.x+sw*0.7)+bw/4,base-h+4,bw/2,4);return;}
if(pdef.shape==='feather'){for(let i=0;i<h;i+=3){const seg=i/h;ctx.fillStyle=pdef.colors[Math.floor(seg*3)%4];ctx.fillRect(Math.round(p.x+sw*seg)-2,base-i,4,3);if(i%7===0){ctx.fillRect(Math.round(p.x+sw*seg)-9,base-i,5,2);ctx.fillRect(Math.round(p.x+sw*seg)+4,base-i,5,2);}if(i%14===0){ctx.fillRect(Math.round(p.x+sw*seg)-13,base-i+2,4,2);ctx.fillRect(Math.round(p.x+sw*seg)+9,base-i+2,4,2);}}return;}
if(pdef.shape==='rosette'){for(let i=0;i<h*0.5;i+=3){ctx.fillStyle=pdef.colors[0];ctx.fillRect(Math.round(p.x+sw*(i/h)*0.4)-2,base-i,4,3);}for(let l=0;l<5;l++){const angle=(l/5)*Math.PI*2+sw*0.08;const lx=Math.round(p.x+Math.cos(angle)*h*0.38);const ly=Math.round(base-Math.abs(Math.sin(angle))*h*0.45-h*0.15);ctx.fillStyle=pdef.colors[1+(l%2)];ctx.fillRect(lx-7,ly,14,4);ctx.fillRect(lx-5,ly-3,10,3);ctx.fillRect(lx-3,ly+4,6,3);}return;}
for(let i=0;i<h;i+=3){const seg=i/h;ctx.fillStyle=pdef.colors[Math.min(3,Math.floor(seg*4))];ctx.fillRect(Math.round(p.x+sw*seg)-3,base-i,6,3);}
const leaves=[[0,h],[5,h*0.72],[-5,h*0.55],[5,h*0.38],[-4,h*0.22]];leaves.forEach(([lx,ly])=>{const wx=sw*(ly/h);ctx.fillStyle=pdef.colors[2];ctx.fillRect(Math.round(p.x+lx+wx)-7,Math.round(base-ly)-3,14,3);ctx.fillRect(Math.round(p.x+lx+wx)-9,Math.round(base-ly),18,3);ctx.fillRect(Math.round(p.x+lx+wx)-7,Math.round(base-ly)+3,14,3);});}

let fishAnim=[],raf,poopParticles=[];

function syncAnim(){const ex=new Map(fishAnim.map(a=>[a.uid,a]));fishAnim=S.fish.map(f=>{const a=ex.get(f.uid);if(a){a.stage=f.stage;return a;}return{uid:f.uid,id:f.id,stage:f.stage||'adult',x:15+Math.random()*70,y:20+Math.random()*55,dx:(Math.random()<0.5?1:-1)*(0.09+Math.random()*0.16),dy:(Math.random()<0.5?1:-1)*(0.04+Math.random()*0.07),wobble:Math.random()*Math.PI*2,poopCooldown:Math.random()*200,emoteTimer:0};});}

function drawTank(){const canvas=document.getElementById('TC');if(!canvas)return;const W=canvas.parentElement.clientWidth||600;if(canvas.width!==W)canvas.width=W;const H=280,ctx=canvas.getContext('2d');cancelAnimationFrame(raf);
function frame(){const t=Date.now()/1000;ctx.clearRect(0,0,W,H);
if(!S.waterAdded&&!S.waterAnim){ctx.fillStyle='#1a237e';ctx.fillRect(0,0,W,H);ctx.fillStyle='#3949AB';ctx.font='bold 12px monospace';ctx.textAlign='center';ctx.fillText('[ EMPTY TANK ]',W/2,H/2-10);ctx.fillStyle='#5C6BC0';ctx.font='10px monospace';ctx.fillText('set up your tank and add water',W/2,H/2+12);raf=requestAnimationFrame(frame);return;}
if(S.waterAnim){S.waterLevel=Math.min(100,(S.waterLevel||0)+0.45);if(S.waterLevel>=100){S.waterAnim=false;S.waterAdded=true;sv();renderSetup();renderHUD();}ctx.fillStyle='#0a1628';ctx.fillRect(0,0,W,H);const wh=Math.round(S.waterLevel/100*H);const wy=H-wh;ctx.fillStyle='#0a2d6e';ctx.fillRect(0,wy,W,wh);ctx.fillStyle='rgba(100,180,255,0.35)';for(let i=0;i<8;i++)ctx.fillRect(Math.round(W*0.07+i*(W*0.12)+Math.sin(t*4+i)*7),wy,Math.round(W*0.08),3);ctx.fillStyle='#90CAF9';ctx.font='bold 11px monospace';ctx.textAlign='center';ctx.fillText('filling... '+Math.round(S.waterLevel)+'%',W/2,Math.max(18,wy-8));raf=requestAnimationFrame(frame);return;}

const hour=Math.floor((S.gameTime%1440)/60);const isNight=hour<6||hour>=20;const isDawn=hour>=5&&hour<8;const isDusk=hour>=18&&hour<21;const nightAlpha=isNight?0.55:isDawn||isDusk?0.25:0;
[[0,55,'#0d1b4b'],[55,110,'#0d2258'],[110,160,'#0a2d6e'],[160,205,'#0a3580'],[205,245,'#0d3d8f'],[245,280,'#0a4499']].forEach(([y1,y2,c])=>{ctx.fillStyle=c;ctx.fillRect(0,y1,W,y2-y1);});
if(S.owned.light&&!isNight){ctx.save();ctx.globalAlpha=0.06;for(let i=0;i<5;i++){const rx=W*(0.1+i*0.2)+Math.sin(t*0.25+i)*14;ctx.fillStyle='#B3E5FC';ctx.beginPath();ctx.moveTo(rx-12,0);ctx.lineTo(rx+12,0);ctx.lineTo(rx+42,H);ctx.lineTo(rx-42,H);ctx.closePath();ctx.fill();}ctx.restore();}
ctx.save();ctx.globalAlpha=0.13;for(let i=0;i<16;i++){const cx=W*(0.03+i*0.065)+Math.sin(t*0.55+i*1.1)*7;const cy=180+Math.cos(t*0.4+i)*6;ctx.fillStyle='#81D4FA';ctx.fillRect(Math.round(cx),Math.round(cy),4,2);}ctx.restore();
if(S.waterTested&&S.plantSeeds&&S.plantSeeds.length)S.plantSeeds.forEach(p=>drawPlant(ctx,p,t));
if(S.decos&&S.decos.length)S.decos.forEach(d=>{ctx.save();drawDecoSprite(ctx,d.id,Math.round(d.x*W)-10,210-18,3);ctx.restore();});
const flY=210;
if(S.owned.gravel){ctx.fillStyle='#D7CCC8';ctx.fillRect(0,flY,W,70);ctx.fillStyle='#BCAAA4';ctx.fillRect(0,flY,W,4);[.05,.13,.22,.31,.40,.50,.59,.68,.77,.86,.93].forEach((rx,i)=>{ctx.fillStyle=['#8D6E63','#795548','#A1887F','#8D6E63','#BCAAA4','#795548','#A1887F','#8D6E63','#795548','#A1887F','#8D6E63'][i];ctx.fillRect(Math.round(rx*W)-4,flY+5,8,5);ctx.fillRect(Math.round(rx*W)-6,flY+8,12,4);});}else{ctx.fillStyle='#546E7A';ctx.fillRect(0,flY,W,70);ctx.fillStyle='#455A64';ctx.fillRect(0,flY,W,3);}
if(S.owned.airpump)for(let i=0;i<10;i++){const bx=W*0.05+(i%5)*13+Math.sin(t*0.5+i)*5;const by=flY-((t*19+i*25)%flY);ctx.strokeStyle='rgba(179,229,252,0.55)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(bx,by,i%3===0?3:2,0,Math.PI*2);ctx.stroke();}
if(S.decos&&S.decos.some(d=>d.id==='volcano')){const vd=S.decos.find(d=>d.id==='volcano');const vx=Math.round(vd.x*W);for(let i=0;i<4;i++){ctx.fillStyle='rgba(255,87,34,0.4)';ctx.beginPath();ctx.arc(vx+Math.sin(t*2+i*1.5)*8,flY-20-((t*30+i*20)%40),2,0,Math.PI*2);ctx.fill();}}
poopParticles=poopParticles.filter(p=>{p.y+=p.vy;p.vy+=0.03;p.life--;if(p.life<=0||p.y>flY)return false;ctx.fillStyle='#5D4037';ctx.globalAlpha=p.life/80;ctx.fillRect(Math.round(p.x),Math.round(p.y),3,3);ctx.globalAlpha=1;return true;});
tankRipples=tankRipples.filter(r=>{r.r+=1.5;r.alpha-=0.015;if(r.alpha<=0)return false;ctx.save();ctx.globalAlpha=r.alpha;ctx.strokeStyle='#B3E5FC';ctx.lineWidth=1;ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);ctx.stroke();ctx.restore();return true;});
if(S.testAnim){ctx.save();ctx.globalAlpha=0.22+Math.sin(t*5)*0.1;ctx.fillStyle='#E1F5FE';ctx.fillRect(0,0,W,H);ctx.restore();ctx.fillStyle='#0288D1';ctx.font='bold 11px monospace';ctx.textAlign='center';ctx.fillText('analyzing water...',W/2,H/2);}
syncAnim();
fishAnim.forEach(a=>{a.wobble+=0.032;const sp=a.stage==='baby'?getBabySprite(a.id):getSprite(a.id);const ns=isNight?0.4:1;a.x+=a.dx*ns;a.y+=a.dy*ns+Math.sin(a.wobble)*0.04;if(a.x<3){a.x=3;a.dx=Math.abs(a.dx);}if(a.x>92){a.x=92;a.dx=-Math.abs(a.dx);}if(a.y<4){a.y=4;a.dy=Math.abs(a.dy);}if(a.y>70){a.y=70;a.dy=-Math.abs(a.dy);}if(Math.random()<0.003)a.dx=-a.dx;if(Math.random()<0.004)a.dy=(Math.random()<0.5?1:-1)*(0.04+Math.random()*0.07);
a.poopCooldown=(a.poopCooldown||0)-1;if(a.poopCooldown<=0){const cat=FISH_DEF.find(f=>f.id===a.id);if(Math.random()<(cat?cat.poop:0.3)*0.01){poopParticles.push({x:Math.round(a.x/100*W),y:Math.round(a.y/100*H),vy:0.5+Math.random()*0.5,life:80});S.poopLevel=Math.min(100,(S.poopLevel||0)+0.5);a.poopCooldown=150+Math.random()*200;}}
const px=Math.round(a.x/100*W);const py=Math.round(a.y/100*H);const sc=a.stage==='baby'?2:3;ctx.save();ctx.translate(px,py-sp.h*sc/2);if(a.dx<0){ctx.scale(-1,1);ctx.translate(-sp.w*sc,0);}sp.p.forEach(([x,y,c])=>{ctx.fillStyle=c;ctx.fillRect(x*sc,y*sc,sc,sc);});ctx.restore();
a.emoteTimer=(a.emoteTimer||0)+1;if(a.emoteTimer%180<50){const fish=S.fish.find(f=>f.uid===a.uid);if(fish){const mood=getFishMood(fish);const em=MOOD_EMOTES[mood];if(em){ctx.save();ctx.globalAlpha=0.7;ctx.fillStyle=mood==='hungry'?'#FFB300':mood==='scared'?'#ff6b6b':mood==='happy'?'#ff6b9d':'#B3E5FC';ctx.font='8px monospace';ctx.textAlign='center';ctx.fillText(em,px+sp.w*sc/2,py-sp.h*sc/2-4);ctx.restore();}}}});
if(nightAlpha>0){ctx.save();ctx.globalAlpha=nightAlpha;ctx.fillStyle='#001030';ctx.fillRect(0,0,W,H);ctx.restore();if(isNight){ctx.save();ctx.globalAlpha=0.7;for(let i=0;i<12;i++){ctx.fillStyle='#E1F5FE';ctx.fillRect(Math.round(W*(0.05+((i*73)%91)*0.01)),Math.round(H*0.05+((i*37)%50)*H*0.005),2,2);}ctx.restore();}}
ctx.save();ctx.globalAlpha=0.05;ctx.fillStyle='#fff';ctx.fillRect(0,0,10,H);ctx.fillRect(W-9,0,9,H);ctx.restore();
raf=requestAnimationFrame(frame);}frame();}

let lastTickTime=Date.now();
function gameLoop(){const now=Date.now();const realMs=now-lastTickTime;const msPerGameDay=3600000;const msPerGameMin=msPerGameDay/1440;const gameMins=realMs/msPerGameMin;S.gameTime=(S.gameTime||480)+gameMins;S.day=1+Math.floor(S.gameTime/1440);
if(Math.floor(S.gameTime/1440)>Math.floor((S.gameTime-gameMins)/1440))onNewDay();
S.plantAge+=(gameMins/1440)*2;
if(S.waterTested){S.poopLevel=Math.max(0,S.poopLevel-(S.owned.filter2?0.03:S.owned.filter?0.015:0)*gameMins/60);recalcWater();}
lastTickTime=now;const h=Math.floor((S.gameTime%1440)/60);const m=Math.floor(S.gameTime%60);document.getElementById('time-display').textContent='Day '+S.day+' — '+String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');renderHUD();if(Math.random()<0.001*gameMins)sv();setTimeout(gameLoop,500);}

function onNewDay(){coin(10);addXP(5);showAl('global','New day! +10 coins, +5 XP','ok');let deathToday=false;
if(S.owned.autofeeder){S.fish.forEach(f=>{f.hunger=Math.min(100,f.hunger+25);});showAl('global','Auto Feeder activated!','ok');}
S.fish.forEach(f=>{f.hunger=Math.max(0,f.hunger-20);f.age+=1;if(f.age>=10&&f.stage==='baby')f.stage='adult';if(f.hunger<20)f.health=Math.max(0,f.health-15);
if(avgW()<50&&!f.diseased&&Math.random()<(S.owned.uv?0.08:0.15)){const dis=DISEASES[Math.floor(Math.random()*DISEASES.length)];f.diseased=true;f.disease=dis.id;showAl('global',f.name+' caught '+dis.name+'!','bad');}
if(f.diseased){const dis=DISEASES.find(d=>d.id===f.disease);if(dis)f.health=Math.max(0,f.health-dis.damage/2);}
if(f.health<=0){S.fish=S.fish.filter(x=>x.uid!==f.uid);S.totalDeaths=(S.totalDeaths||0)+1;deathToday=true;showAl('global',f.name+' has died...','bad');}});
if(!deathToday&&S.fish.length>0){S.daysWithoutDeath=(S.daysWithoutDeath||0)+1;if(S.daysWithoutDeath>(S.maxDaysWithoutDeath||0))S.maxDaysWithoutDeath=S.daysWithoutDeath;}else if(deathToday)S.daysWithoutDeath=0;
const groups={};S.fish.forEach(f=>{groups[f.id]=groups[f.id]||[];groups[f.id].push(f);});Object.keys(groups).forEach(id=>{const cat=FISH_DEF.find(c=>c.id===id);if(!cat||!cat.breedable||groups[id].filter(f=>f.stage==='adult').length<2||avgW()<75)return;if(Math.random()<0.06&&S.fish.length<getTankCap()){const name=NAMES[Math.floor(Math.random()*NAMES.length)];S.fish.push({id,name,health:100,hunger:100,age:0,stage:'baby',diseased:false,disease:null,uid:++S.uid});S.totalBred=(S.totalBred||0)+1;showAl('global','Baby '+cat.name+' ('+name+') was born!','ok');addXP(10);}});
S._marketRares=null;sv();renderFishList();checkAch();}

ld();lastTickTime=Date.now();document.getElementById('CD').textContent='Coins: '+S.coins;document.getElementById('LD').textContent='Lv. '+(S.level||1)+' ('+(S.xp||0)+' XP)';updateTankBadge();renderShop();renderHUD();if(S.waterTested&&(!S.plantSeeds||!S.plantSeeds.length))initPlants();setTimeout(drawTank,80);setTimeout(gameLoop,500);
</script>
